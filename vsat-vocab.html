<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#07111f" />
  <title>VSAT Vocab Memory Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #06111f;
      --bg-2: #0b1f35;
      --bg-3: #112742;
      --bg-4: #25173f;
      --panel: rgba(7, 15, 29, 0.72);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.10);
      --border: rgba(166, 189, 255, 0.16);
      --text: #edf5ff;
      --muted: #9cb2d6;
      --cyan: #35d6ff;
      --blue: #6ea5ff;
      --amber: #ffcb6b;
      --mint: #6ce4c4;
      --rose: #ff7e92;
      --violet: #a88bff;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(94, 142, 255, 0.22), transparent 18%),
        radial-gradient(circle at 84% 16%, rgba(54, 214, 255, 0.12), transparent 16%),
        radial-gradient(circle at 50% 80%, rgba(255, 203, 107, 0.10), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 38%, var(--bg-3) 70%, var(--bg-4));
      overflow-x: hidden;
    }

    body { position: relative; }
    button, input, textarea, select { font: inherit; }

    .universe {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .nebula,
    .nebula::before,
    .nebula::after {
      content: "";
      position: absolute;
      inset: -16%;
      filter: blur(60px);
    }

    .nebula {
      background:
        radial-gradient(circle at 15% 28%, rgba(109, 135, 255, 0.22), transparent 14%),
        radial-gradient(circle at 78% 26%, rgba(53, 214, 255, 0.15), transparent 15%),
        radial-gradient(circle at 48% 72%, rgba(255, 194, 95, 0.09), transparent 16%);
      animation: driftNebula 24s ease-in-out infinite alternate;
    }

    .nebula::before {
      background:
        radial-gradient(circle at 32% 62%, rgba(125, 171, 255, 0.14), transparent 14%),
        radial-gradient(circle at 69% 56%, rgba(108, 228, 196, 0.12), transparent 14%);
      animation: driftNebula 34s ease-in-out infinite alternate-reverse;
    }

    .nebula::after {
      background:
        radial-gradient(circle at 52% 34%, rgba(255,255,255,0.06), transparent 9%),
        radial-gradient(circle at 36% 84%, rgba(168, 139, 255, 0.10), transparent 14%);
      animation: driftNebula 38s ease-in-out infinite alternate;
    }

    .space-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(138, 175, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 175, 255, 0.045) 1px, transparent 1px);
      background-size: 100px 100px;
      opacity: 0.22;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 84%);
      transform: perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }

    .stars,
    .stars2,
    .stars3 {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(126, 183, 255, .9), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(255, 204, 109, .95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(78, 231, 255, .95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size: 800px 300px;
      opacity: .9;
      animation: driftStars 100s linear infinite;
    }

    .stars2 {
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.6px 1.6px at 200px 120px, rgba(108, 228, 196, .75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.92), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170, 140, 255, .8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size: 900px 380px;
      opacity: .55;
      animation: driftStarsReverse 145s linear infinite;
    }

    .stars3 {
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(78, 231, 255, .9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(255, 203, 107, .85), transparent);
      background-size: 1000px 420px;
      opacity: .7;
      filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
      animation: twinkle 7s ease-in-out infinite alternate;
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(53,214,255,0));
      filter: drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity: 0;
      transform: rotate(-24deg);
      animation: shooting 9s ease-in-out infinite;
    }

    .shooting-star.one { top: 10%; left: 70%; animation-delay: 0s; }
    .shooting-star.two { top: 22%; left: 14%; width: 150px; animation-delay: 3s; }
    .shooting-star.three { top: 7%; left: 44%; width: 210px; animation-delay: 6s; }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .glass {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .hero-shell {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      right: -90px;
      top: -90px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(53, 214, 255, 0.16), transparent 58%),
        radial-gradient(circle, rgba(255, 203, 107, 0.11), transparent 72%);
      filter: blur(10px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .pill {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(53, 214, 255, 0.10);
      border: 1px solid rgba(53, 214, 255, 0.20);
      color: #d8f7ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber), var(--cyan));
      box-shadow: 0 0 12px rgba(255, 203, 107, 0.65);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(38px, 5vw, 66px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy p {
      color: var(--muted);
      max-width: 760px;
      line-height: 1.82;
      font-size: 15px;
    }

    .hero-tags,
    .science-tags,
    .deck-meta,
    .card-tags,
    .memory-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-tag,
    .tag,
    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dde8ff;
      font-size: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 6px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 8px;
      min-height: 122px;
    }

    .stat-label {
      color: #c8d8f8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1;
    }

    .stat-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .focus-card {
      padding: 24px;
      display: grid;
      gap: 16px;
      min-height: 100%;
      position: relative;
      overflow: hidden;
    }

    .focus-card::after {
      content: "";
      position: absolute;
      inset: auto -50px -70px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 203, 107, 0.18), transparent 65%);
      filter: blur(10px);
    }

    .focus-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .focus-kicker {
      color: #d8edff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .focus-word {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .focus-phonetic {
      color: var(--cyan);
      font-size: 15px;
    }

    .focus-prompt {
      color: var(--muted);
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    .reveal-shell {
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .reveal-answer {
      padding: 16px;
      border-radius: 18px;
      background: rgba(4, 10, 20, 0.46);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 10px;
      min-height: 148px;
    }

    .reveal-answer.hidden .answer-line {
      filter: blur(10px);
      opacity: 0.5;
      user-select: none;
    }

    .answer-title {
      color: #dce8ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .answer-line {
      line-height: 1.75;
      transition: .25s ease;
    }

    .answer-line strong {
      color: #ffffff;
    }

    .focus-actions,
    .grade-actions,
    .toolbar,
    .deck-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .btn,
    .chip-btn,
    .grade-btn,
    .deck-btn {
      border: 0;
      color: var(--text);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .btn:hover,
    .chip-btn:hover,
    .grade-btn:hover,
    .deck-btn:hover {
      transform: translateY(-1px);
    }

    .btn {
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(53,214,255,0.20), rgba(110,165,255,0.18));
      border-color: rgba(53,214,255,0.30);
      box-shadow: 0 14px 30px rgba(53,214,255,0.15);
    }

    .grade-btn {
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 132px;
      text-align: center;
    }

    .grade-btn.danger {
      background: rgba(255, 126, 146, 0.10);
      border-color: rgba(255, 126, 146, 0.24);
    }

    .grade-btn.warn {
      background: rgba(255, 203, 107, 0.10);
      border-color: rgba(255, 203, 107, 0.24);
    }

    .grade-btn.good {
      background: rgba(108, 228, 196, 0.10);
      border-color: rgba(108, 228, 196, 0.22);
    }

    .grade-btn.great {
      background: rgba(110, 165, 255, 0.12);
      border-color: rgba(110, 165, 255, 0.24);
    }

    .main-grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .sidebar,
    .workspace {
      display: grid;
      gap: 20px;
    }

    .panel {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .section-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .section-desc {
      color: var(--muted);
      line-height: 1.72;
      font-size: 14px;
    }

    .protocol-list,
    .science-list,
    .queue-list,
    .deck-list {
      display: grid;
      gap: 12px;
    }

    .protocol-item,
    .science-item,
    .queue-item,
    .deck-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .protocol-step,
    .science-head,
    .queue-top,
    .deck-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .step-index,
    .science-index {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(53,214,255,0.12);
      border: 1px solid rgba(53,214,255,0.24);
      color: #d8f7ff;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .protocol-title,
    .science-title,
    .deck-title,
    .queue-word {
      font-weight: 700;
      color: #f3f8ff;
    }

    .protocol-copy,
    .science-copy,
    .queue-copy,
    .deck-copy {
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
      margin-top: 10px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: #d9e7ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      color: var(--text);
      background: rgba(3, 8, 18, 0.54);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(53,214,255,0.30);
      box-shadow: 0 0 0 3px rgba(53,214,255,0.12);
    }

    .workspace-top {
      display: grid;
      gap: 18px;
    }

    .toolbar {
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .search,
    .select {
      color: var(--text);
      background: rgba(3, 8, 18, 0.54);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 12px 14px;
      min-width: 180px;
      outline: none;
    }

    .chip-btn {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .chip-btn.active,
    .deck-btn.active {
      background: rgba(53,214,255,0.12);
      border-color: rgba(53,214,255,0.28);
      color: #d8f7ff;
    }

    .btn.session {
      background: rgba(255,203,107,0.10);
      border-color: rgba(255,203,107,0.24);
      color: #fff2cc;
    }

    .deck-grid,
    .word-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .deck-btn {
      width: 100%;
      padding: 0;
      text-align: left;
      background: transparent;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .deck-btn .deck-item {
      height: 100%;
    }

    .deck-pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber), var(--cyan));
      box-shadow: 0 0 12px rgba(255,203,107,0.45);
    }

    .word-card {
      padding: 18px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        rgba(7, 15, 29, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 12px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .word-card:hover {
      transform: translateY(-2px);
      border-color: rgba(53,214,255,0.26);
      box-shadow: 0 20px 38px rgba(0,0,0,0.24);
    }

    .word-card.active {
      border-color: rgba(255, 203, 107, 0.30);
      box-shadow: 0 20px 44px rgba(255, 203, 107, 0.10);
    }

    .word-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .word-main {
      display: grid;
      gap: 4px;
    }

    .word-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .word-sub {
      color: var(--cyan);
      font-size: 13px;
    }

    .stage-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
    }

    .stage-0 { color: #ffe3a5; background: rgba(255,203,107,0.10); border-color: rgba(255,203,107,0.24); }
    .stage-1 { color: #d7fbff; background: rgba(53,214,255,0.10); border-color: rgba(53,214,255,0.22); }
    .stage-2 { color: #dbf9ef; background: rgba(108,228,196,0.10); border-color: rgba(108,228,196,0.22); }
    .stage-3 { color: #dfe5ff; background: rgba(110,165,255,0.10); border-color: rgba(110,165,255,0.22); }
    .stage-4 { color: #efe7ff; background: rgba(168,139,255,0.10); border-color: rgba(168,139,255,0.22); }

    .word-copy {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .word-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 12px;
      color: #d7e5ff;
    }

    .empty-state {
      padding: 28px;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
    }

    .footer-note {
      margin-top: 22px;
      padding: 20px 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    .footer-note strong {
      color: #eff7ff;
    }

    .hero-copy.compact {
      gap: 14px;
    }

    .hero-copy.compact h1 {
      max-width: 900px;
    }

    .review-card {
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      min-height: 100%;
    }

    .review-card::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .review-card::before {
      content: "";
      position: absolute;
      right: 166px;
      top: 8px;
      width: 168px;
      height: 168px;

        meaning: "củng cố, gom lại cho chắc hơn",
        nuance: "đúng chất học tập: sau khi nhận diện, phải củng cố bằng lần ôn kế tiếp",
        collocations: "consolidate knowledge, consolidate learning",
        example: "Sleep and spaced review help consolidate fragile vocabulary memories.",
        prompt: "Nhớ liên hệ với giai đoạn ngủ và ôn ngắt quãng.",
        source: "Đề 20",
        tags: ["science", "memory"],
        stage: 2,
        successes: 3,
        lapses: 0,
        lastReviewed: "2026-04-22",

      },
      {
        id: "w7",
        word: "hamper",
        phonetic: "/ˈhæmpə(r)/",
        pos: "v.",
        meaning: "cản trở, làm chậm lại",
        nuance: "hay gặp trong reading khi nói về yếu tố tiêu cực ảnh hưởng kết quả",
        collocations: "hamper progress, hamper performance",
        example: "Passive rereading can hamper long-term recall because the brain feels falsely fluent.",
        prompt: "Từ dùng để cảnh báo việc đọc lại quá nhiều mà không recall.",
        source: "Đề 20",
        tags: ["reading", "warning"],

      },

        meaning: "lôi lại, truy xuất thông tin đã học từ trí nhớ",
        nuance: "đây là động từ trung tâm của active recall",
        collocations: "retrieve information, retrieve from memory",
        example: "The harder you have to retrieve a word, the stronger the memory trace can become.",
        prompt: "Đây là từ cốt lõi của active recall và flashcard.",
        source: "Đề 21",
        tags: ["active-recall", "core"],
        stage: 2,
        successes: 4,
        lapses: 1,
        lastReviewed: "2026-04-22",
        nextReview: "2026-04-23"
      }
    ];

    const englishPlanGroups = [
      "Đề 1, 2, 3",
      "Đề 4, 5, 6",
      "Đề 7, 8, 9, 10",
      "Topic 1, 2, 3, 4",
      "Topic 5, 6, 7, 8",
      "Topic 9, 10, 11, 12",
      "Topic 13, 14, 15, 16",
      "Topic 17, 18, 19, 20",
      "Topic 21, 22, 23, 24",
      "Đề 11, 12, 13, 14",
      "Đề 15, 16",
      "Topic 25, 26, 27, 28",
      "Topic 29, 30, 31, 32",
      "Topic 33, 34, 35, 36",
      "Topic 37, 38, 39, 40",
      "Đề 17, 18, 19, 20, 21",
      "Đề 22, 23, 24, 25"
    ];

    function expandEnglishSources(text) {
      const normalized = String(text).trim();
      const match = normalized.match(/^(Đề|Topic)\s+(.+)$/i);
      if (!match) return [normalized];
      const label = match[1];
      return match[2].split(",").map((part) => `${label} ${part.trim()}`).filter(Boolean);
    }

    const lessonSources = [...new Set(englishPlanGroups.flatMap((item) => expandEnglishSources(item)))];

    const defaultState = {
      words: initialWords,
      selectedId: initialWords[0].id,
      search: "",
      sourceFilter: initialWords[0].source,
      statusFilter: "due",
      showAnswer: false,
      recallDraft: "",
      session: {
        active: false,
        completed: false,
        source: "",
        queue: [],
        currentIndex: 0,
        results: { again: 0, hard: 0, good: 0, easy: 0 }
      }
    };

    const app = document.getElementById("app");

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function todayString() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function addDays(dateString, days) {
      const base = dateString ? new Date(dateString + "T00:00:00") : new Date(todayString() + "T00:00:00");
      base.setDate(base.getDate() + days);
      return base.toISOString().slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || !Array.isArray(saved.words)) return clone(defaultState);
        return {
          ...clone(defaultState),
          ...saved,
          words: saved.words.map((item) => ({
            successes: 0,
            lapses: 0,
            stage: 0,
            lastReviewed: "",
            nextReview: todayString(),
            ...item
          }))
        };
      } catch (error) {
        return clone(defaultState);
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getSources(words = state.words) {
      return ["all", ...new Set([...lessonSources, ...words.map((item) => item.source)])];
    }

    function isDue(item) {
      return !item.nextReview || item.nextReview <= todayString();
    }

    function getRetention(item) {
      const total = item.successes + item.lapses;
      if (!total) return 50;
      return Math.round((item.successes / total) * 100);
    }

    function getStageClass(stage) {
      return `stage-${Math.max(0, Math.min(4, stage))}`;
    }

    function getStageLabel(stage) {
      return STAGE_LABELS[Math.max(0, Math.min(4, stage))];
    }

    function getChallengePrompt(word) {
      const prompts = [
        `Tự nói nghĩa của "${word.word}" theo cách ngắn, đúng sắc thái và không nhìn đáp án.`,
        `Viết 1 câu mới có dùng "${word.word}" gần ngữ cảnh đề gốc.`,
        `Nói 2 collocations hoặc tình huống mà "${word.word}" nên xuất hiện.`,
        `Nếu gặp "${word.word}" trong reading, bạn sẽ hiểu nó qua dấu hiệu nào?`
      ];
      const seed = String(word.id || word.word).split("").reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
      return prompts[seed % prompts.length];
    }

    function getFilteredWords() {
      const keyword = state.search.trim().toLowerCase();
      return state.words.filter((item) => {
        const matchesSource = state.sourceFilter === "all" || item.source === state.sourceFilter;
        const matchesStatus =
          state.statusFilter === "all" ||
          (state.statusFilter === "due" && isDue(item)) ||
          (state.statusFilter === "growing" && item.stage >= 1 && item.stage <= 3) ||
          (state.statusFilter === "locked" && item.stage >= 4);
        const haystack = [
          item.word,
          item.meaning,
          item.nuance,
          item.collocations,
          item.example,
          item.prompt,
          item.source,
          ...(item.tags || [])
        ].join(" ").toLowerCase();
        const matchesKeyword = !keyword || haystack.includes(keyword);
        return matchesSource && matchesStatus && matchesKeyword;
      });
    }

    function getSelectedWord(filteredWords) {
      const selected = filteredWords.find((item) => item.id === state.selectedId);
      if (selected) return selected;
      return filteredWords[0] || state.words[0] || null;
    }

    function pickNextWord(currentId, filteredWords) {
      if (!filteredWords.length) return "";
      const currentIndex = filteredWords.findIndex((item) => item.id === currentId);
      if (currentIndex === -1 || currentIndex === filteredWords.length - 1) return filteredWords[0].id;
      return filteredWords[currentIndex + 1].id;
    }

    function updateWord(wordId, updater) {
      state.words = state.words.map((item) => item.id === wordId ? updater(item) : item);
      saveState();
      render();
    }

    function createEmptySession() {
      return {
        active: false,
        completed: false,
        source: "",
        queue: [],
        currentIndex: 0,
        results: { again: 0, hard: 0, good: 0, easy: 0 }
      };
    }

    function startSession(wordIds, source) {
      if (!wordIds.length) return;
      state.session = {
        active: true,
        completed: false,
        source,
        queue: [...wordIds],
        currentIndex: 0,
        results: { again: 0, hard: 0, good: 0, easy: 0 }
      };
      state.selectedId = wordIds[0];
      state.showAnswer = false;
      state.recallDraft = "";
      saveState();
      render();
    }

    function stopSession(keepSummary = false) {
      if (!keepSummary) {
        state.session = createEmptySession();
      } else {
        state.session = {
          ...state.session,
          active: false,
          completed: true
        };
      }
      state.showAnswer = false;
      state.recallDraft = "";
      saveState();
      render();
    }

    function gradeWord(wordId, quality) {
      const currentDay = todayString();
      updateWord(wordId, (item) => {
        let stage = item.stage;
        let successes = item.successes;
        let lapses = item.lapses;

        if (quality === "again") {
          stage = Math.max(0, stage - 1);
          lapses += 1;
        } else if (quality === "hard") {
          stage = Math.max(1, stage);
          successes += 1;
        } else if (quality === "good") {
          stage = Math.min(4, stage + 1);
          successes += 1;
        } else if (quality === "easy") {
          stage = Math.min(4, stage + 2);
          successes += 1;
        }

        stage = Math.max(0, Math.min(4, stage));
        const waitDays =
          quality === "again"
            ? 0
            : quality === "easy"
              ? (INTERVALS[stage] || 14) + 3
              : (INTERVALS[stage] || 14);

        return {
          ...item,
          stage,
          successes,
          lapses,
          lastReviewed: currentDay,
          nextReview: addDays(currentDay, waitDays)
        };
      });

      if (state.session && state.session.active && state.session.queue.includes(wordId)) {
        const nextResults = {
          again: state.session.results.again,
          hard: state.session.results.hard,
          good: state.session.results.good,
          easy: state.session.results.easy
        };
        nextResults[quality] += 1;
        const nextIndex = state.session.currentIndex + 1;
        if (nextIndex >= state.session.queue.length) {
          state.session = {
            ...state.session,
            active: false,
            completed: true,
            currentIndex: state.session.queue.length,
            results: nextResults
          };
        } else {
          state.session = {
            ...state.session,
            currentIndex: nextIndex,
            results: nextResults
          };
          state.selectedId = state.session.queue[nextIndex];
        }
      } else {
        const filteredWords = getFilteredWords();
        state.selectedId = pickNextWord(wordId, filteredWords);
      }

      state.showAnswer = false;
      state.recallDraft = "";
      saveState();
      render();
    }

      state.words = [newWord, ...state.words];

      state.recallDraft = "";
      saveState();

    function bindEvents() {
      const addWordForm = document.getElementById("addWordForm");
      if (addWordForm) {
        addWordForm.addEventListener("submit", addWordFromForm);
      }

      const searchInput = document.getElementById("searchInput");
      if (searchInput) {

          state.search = event.target.value;
          saveState();
          render();
        });
      }

      const recallDraft = document.getElementById("recallDraft");
      if (recallDraft) {
        recallDraft.addEventListener("input", (event) => {
          state.recallDraft = event.target.value;
          saveState();
        });
      }

      app.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.statusFilter = button.dataset.filter;
          saveState();
          render();
        });
      });

      app.querySelectorAll("[data-source]").forEach((button) => {
        button.addEventListener("click", () => {
          state.sourceFilter = button.dataset.source;
          state.recallDraft = "";
          saveState();
          render();
        });
      });

      app.querySelectorAll("[data-word-id]").forEach((card) => {
        card.addEventListener("click", () => {
          state.selectedId = card.dataset.wordId;
          state.showAnswer = false;
          state.recallDraft = "";
          saveState();
          render();
        });
      });

      const toggleAnswer = app.querySelector("[data-action='toggle-answer']");
      if (toggleAnswer) {
        toggleAnswer.addEventListener("click", () => {
          state.showAnswer = !state.showAnswer;
          saveState();
          render();
        });
      }

      const clearDraft = app.querySelector("[data-action='clear-draft']");
      if (clearDraft) {
        clearDraft.addEventListener("click", () => {
          state.recallDraft = "";
          saveState();
          render();
        });
      }

      const startSessionButton = app.querySelector("[data-action='start-session']");
      if (startSessionButton) {
        startSessionButton.addEventListener("click", () => {
          const queue = getFilteredWords()
            .filter((item) => item.source === state.sourceFilter)
            .map((item) => item.id);
          startSession(queue, state.sourceFilter);
        });
      }

      const stopSessionButton = app.querySelector("[data-action='stop-session']");
      if (stopSessionButton) {
        stopSessionButton.addEventListener("click", () => {
          stopSession(true);
        });
      }

      const nextWord = app.querySelector("[data-action='next-word']");
      if (nextWord) {
        nextWord.addEventListener("click", () => {
          if (state.session && state.session.active) {
            const nextIndex = Math.min(state.session.currentIndex + 1, state.session.queue.length - 1);
            state.session.currentIndex = nextIndex;
            state.selectedId = state.session.queue[nextIndex] || state.selectedId;
          } else {
            const filteredWords = getFilteredWords();
            state.selectedId = pickNextWord(state.selectedId, filteredWords);
          }
          state.showAnswer = false;
          state.recallDraft = "";
          saveState();
          render();
        });
      }

      app.querySelectorAll("[data-grade]").forEach((button) => {
        button.addEventListener("click", () => {
          if (!state.selectedId) return;
          gradeWord(state.selectedId, button.dataset.grade);
        });
      });
    }

    render();
  </script>
</body>
</html>
