<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <meta name="theme-color" content="#050918" />
  <title>Lịch học 12/05 - 10/06</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #02040c;
      --bg-2: #061126;
      --bg-3: #0b1a39;
      --bg-4: #160f33;
      --panel: rgba(8, 13, 28, 0.7);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --border: rgba(161, 176, 255, 0.14);
      --text: #eef4ff;
      --muted: #9fb0d3;
      --blue: #4f8cff;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --rose: #fb7185;
      --green: #34d399;
      --amber: #fbbf24;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(91, 126, 255, 0.2), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(34, 211, 238, 0.14), transparent 16%),
        radial-gradient(circle at 50% 84%, rgba(168, 85, 247, 0.12), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 38%, var(--bg-3) 72%, var(--bg-4));
      overflow-x: hidden;
    }

    body { position: relative; }
    button, input, textarea, select { font: inherit; }

    .universe {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .nebula,
    .nebula::before,
    .nebula::after {
      content: "";
      position: absolute;
      inset: -16%;
      filter: blur(62px);
    }

    .nebula {
      background:
        radial-gradient(circle at 14% 28%, rgba(88, 113, 255, 0.22), transparent 14%),
        radial-gradient(circle at 78% 24%, rgba(58, 235, 255, 0.16), transparent 14%),
        radial-gradient(circle at 46% 74%, rgba(196, 103, 255, 0.14), transparent 16%);
      animation: driftNebula 24s ease-in-out infinite alternate;
    }

    .nebula::before {
      background:
        radial-gradient(circle at 30% 62%, rgba(122, 160, 255, 0.16), transparent 14%),
        radial-gradient(circle at 70% 58%, rgba(83, 244, 255, 0.1), transparent 14%);
      animation: driftNebula 32s ease-in-out infinite alternate-reverse;
    }

    .nebula::after {
      background:
        radial-gradient(circle at 52% 34%, rgba(255, 255, 255, 0.06), transparent 9%),
        radial-gradient(circle at 34% 82%, rgba(191, 121, 255, 0.1), transparent 14%);
      animation: driftNebula 36s ease-in-out infinite alternate;
    }

    .space-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(130, 170, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130, 170, 255, 0.045) 1px, transparent 1px);
      background-size: 100px 100px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 84%);
      opacity: 0.22;
      transform: perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }

    .stars,
    .stars2,
    .stars3 {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size: 800px 300px;
      opacity: .9;
      animation: driftStars 100s linear infinite;
    }

    .stars2 {
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size: 900px 380px;
      animation: driftStarsReverse 145s linear infinite;
      opacity: .55;
    }

    .stars3 {
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size: 1000px 420px;
      animation: twinkle 7s ease-in-out infinite alternate;
      opacity: .7;
      filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      filter: drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity: 0;
      pointer-events: none;
      transform: rotate(-25deg);
      animation: shooting 9s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .shooting-star.one { top: 12%; left: 72%; animation-delay: 0s; }
    .shooting-star.two { top: 26%; left: 18%; width: 140px; animation-delay: 3s; }
    .shooting-star.three { top: 8%; left: 45%; width: 210px; animation-delay: 6s; }

    .flag-burst {
      --flag-top: 88px;
      --flag-right: max(5%, 22px);
      --flag-shift-x: -18px;
      --flag-shift-y: 14px;
      --flag-tilt: -5deg;
      position: absolute;
      right: var(--flag-right);
      top: var(--flag-top);
      width: min(300px, 34vw);
      aspect-ratio: 5 / 3;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(var(--flag-shift-x), var(--flag-shift-y), 0) rotate(var(--flag-tilt)) scale(.96);
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
      filter: drop-shadow(0 0 16px rgba(255,214,136,.12));
    }

    .flag-burst::before {
      content: "";
      position: absolute;
      inset: -10% -8%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,205,112,.16), transparent 34%),
        radial-gradient(circle at 50% 52%, rgba(255,244,218,.08), transparent 58%);
      filter: blur(22px);
      opacity: 0;
      transform: scale(.88);
      transition: opacity .9s ease, transform 1s ease;
    }

    .flag-burst::after {
      content: "";
      position: absolute;
      inset: 8% 12%;
      background: radial-gradient(circle at 50% 50%, rgba(255,232,170,.16), transparent 62%);
      filter: blur(24px);
      opacity: 0;
    }

    body.flag-burst-active .flag-burst {
      opacity: 1;
      transform: translate3d(0, 0, 0) rotate(var(--flag-tilt)) scale(1);
      filter: drop-shadow(0 0 22px rgba(255,224,158,.22));
    }

    body.flag-burst-active .flag-burst::before {
      opacity: .72;
      transform: scale(1);
      animation: flagAuraPulse 2.8s ease-in-out infinite alternate;
    }

    body.flag-burst-active .flag-burst::after {
      opacity: .5;
      animation: flagAuraDrift 3.2s ease-in-out infinite alternate;
    }

    .flag-burst svg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flag-dot {
      fill: #ffe4a0;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      filter: drop-shadow(0 0 5px rgba(255,224,154,.28));
    }

    .flag-dot.major {
      fill: #fff5d6;
      filter: drop-shadow(0 0 10px rgba(255,238,196,.48));
    }

    .flag-dot.soft {
      fill: #ffd27f;
      filter: drop-shadow(0 0 4px rgba(255,202,108,.22));
    }

    body.flag-burst-active .flag-dot {
      animation:
        flagDotAppear .9s ease forwards,
        flagDotTwinkle 2.25s ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s), calc(var(--delay, 0s) + .92s);
    }

    body.flag-burst-active .flag-dot.soft {
      animation-duration: 1s, 1.9s;
    }

    body.flag-burst-active .flag-dot.major {
      animation-duration: .82s, 2.5s;
    }

    .floating-planet {
      position: absolute;
      border-radius: 50%;
      box-shadow:
        inset -20px -24px 36px rgba(0,0,0,0.38),
        inset 8px 8px 16px rgba(255,255,255,0.12),
        0 24px 40px rgba(0,0,0,0.28);
      opacity: 0.82;
      animation: planetFloat 9s ease-in-out infinite;
    }

    .floating-planet::before,
    .floating-planet::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .floating-planet::before {
      inset: -18%;
      background: radial-gradient(circle, rgba(94, 156, 255, 0.18), transparent 66%);
      filter: blur(12px);
    }

    .floating-planet::after {
      inset: 8%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.28), transparent 18%),
        radial-gradient(circle at 62% 54%, rgba(0,0,0,0.18), transparent 20%);
      opacity: 0.88;
    }

    .floating-planet.p1 {
      width: 78px;
      height: 78px;
      left: 6%;
      top: 22%;
      background: linear-gradient(155deg, #b7d2ff, #5279ff 46%, #15214c 100%);
    }

    .floating-planet.p3 .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150%;
      height: 34%;
      transform: translate(-50%, -50%) rotate(-12deg);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .floating-planet.p3 {
      width: 56px;
      height: 56px;
      left: 18%;
      bottom: 14%;
      background: linear-gradient(155deg, #a7f3d0, #059669 46%, #062a28 100%);
      animation-duration: 8s;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 32px;
    }

    .hero-shell {
      position: relative;
      overflow: visible;
      padding: 32px;
      border-radius: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 420px);
      gap: 28px;
      align-items: stretch;
      position: relative;
      z-index: 2;
      overflow: visible;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: stretch;
      height: 100%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.22);
      color: #ddd6fe;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #d8b4fe);
      box-shadow: 0 0 12px rgba(103, 232, 255, 0.75);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy p {
      color: var(--muted);
      max-width: 720px;
      line-height: 1.8;
      font-size: 15px;
    }

    .hero-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-tag {
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e4ff;
      font-size: 13px;
    }

    .hero-day-card {
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: visible;
      display: grid;
      gap: 18px;
      height: 100%;
    }

    .hero-day-card::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .hero-day-card::before {
      content: "";
      position: absolute;
      right: 166px;
      top: 8px;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(116,160,255,.2), transparent 56%),
        radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
      filter: blur(18px);
      opacity: 0.92;
    }

    .hero-day-main,
    .hero-day-focus {
      position: relative;
      z-index: 1;
    }

    .hero-day-focus {
      z-index: 4;
    }

    .hero-day-main {
      display: grid;
      gap: 10px;
      padding-right: 216px;
    }

    .hero-progress-inline {
      width: min(220px, calc(100% - 40px));
      margin-top: 4px;
    }

    .hero-day-focus {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-focus-card {
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 120px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-focus-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .hero-focus-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1;
      color: #f8fbff;
    }

    .hero-focus-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero-planet {
      --planet-highlight: #f8fafc;
      --planet-soft: #c7cdd6;
      --planet-mid: #818899;
      --planet-deep: #303746;
      --planet-shadow: #171c25;
      --planet-glow-a: rgba(126,174,255,.18);
      --planet-glow-b: rgba(196,122,255,.08);
      --planet-band: rgba(232,236,242,.28);
      --planet-crater-light: rgba(255,255,255,.16);
      --planet-crater-dark: rgba(0,0,0,.14);
      position: absolute;
      top: 16px;
      right: 92px;
      width: 118px;
      height: 118px;
      pointer-events: none;
      z-index: 1;
      transform-style: preserve-3d;
      animation: heroPlanetFloat 8s ease-in-out infinite;
    }

    .hero-planet-ball {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transform-style: preserve-3d;
      box-shadow:
        inset -30px -34px 46px rgba(0,0,0,.48),
        inset 12px 12px 24px rgba(255,255,255,.10),
        inset -6px -8px 14px rgba(0,0,0,.2),
        0 26px 46px rgba(0,0,0,.38);
      overflow: visible;
      isolation: isolate;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.18) 12%, transparent 18%),
        radial-gradient(circle at 52% 58%, color-mix(in srgb, var(--planet-soft) 34%, transparent), transparent 26%),
        linear-gradient(155deg, var(--planet-highlight) 0%, var(--planet-soft) 36%, var(--planet-mid) 58%, var(--planet-deep) 76%, var(--planet-shadow) 100%);
    }

    .hero-planet-ball::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter: blur(7px);
      z-index: 6;
      pointer-events: none;
    }

    .hero-planet-ball::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 22px rgba(119,166,255,.10), inset 0 0 18px rgba(255,255,255,.04);
      pointer-events: none;
      z-index: 2;
    }

    .hero-planet-aura {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--planet-glow-a), transparent 60%),
        radial-gradient(circle, var(--planet-glow-b), transparent 76%);
      filter: blur(16px);
      opacity: .9;
      z-index: -2;
      animation: auraPulse 4.5s ease-in-out infinite;
    }

    .hero-planet-atmosphere {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity: .88;
      z-index: 5;
      animation: atmosphereRotate 32s linear infinite;
      background:
        radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, rgba(229,234,240,.16) 124deg, rgba(255,255,255,0) 190deg, rgba(182,189,200,.12) 260deg, rgba(255,255,255,0) 360deg);
    }

    .hero-planet-surface {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
      mix-blend-mode: soft-light;
      opacity: .82;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.20), transparent 16%),
        radial-gradient(circle at 54% 56%, color-mix(in srgb, var(--planet-deep) 36%, transparent), transparent 22%),
        radial-gradient(circle at 68% 30%, color-mix(in srgb, var(--planet-soft) 30%, transparent), transparent 12%);
    }

    .hero-planet-surface::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter: blur(5px);
      animation: surfaceDrift 24s linear infinite;
    }

    .hero-planet-surface::after {
      content: "";
      position: absolute;
      inset: -14%;
      background: repeating-linear-gradient(155deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 24px);
      opacity: .34;
      filter: blur(3px);
      transform: rotate(-10deg);
    }

    .hero-planet-night {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 4;
      background: linear-gradient(120deg, transparent 35%, rgba(0,0,0,.68) 85%);
    }

    .hero-planet-band {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 42%;
      height: 16%;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .72;
      z-index: 6;
      transform: rotate(-15deg);
      background: linear-gradient(90deg, transparent, var(--planet-band), transparent);
      animation: bandShift 9s ease-in-out infinite;
    }

    .hero-planet-crater {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--planet-crater-light), var(--planet-crater-dark) 70%, transparent 72%);
      opacity: .42;
      mix-blend-mode: screen;
      z-index: 6;
    }

    .hero-planet-crater.c1 { width: 18%; height: 18%; left: 24%; top: 46%; }
    .hero-planet-crater.c2 { width: 12%; height: 12%; left: 58%; top: 28%; opacity: .28; }
    .hero-planet-crater.c3 { width: 10%; height: 10%; left: 48%; top: 62%; opacity: .22; }

    .hero-planet-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 1;
    }

    .hero-planet-orbit::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(220,226,236,.22);
      box-shadow: 0 0 10px rgba(220,226,236,.14);
    }

    .hero-planet-orbit::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      border: 1px dashed rgba(186,194,206,.22);
      filter: blur(.5px);
    }

    .hero-planet-orbit.po1 {
      width: 190%;
      height: 190%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg);
      animation: pOrbit1 12s linear infinite;
    }

    .hero-planet-orbit.po2 {
      width: 250%;
      height: 250%;
      transform: translate(-50%, -50%) rotateX(68deg) rotateY(5deg);
      animation: pOrbit2 24s linear infinite reverse;
    }

    .hero-planet-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 210%;
      height: 210%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg);

      letter-spacing: 0.06em;

    .progress {

      content: "";

      top: -1px;
      left: 50%;
      width: min(180px, 30vw);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(79,140,255,0.75), transparent);
      box-shadow: 0 0 18px rgba(79,140,255,0.28);

      padding-block: 18px;

    .countdown-section::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(840px, calc(100% - 120px));

      transform: translateX(-50%);

      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03)),

      box-shadow:
        0 24px 70px rgba(0,0,0,0.34),

      -webkit-backdrop-filter: blur(18px);

    .countdown-card::after {

      inset: auto;
      border-radius: 50%;

      height: 220px;
      right: -68px;

      gap: 12px;
    }

    .countdown-kicker {

      color: #d9e6ff;

      background: rgba(255,255,255,0.06);

    .countdown-track {

    .countdown-track::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 0;
      width: 140px;
      height: 1px;
      background: linear-gradient(90deg, var(--countdown-line), transparent);
      box-shadow: 0 0 20px var(--countdown-line);

    .countdown-grid {

    .countdown-segment {

    @keyframes driftNebula {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: .82; }
      to { transform: translate3d(-2%, 2%, 0) scale(1.05); opacity: 1; }
    }

    @keyframes driftStars {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-90px, -260px, 0); }
    }

    @keyframes driftStarsReverse {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(70px, 220px, 0); }
    }

    @keyframes twinkle {
      from { opacity: .45; transform: scale(1); }
      to { opacity: .9; transform: scale(1.03); }
    }

    @keyframes shooting {
      0%,100% { opacity: 0; transform: translate3d(0,0,0) rotate(-25deg) scaleX(.7); }
      8% { opacity: 1; }
      18% { opacity: 0; transform: translate3d(-220px,140px,0) rotate(-25deg) scaleX(1); }
    }

    @keyframes flagDotAppear {
      0% { opacity: 0; transform: scale(.18); }
      42% { opacity: .46; transform: scale(.72); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes flagDotTwinkle {
      0% { opacity: .16; filter: drop-shadow(0 0 4px rgba(255,214,140,.22)); }
      36% { opacity: 1; filter: drop-shadow(0 0 13px rgba(255,240,196,.76)); }
      100% { opacity: .34; filter: drop-shadow(0 0 7px rgba(255,226,170,.42)); }
    }

    @keyframes flagAuraPulse {
      0% { opacity: .28; transform: scale(.92); }
      100% { opacity: .82; transform: scale(1.05); }
    }

    @keyframes flagAuraDrift {
      0% { opacity: .18; transform: translate3d(-6px,4px,0) scale(.96); }
      100% { opacity: .58; transform: translate3d(8px,-5px,0) scale(1.08); }
    }

    @keyframes planetFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes heroPlanetFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    @keyframes auraPulse {
      0%,100% { transform: scale(1); opacity: .72; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes atmosphereRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes surfaceDrift {
      from { transform: translateX(0) rotate(0deg); }
      to { transform: translateX(-10px) rotate(8deg); }
    }

    @keyframes bandShift {
      0%,100% { transform: rotate(-15deg) translateY(0); opacity: .55; }

    }

    @keyframes moonOrbit1 {

    }

      50% { transform: translate3d(-12px,14px,0) scale(.92); }
    }

    @keyframes pOrbit1 {

      to { transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg) rotateZ(360deg); }

    @keyframes pOrbit2 {

      while (cursor <= end) {
        const dd = String(cursor.getDate()).padStart(2, "0");
        const mm = String(cursor.getMonth() + 1).padStart(2, "0");
        days.push({
          date: `${dd}/${mm}`,
          phase: "Lịch tự nhập",
          weekday: weekdayMap[cursor.getDay()],
          physics: [],
          math: [],
          english: [],
          review: [],
          note: ""
        });
        cursor.setDate(cursor.getDate() + 1);
      }

      return days;

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function expandTaskEntry(text) {
      const normalized = String(text).trim();
      if (!normalized) return [];

      const colonMatch = normalized.match(/^([^:]+:\s*)(.+)$/);
      if (colonMatch) {
        const [, prefix, rest] = colonMatch;
        if (rest.includes(",")) {
          return rest.split(",").map((part) => `${prefix}${part.trim()}`).filter(Boolean);
        }
      }

      const seriesMatch = normalized.match(/^(Bắc Trung Nam Đề|Đề|Topic)\s+(.+)$/i);
      if (seriesMatch && seriesMatch[2].includes(",")) {
        const label = seriesMatch[1];
        return seriesMatch[2].split(",").map((part) => `${label} ${part.trim()}`).filter(Boolean);
      }

      return [normalized];
    }

    function createTaskItems(list) {
      return list.flatMap((text) => expandTaskEntry(text)).map((text) => ({ text, done: false }));
    }

    function normalizeTaskItems(items) {
      if (!Array.isArray(items)) return [];
      return items
        .filter((item) => item && typeof item.text === "string" && item.text.trim())
        .map((item) => ({ text: item.text.trim(), done: !!item.done }));
    }

    function mergeTaskItems(savedItems, freshItems) {
      const safeFresh = normalizeTaskItems(freshItems);
      const safeSaved = normalizeTaskItems(savedItems);
      if (!safeSaved.length) return safeFresh;
      if (!safeFresh.length) return safeSaved;

      const savedByText = new Map(safeSaved.map((item) => [item.text, !!item.done]));
      const merged = safeFresh.map((item) => ({
        ...item,
        done: savedByText.has(item.text) ? savedByText.get(item.text) : item.done
      }));

      safeSaved.forEach((item) => {
        if (!merged.some((fresh) => fresh.text === item.text)) merged.push(item);
      });

      return merged;
    }

    function createTaskMap() {
      const map = {};
      initialSchedule.forEach((day) => {
        map[day.date] = {
          physics: createTaskItems(day.physics),
          math: createTaskItems(day.math),
          english: createTaskItems(day.english),
          review: createTaskItems(day.review),
          dailyNote: "",
          pace: "Đúng nhịp",
          customAdd: ""
        };
      });
      return map;
    }

    const defaultState = {
      schedule: clone(initialSchedule),
      selectedDate: initialSchedule[0].date,
      query: "",
      phaseFilter: "Tất cả",
      tab: "all",
      tasks: createTaskMap()
    };

    function normalizeSchedule(savedSchedule) {
      const savedByDate = new Map(
        Array.isArray(savedSchedule)
          ? savedSchedule.filter((day) => day && typeof day.date === "string").map((day) => [day.date, day])
          : []
      );

      return initialSchedule.map((freshDay) => {
        const savedDay = savedByDate.get(freshDay.date) || {};
        return {
          ...freshDay,
          phase: typeof savedDay.phase === "string" && savedDay.phase.trim() ? savedDay.phase : freshDay.phase,
          note: typeof savedDay.note === "string" ? savedDay.note : freshDay.note
        };
      });
    }

    function mergeTasks(savedTasks, freshTasks) {
      const merged = {};
      Object.keys(freshTasks).forEach((date) => {
        const savedDay = savedTasks && savedTasks[date] ? savedTasks[date] : {};
        merged[date] = {
          physics: mergeTaskItems(savedDay.physics, freshTasks[date].physics),
          math: mergeTaskItems(savedDay.math, freshTasks[date].math),
          english: mergeTaskItems(savedDay.english, freshTasks[date].english),
          review: mergeTaskItems(savedDay.review, freshTasks[date].review),
          dailyNote: typeof savedDay.dailyNote === "string" ? savedDay.dailyNote : "",
          pace: typeof savedDay.pace === "string" ? savedDay.pace : "Đúng nhịp",
          customAdd: typeof savedDay.customAdd === "string" ? savedDay.customAdd : ""
        };
      });
      return merged;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        const saved = JSON.parse(raw);
        const schedule = normalizeSchedule(saved.schedule);
        const validDates = new Set(schedule.map((day) => day.date));

        return {
          schedule,
          selectedDate: validDates.has(saved.selectedDate) ? saved.selectedDate : initialSchedule[0].date,
          query: typeof saved.query === "string" ? saved.query : "",
          phaseFilter: typeof saved.phaseFilter === "string" ? saved.phaseFilter : "Tất cả",
          tab: typeof saved.tab === "string" ? saved.tab : "all",
          tasks: mergeTasks(saved.tasks, createTaskMap())
        };
      } catch (err) {
        console.error("Không đọc được dữ liệu localStorage, dùng trạng thái mặc định:", err);
        return clone(defaultState);
      }
    }

    const state = loadState();

    function persistState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.error("Không lưu được dữ liệu vào localStorage:", err);
      }
    }

    function saveState() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        persistState();
        saveTimer = 0;

      return String(str ?? "")
        .replaceAll("&", "&amp;")

        .replaceAll(">", "&gt;")

        .replaceAll("'", "&#039;");

    function hashPlanetSeed(seed) {
      return String(seed).split("").reduce((hash, char) => ((hash << 5) - hash + char.charCodeAt(0)) >>> 0, 2166136261);
    }

    function applyDailyPlanetPalette(seed) {
      const planet = document.querySelector(".hero-planet");

      const daySeed = seed || new Date().toLocaleDateString("vi-VN");
      const palette = DAILY_PLANET_PALETTES[hashPlanetSeed(daySeed) % DAILY_PLANET_PALETTES.length];

      planet.setAttribute("data-planet-palette", palette.name);
    }

    function getUpcomingExamDate(month, day) {
      const now = new Date();
      const currentYear = now.getFullYear();
      let target = new Date(currentYear, month - 1, day, 0, 0, 0, 0);
      if (target.getTime() <= now.getTime()) {
        target = new Date(currentYear + 1, month - 1, day, 0, 0, 0, 0);
      }
      return target;
    }

    function formatExamDate(target) {
      const dd = String(target.getDate()).padStart(2, "0");
      const mm = String(target.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}/${target.getFullYear()}`;
    }

    function getCountdownParts(targetTime) {
      const diff = Math.max(0, targetTime - Date.now());
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return {
        done: diff <= 0,
        days: String(days).padStart(2, "0"),
        hours: String(hours).padStart(2, "0"),
        minutes: String(minutes).padStart(2, "0"),
        seconds: String(seconds).padStart(2, "0")
      };

    function initExamCountdowns() {
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }

      examCountdownNodes = [...document.querySelectorAll("[data-countdown-target]")].map((item) => ({
        targetTime: Number(item.dataset.countdownTarget),
        days: item.querySelector("[data-unit='days']"),
        hours: item.querySelector("[data-unit='hours']"),
        minutes: item.querySelector("[data-unit='minutes']"),
        seconds: item.querySelector("[data-unit='seconds']"),
        note: item.querySelector(".countdown-note"),
        done: false
      }));
      if (!examCountdownNodes.length) return;

      const updateCountdowns = () => {
        examCountdownNodes.forEach((item) => {
          const parts = getCountdownParts(item.targetTime);

          if (item.days && item.days.textContent !== parts.days) item.days.textContent = parts.days;
          if (item.hours && item.hours.textContent !== parts.hours) item.hours.textContent = parts.hours;
          if (item.minutes && item.minutes.textContent !== parts.minutes) item.minutes.textContent = parts.minutes;
          if (item.seconds && item.seconds.textContent !== parts.seconds) item.seconds.textContent = parts.seconds;

          const note = item.note;
          if (parts.done && !item.done && item.note) {
            item.note.textContent = "ÄÃ£ tá»›i má»‘c thi. HÃ­t sÃ¢u, vÃ o phÃ²ng vá»›i cÃ¡i Ä‘áº§u tháº­t tá»‰nh vÃ  gá»n.";
            if (note) note.textContent = "Đã tới mốc thi. Hít sâu, vào phòng với cái đầu thật tỉnh và gọn.";
          }
          item.done = parts.done;
        });
      };

      updateCountdowns();
      examCountdownTimer = window.setInterval(updateCountdowns, 1000);
    }

        const tasks = [...taskGroup.physics, ...taskGroup.math, ...taskGroup.english, ...taskGroup.review];
        const taskTexts = tasks.map((task) => task.text);
        const haystack = [day.date, day.weekday, day.phase, day.note, ...taskTexts].join(" ").toLowerCase();
        const queryMatch = !state.query || haystack.includes(state.query.toLowerCase());
        const phaseMatch = state.phaseFilter === "Tất cả" || day.phase === state.phaseFilter;
        let tabMatch = true;
        if (state.tab === "active") tabMatch = tasks.some((task) => !task.done);
        if (state.tab === "done") tabMatch = tasks.length > 0 && tasks.every((task) => task.done);
        return queryMatch && phaseMatch && tabMatch;
      });
    }

    function simplifyText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function normalizeImportSubject(rawSubject) {
      const subject = simplifyText(rawSubject);
      const subjectMap = new Map([
        ["vat li", "physics"], ["vat ly", "physics"], ["ly", "physics"], ["vl", "physics"], ["physics", "physics"],
        ["toan", "math"], ["math", "math"], ["maths", "math"], ["m", "math"],
        ["tieng anh", "english"], ["anh", "english"], ["ta", "english"], ["english", "english"],
        ["on loi", "review"], ["on tap", "review"], ["recall", "review"], ["review", "review"], ["loi sai", "review"]
      ]);
      return subjectMap.get(subject) || "";
    }

    function normalizeImportDate(rawDate) {
      const value = String(rawDate || "").trim();
      const match = value.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?$/);
      if (!match) return "";
      const day = Number(match[1]);
      const month = Number(match[2]);
      const year = match[3] ? Number(match[3].length === 2 ? `20${match[3]}` : match[3]) : 2026;
      if (year !== 2026 || day < 1 || day > 31 || month < 1 || month > 12) return "";
      const normalized = `${String(day).padStart(2, "0")}/${String(month).padStart(2, "0")}`;
      return state.schedule.some((dayItem) => dayItem.date === normalized) ? normalized : "";
    }

    function parseScheduleImportText(rawText) {
      const errors = [];
      const entries = [];
      const cleanText = String(rawText || "").replace(/^\uFEFF/, "").replace(/\r/g, "");
      const lines = cleanText.split("\n");

      lines.forEach((rawLine, index) => {
        const lineNumber = index + 1;
        const line = rawLine.trim();
        if (!line || line.startsWith("#")) return;

        const lowerLine = simplifyText(line);
        if (lineNumber === 1 && lowerLine.includes("ngay") && lowerLine.includes("mon") && lowerLine.includes("noi dung")) return;

        const separator = line.includes("|") ? "|" : (line.includes(";") ? ";" : "");
        if (!separator) {
          errors.push(`Dòng ${lineNumber}: thiếu dấu phân cách | giữa các cột.`);
          return;
        }

        const parts = line.split(separator).map((part) => part.trim());
        if (parts.length < 4) {
          errors.push(`Dòng ${lineNumber}: cần ít nhất 4 cột: Ngày | Môn | Giờ | Nội dung.`);
          return;
        }

        const [dateRaw, subjectRaw, timeRaw, contentRaw, ...noteParts] = parts;
        const date = normalizeImportDate(dateRaw);
        const group = normalizeImportSubject(subjectRaw);
        const time = timeRaw.trim();
        const content = contentRaw.trim();
        const note = noteParts.join(" | ").trim();

        if (!date) errors.push(`Dòng ${lineNumber}: ngày "${dateRaw}" không nằm trong khoảng 12/05 - 10/06/2026.`);
        if (!group) errors.push(`Dòng ${lineNumber}: môn "${subjectRaw}" chưa đúng. Dùng Vật lí, Toán, Tiếng Anh hoặc Ôn lỗi.`);
        if (!content) errors.push(`Dòng ${lineNumber}: thiếu nội dung học.`);
        if (!date || !group || !content) return;

        entries.push({
          lineNumber,
          date,
          group,
          text: time ? `${time} · ${content}` : content,
          note
        });
      });

      if (!entries.length && !errors.length) {
        errors.push("File rỗng hoặc chỉ có dòng chú thích. Hãy thêm ít nhất một dòng lịch học.");
      }

      return { entries, errors };
    }

    function clearAllImportedScheduleData() {
      state.schedule.forEach((day) => {
        day.note = "";
        const taskState = ensureTaskState(day.date);
        taskState.physics = [];
        taskState.math = [];
        taskState.english = [];
        taskState.review = [];
        taskState.pace = "Đúng nhịp";
      });
    }

    function appendDayNote(day, note) {
      if (!note) return;
      const current = String(day.note || "").trim();
      if (!current) {
        day.note = note;
        return;
      }
      if (!current.includes(note)) day.note = `${current}\n${note}`;
    }

    function importScheduleFromText(rawText, mode) {
      const { entries, errors } = parseScheduleImportText(rawText);
      if (errors.length) {
        importStatus = {
          type: "error",
          message: `File chưa đúng công thức. ${errors.slice(0, 5).join(" ")}${errors.length > 5 ? " ..." : ""}`
        };
        alert(importStatus.message);
        scheduleRender();
        return;
      }

      if (mode === "replace") clearAllImportedScheduleData();

      let added = 0;
      let skipped = 0;
      entries.forEach((entry) => {
        const taskState = ensureTaskState(entry.date);
        if (!Array.isArray(taskState[entry.group])) taskState[entry.group] = [];

        const duplicated = taskState[entry.group].some((item) => item.text === entry.text);
        if (duplicated) {
          skipped += 1;
        } else {
          taskState[entry.group].push({ text: entry.text, done: false });
          added += 1;
        }

        const day = state.schedule.find((item) => item.date === entry.date);
        if (day) appendDayNote(day, entry.note);
      });

      state.selectedDate = entries[0].date;
      importStatus = {
        type: "success",
        message: `Đã nhập ${added} lịch học từ file. ${skipped ? `Bỏ qua ${skipped} dòng bị trùng.` : "Không có dòng trùng."}`
      };
      saveState();
      scheduleRender();
    }

    function handleImportFile(file) {
      if (!file) return;
      const modeInput = document.getElementById("importMode");
      const mode = modeInput ? modeInput.value : "append";
      const reader = new FileReader();

      reader.onload = () => importScheduleFromText(reader.result, mode);
      reader.onerror = () => {
        importStatus = { type: "error", message: "Không đọc được file. Hãy thử lưu lại file dưới dạng UTF-8 rồi nhập lại." };
        alert(importStatus.message);
        scheduleRender();
      };
      reader.readAsText(file, "UTF-8");
    }

      const template = `# CÔNG THỨC NHẬP LỊCH HỌC\n# Mỗi dòng: Ngày | Môn | Giờ | Nội dung học | Ghi chú\n# Ngày chỉ nhận từ 12/05 đến 10/06/2026.\n# Môn nhận: Vật lí / Toán / Tiếng Anh / Ôn lỗi. Có thể viết tắt: VL, Toán, TA, Recall.\n\nNgày | Môn | Giờ | Nội dung học | Ghi chú\n12/05 | Toán | 19:00-20:30 | Hàm số: khảo sát, cực trị, GTLN-GTNN | Làm xong thì đánh dấu câu sai\n12/05 | Vật lí | 20:45-22:00 | Dao động cơ: 30 câu trắc nghiệm | Ưu tiên câu vận dụng\n13/05 | TA | Sáng | Part 2 True/False + 20 từ vựng | Ghi lại bẫy sai\n13/05 | Recall | 21:30 | Ôn lại lỗi sai trong đề hôm trước |`; 
      const blob = new Blob([template], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = "mau_cong_thuc_nhap_lich_hoc.txt";
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 500);
    }

                    <div class="section-title">Nhập file lịch học</div>
                    <div class="import-subline">Đúng mẫu là tự đưa vào ngày và môn.</div>
                  </div>
                </div>
                <div class="import-grid">
                  <label class="import-file-trigger">
                    <input id="importFile" type="file" accept=".txt,.csv,text/plain,text/csv" />
                    <span class="import-file-icon">↥</span>
                    <span class="import-file-text"><strong>Chọn tệp</strong><small>.txt / .csv</small></span>
                  </label>
                  <select id="importMode" class="select" aria-label="Chọn cách nhập file">
                    <option value="append">Gộp vào lịch</option>
                    <option value="replace">Xóa rồi nhập</option>
                  </select>
                  <button type="button" class="ghost-btn" data-action="download-template">File mẫu</button>
                  <div class="import-formula">Ngày | Môn | Giờ | Nội dung | Ghi chú</div>
                  <div class="import-status ${escapeHtml(importStatus.type)}">${escapeHtml(importStatus.message)}</div>
                </div>
              </div>
            </section>
          </div>
        </section>

        <section class="schedule-divider">
            <section class="glass schedule-shell">
              <div class="schedule-head">
                <div>
                  <div class="section-title">Thời Khóa Biểu Tổng Thể</div>
                  <div class="section-desc">Bảng này bắt đầu từ 12/05 đến 10/06. Các ô ban đầu trống để người dùng tự nhập lịch học.</div>
                </div>
                <div class="schedule-stats">
                  <span class="badge">${visibleDays.length} ngày</span>
                  <span class="badge">${done}/${total} việc</span>
                  <span class="badge ${paceClassMap[selectedTaskState.pace]}">${escapeHtml(selectedTaskState.pace)}</span>
                </div>
              </div>

              <div class="schedule-table-wrap">
                <table class="schedule-table">
                  <thead>
                    <tr>
                      <th>Ngày</th>
                      <th>Lịch học theo môn</th>
                      <th>Tiến độ</th>
                      <th>Ghi chú</th>
                      <th>Chọn nhanh</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${visibleDays.map((day) => {
                      const taskState = ensureTaskState(day.date);
                      const mainTasks = [...taskState.physics, ...taskState.math, ...taskState.english, ...taskState.review];
                      const mainDone = mainTasks.filter((item) => item.done).length;
                      const mainPercent = mainTasks.length ? Math.round((mainDone * 100) / mainTasks.length) : 0;

                      const renderTaskPanel = (title, items) => `
                        <div class="schedule-task-panel">
                          <div class="schedule-task-head">
                            <span class="schedule-task-title">${title}</span>
                            <span class="schedule-task-meta">${items.filter((item) => item.done).length}/${items.length}</span>
                          </div>
                          <div class="schedule-task-divider">
                            <span class="schedule-task-line"></span>
                          </div>
                          <div class="schedule-task-items">
                            ${items.length ? items.map((item) => `
                              <div class="schedule-task-item ${item.done ? "done" : ""}">
                                <span class="schedule-task-text">${escapeHtml(item.text)}</span>
                                <span class="schedule-task-state">${item.done ? "Xong" : "Chưa"}</span>
                              </div>
                            `).join("") : `<div class="muted">Chưa nhập</div>`}
                          </div>
                        </div>
                      `;

                      return `
                        <tr class="${state.selectedDate === day.date ? "active-row" : ""}">
                          <td class="schedule-date-cell">
                            <div class="schedule-date-main">${escapeHtml(day.date)}</div>
                            <div class="schedule-phase">${escapeHtml(day.weekday || day.phase)}</div>
                            <div class="schedule-day-badges">
                              <span class="badge ${paceClassMap[taskState.pace]}">${escapeHtml(taskState.pace)}</span>
                            </div>
                          </td>
                          <td>
                            <div class="schedule-subject-stack">
                              ${renderTaskPanel("Vật lí", taskState.physics)}
                              ${renderTaskPanel("Toán", taskState.math)}
                              ${renderTaskPanel("Tiếng Anh", taskState.english)}
                              ${renderTaskPanel("Ôn lỗi", taskState.review)}
                            </div>
                          </td>
                          <td class="schedule-progress-cell">
                            <div class="schedule-progress-stack">
                              <div class="schedule-progress-meta">
                                <span>${mainPercent}%</span>
                                <span>${mainDone}/${mainTasks.length}</span>
                              </div>
                              <div class="schedule-progress-bar"><span style="height:${mainPercent}%"></span></div>
                            </div>
                          </td>
                          <td class="schedule-note-cell">
                            <div class="schedule-note-snippet">${escapeHtml(getDisplayNote(day))}</div>
                          </td>
                          <td>
                            <button class="schedule-open-btn" data-action="select-date" data-date="${day.date}">Mở ngày</button>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            </section>
        </section>
      `;

      applyDailyPlanetPalette(selectedDay.date);
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
      });
      initExamCountdowns();
    }

    function syncHeroOrbitHeight() {
      const leftCard = document.querySelector(".hero-day-card");
      const rightCard = document.querySelector(".hero-orbit");
      const columns = document.querySelector(".orbit-progress-columns");
      const tracks = document.querySelectorAll(".orbit-progress-track");

      if (!leftCard || !rightCard || !columns) return;

      const leftHeight = Math.ceil(leftCard.getBoundingClientRect().height);
      const orbitStyle = window.getComputedStyle(rightCard);
      const padTop = parseFloat(orbitStyle.paddingTop) || 0;
      const padBottom = parseFloat(orbitStyle.paddingBottom) || 0;
      const availableHeight = Math.max(226, leftHeight - padTop - padBottom);
      const trackHeight = Math.max(150, availableHeight - 78);

      rightCard.style.height = `${leftHeight}px`;
      rightCard.style.minHeight = `${leftHeight}px`;
      columns.style.height = `${availableHeight}px`;
      tracks.forEach((track) => {
        track.style.height = `${trackHeight}px`;
      });
    }

    function handleAppClick(event) {
      const target = event.target.closest("[data-tab], [data-action]");
      if (!target) return;

      if (target.dataset.tab) {
        state.tab = target.dataset.tab;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "select-date") {
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle") {
        toggleTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "delete-task") {
        deleteTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "add-task") {
        addTaskFromForm();
        return;
      }

      if (target.dataset.action === "clear-day") {
        clearSelectedDay();
        return;
      }

      if (target.dataset.action === "download-template") {
        downloadImportTemplate();
        return;
      }

      if (target.dataset.action === "set-pace") {
        const paceMenu = target.closest(".pace-menu");
        if (paceMenu) paceMenu.open = false;
        setPace(target.dataset.pace);
      }
    }

    function handleAppInput(event) {
      if (event.target.id === "searchInput") {
        state.query = event.target.value;
        saveState();
        if (searchInputTimer) clearTimeout(searchInputTimer);
        searchInputTimer = window.setTimeout(() => {
          searchInputTimer = 0;
          scheduleRender();
        }, 120);
        return;
      }

      if (event.target.id === "noteInput") {
        const day = getSelectedDay();
        day.note = event.target.value;
        saveState();
      }
    }

    function handleAppChange(event) {
      if (event.target.id === "importFile") {
        handleImportFile(event.target.files && event.target.files[0]);
        return;
      }

      if (event.target.id !== "phaseSelect") return;
      state.phaseFilter = event.target.value;
      saveState();
      scheduleRender();
    }

    function randomizeFlagBurstPose() {
      const flagBurst = document.querySelector(".flag-burst");
      if (!flagBurst) return;

      const top = 42 + Math.round(Math.random() * 68);
      const right = 20 + Math.round(Math.random() * 54);
      const shiftX = -8 - Math.round(Math.random() * 22);
      const shiftY = 8 + Math.round(Math.random() * 14);
      const tilt = -12 + Math.round(Math.random() * 16);

      flagBurst.style.setProperty("--flag-top", `${top}px`);
      flagBurst.style.setProperty("--flag-right", `${right}px`);
      flagBurst.style.setProperty("--flag-shift-x", `${shiftX}px`);
      flagBurst.style.setProperty("--flag-shift-y", `${shiftY}px`);
      flagBurst.style.setProperty("--flag-tilt", `${tilt}deg`);
    }

    function triggerFlagBurst() {
      randomizeFlagBurstPose();
      document.body.classList.remove("flag-burst-active");
      void document.body.offsetWidth;
      document.body.classList.add("flag-burst-active");

      if (flagBurstTimer) clearTimeout(flagBurstTimer);
      flagBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("flag-burst-active");
        flagBurstTimer = 0;
      }, 4200);
    }

    function startFlagBurstLoop() {
      if (flagBurstLoop) clearInterval(flagBurstLoop);
      flagBurstLoop = window.setInterval(() => {
        triggerFlagBurst();
      }, 10000);
    }

    app.addEventListener("click", handleAppClick);
    app.addEventListener("input", handleAppInput);
    app.addEventListener("change", handleAppChange);
    window.addEventListener("resize", () => {
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
      });
    });
    window.addEventListener("pagehide", () => {
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }
      flushState();
    });
    render();
    window.setTimeout(triggerFlagBurst, 1800);
    startFlagBurstLoop();

  </script>
</body>
</html>
