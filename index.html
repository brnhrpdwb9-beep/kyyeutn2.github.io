<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <meta name="theme-color" content="#050918" />
  <title>Lịch học 12/05 - 10/06</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #02040c;
      --bg-2: #061126;
      --bg-3: #0b1a39;
      --bg-4: #160f33;
      --panel: rgba(8, 13, 28, 0.7);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --border: rgba(161, 176, 255, 0.14);
      --text: #eef4ff;
      --muted: #9fb0d3;
      --blue: #4f8cff;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --rose: #fb7185;
      --green: #34d399;
      --amber: #fbbf24;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(91, 126, 255, 0.2), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(34, 211, 238, 0.14), transparent 16%),
        radial-gradient(circle at 50% 84%, rgba(168, 85, 247, 0.12), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 38%, var(--bg-3) 72%, var(--bg-4));
      overflow-x: hidden;
    }

    body { position: relative; }
    button, input, textarea, select { font: inherit; }

    .universe {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .nebula,
    .nebula::before,
    .nebula::after {
      content: "";
      position: absolute;
      inset: -16%;
      filter: blur(62px);
    }

    .nebula {
      background:
        radial-gradient(circle at 14% 28%, rgba(88, 113, 255, 0.22), transparent 14%),
        radial-gradient(circle at 78% 24%, rgba(58, 235, 255, 0.16), transparent 14%),
        radial-gradient(circle at 46% 74%, rgba(196, 103, 255, 0.14), transparent 16%);
      animation: driftNebula 24s ease-in-out infinite alternate;
    }

    .nebula::before {
      background:
        radial-gradient(circle at 30% 62%, rgba(122, 160, 255, 0.16), transparent 14%),
        radial-gradient(circle at 70% 58%, rgba(83, 244, 255, 0.1), transparent 14%);
      animation: driftNebula 32s ease-in-out infinite alternate-reverse;
    }

    .nebula::after {
      background:
        radial-gradient(circle at 52% 34%, rgba(255, 255, 255, 0.06), transparent 9%),
        radial-gradient(circle at 34% 82%, rgba(191, 121, 255, 0.1), transparent 14%);
      animation: driftNebula 36s ease-in-out infinite alternate;
    }

    .space-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(130, 170, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130, 170, 255, 0.045) 1px, transparent 1px);
      background-size: 100px 100px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 84%);
      opacity: 0.22;
      transform: perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }

    .stars,
    .stars2,
    .stars3 {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size: 800px 300px;
      opacity: .9;
      animation: driftStars 100s linear infinite;
    }

    .stars2 {
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size: 900px 380px;
      animation: driftStarsReverse 145s linear infinite;
      opacity: .55;
    }

    .stars3 {
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size: 1000px 420px;
      animation: twinkle 7s ease-in-out infinite alternate;
      opacity: .7;
      filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      filter: drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity: 0;
      pointer-events: none;
      transform: rotate(-25deg);
      animation: shooting 9s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .shooting-star.one { top: 12%; left: 72%; animation-delay: 0s; }
    .shooting-star.two { top: 26%; left: 18%; width: 140px; animation-delay: 3s; }
    .shooting-star.three { top: 8%; left: 45%; width: 210px; animation-delay: 6s; }

    .flag-burst {
      --flag-top: 88px;
      --flag-right: max(5%, 22px);
      --flag-shift-x: -18px;
      --flag-shift-y: 14px;
      --flag-tilt: -5deg;
      position: absolute;
      right: var(--flag-right);
      top: var(--flag-top);
      width: min(300px, 34vw);
      aspect-ratio: 5 / 3;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(var(--flag-shift-x), var(--flag-shift-y), 0) rotate(var(--flag-tilt)) scale(.96);
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
      filter: drop-shadow(0 0 16px rgba(255,214,136,.12));
    }

    .flag-burst::before {
      content: "";
      position: absolute;
      inset: -10% -8%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,205,112,.16), transparent 34%),
        radial-gradient(circle at 50% 52%, rgba(255,244,218,.08), transparent 58%);
      filter: blur(22px);
      opacity: 0;
      transform: scale(.88);
      transition: opacity .9s ease, transform 1s ease;
    }

    .flag-burst::after {
      content: "";
      position: absolute;
      inset: 8% 12%;
      background: radial-gradient(circle at 50% 50%, rgba(255,232,170,.16), transparent 62%);
      filter: blur(24px);
      opacity: 0;
    }

    body.flag-burst-active .flag-burst {
      opacity: 1;
      transform: translate3d(0, 0, 0) rotate(var(--flag-tilt)) scale(1);
      filter: drop-shadow(0 0 22px rgba(255,224,158,.22));
    }

    body.flag-burst-active .flag-burst::before {
      opacity: .72;
      transform: scale(1);
      animation: flagAuraPulse 2.8s ease-in-out infinite alternate;
    }

    body.flag-burst-active .flag-burst::after {
      opacity: .5;
      animation: flagAuraDrift 3.2s ease-in-out infinite alternate;
    }

    .flag-burst svg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flag-dot {
      fill: #ffe4a0;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      filter: drop-shadow(0 0 5px rgba(255,224,154,.28));
    }

    .flag-dot.major {
      fill: #fff5d6;
      filter: drop-shadow(0 0 10px rgba(255,238,196,.48));
    }

    .flag-dot.soft {
      fill: #ffd27f;
      filter: drop-shadow(0 0 4px rgba(255,202,108,.22));
    }

    body.flag-burst-active .flag-dot {
      animation:
        flagDotAppear .9s ease forwards,
        flagDotTwinkle 2.25s ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s), calc(var(--delay, 0s) + .92s);
    }

    body.flag-burst-active .flag-dot.soft {
      animation-duration: 1s, 1.9s;
    }

    body.flag-burst-active .flag-dot.major {
      animation-duration: .82s, 2.5s;
    }

    .floating-planet {
      position: absolute;
      border-radius: 50%;
      box-shadow:
        inset -20px -24px 36px rgba(0,0,0,0.38),
        inset 8px 8px 16px rgba(255,255,255,0.12),
        0 24px 40px rgba(0,0,0,0.28);
      opacity: 0.82;
      animation: planetFloat 9s ease-in-out infinite;
    }

    .floating-planet::before,
    .floating-planet::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .floating-planet::before {
      inset: -18%;
      background: radial-gradient(circle, rgba(94, 156, 255, 0.18), transparent 66%);
      filter: blur(12px);
    }

    .floating-planet::after {
      inset: 8%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.28), transparent 18%),
        radial-gradient(circle at 62% 54%, rgba(0,0,0,0.18), transparent 20%);
      opacity: 0.88;
    }

    .floating-planet.p1 {
      width: 78px;
      height: 78px;
      left: 6%;
      top: 22%;
      background: linear-gradient(155deg, #b7d2ff, #5279ff 46%, #15214c 100%);
    }

    .floating-planet.p3 .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150%;
      height: 34%;
      transform: translate(-50%, -50%) rotate(-12deg);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .floating-planet.p3 {
      width: 56px;
      height: 56px;
      left: 18%;
      bottom: 14%;
      background: linear-gradient(155deg, #a7f3d0, #059669 46%, #062a28 100%);
      animation-duration: 8s;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 32px;
    }

    .hero-shell {
      position: relative;
      overflow: visible;
      padding: 32px;
      border-radius: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 420px);
      gap: 28px;
      align-items: stretch;
      position: relative;
      z-index: 2;
      overflow: visible;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: stretch;
      height: 100%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.22);
      color: #ddd6fe;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #d8b4fe);
      box-shadow: 0 0 12px rgba(103, 232, 255, 0.75);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy p {
      color: var(--muted);
      max-width: 720px;
      line-height: 1.8;
      font-size: 15px;
    }

    .hero-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-tag {
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e4ff;
      font-size: 13px;
    }

    .hero-day-card {
      padding: 28px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top right, rgba(34,211,238,0.18), transparent 24%),
        radial-gradient(circle at 18% 18%, rgba(79,140,255,0.16), transparent 26%),
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 32px 84px rgba(0,0,0,0.24);
      position: relative;
      overflow: visible;
      display: grid;
      grid-template-rows: auto auto;
      align-content: start;
      gap: 22px;
      height: 100%;
    }

    .hero-day-card::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .hero-day-card::before {
      content: "";
      position: absolute;
      right: 166px;
      top: 8px;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(116,160,255,.2), transparent 56%),
        radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
      filter: blur(18px);
      opacity: 0.92;
    }

    .hero-day-main,
    .hero-day-focus {
      position: relative;
      z-index: 1;
    }

    .hero-day-focus {
      z-index: 4;
    }

    .hero-day-main {
      display: grid;
      gap: 14px;
      padding-right: 232px;
    }

    .hero-progress-inline {
      width: min(320px, calc(100% - 40px));
      margin-top: 2px;
    }

    .hero-day-focus {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
    }

    .hero-focus-card {
      display: grid;
      gap: 8px;
      align-content: start;
      align-self: start;
      min-width: 0;
      min-height: 122px;
      padding: 16px 16px 15px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025)),
        rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .hero-focus-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .hero-focus-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1;
      color: #f8fbff;
    }

    .hero-focus-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero-stat-card {
      min-height: 122px;
    }

    .hero-stat-card .hero-focus-label {
      line-height: 1.35;
      letter-spacing: 0.06em;
    }

    .hero-stat-card .hero-focus-value {
      font-size: clamp(22px, 2.4vw, 28px);
      white-space: nowrap;
    }

    .hero-kpi-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-kpi-card {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
        rgba(5, 10, 22, 0.32);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c7d2fe;
    }

    .hero-kpi-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 26px;
      line-height: 1;
      color: #f8fbff;
      letter-spacing: -0.05em;
    }

    .hero-kpi-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .hero-planet {
      --planet-highlight: #f8fafc;
      --planet-soft: #c7cdd6;
      --planet-mid: #818899;
      --planet-deep: #303746;
      --planet-shadow: #171c25;
      --planet-glow-a: rgba(126,174,255,.18);
      --planet-glow-b: rgba(196,122,255,.08);
      --planet-band: rgba(232,236,242,.28);
      --planet-crater-light: rgba(255,255,255,.16);
      --planet-crater-dark: rgba(0,0,0,.14);
      position: absolute;
      top: 16px;
      right: 92px;
      width: 118px;
      height: 118px;
      pointer-events: none;
      z-index: 1;
      transform-style: preserve-3d;
      animation: heroPlanetFloat 8s ease-in-out infinite;
    }

    .hero-planet-ball {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transform-style: preserve-3d;
      box-shadow:
        inset -30px -34px 46px rgba(0,0,0,.48),
        inset 12px 12px 24px rgba(255,255,255,.10),
        inset -6px -8px 14px rgba(0,0,0,.2),
        0 26px 46px rgba(0,0,0,.38);
      overflow: visible;
      isolation: isolate;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.18) 12%, transparent 18%),
        radial-gradient(circle at 52% 58%, color-mix(in srgb, var(--planet-soft) 34%, transparent), transparent 26%),
        linear-gradient(155deg, var(--planet-highlight) 0%, var(--planet-soft) 36%, var(--planet-mid) 58%, var(--planet-deep) 76%, var(--planet-shadow) 100%);
    }

    .hero-planet-ball::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter: blur(7px);
      z-index: 6;
      pointer-events: none;
    }

    .hero-planet-ball::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 22px rgba(119,166,255,.10), inset 0 0 18px rgba(255,255,255,.04);
      pointer-events: none;
      z-index: 2;
    }

    .hero-planet-aura {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--planet-glow-a), transparent 60%),
        radial-gradient(circle, var(--planet-glow-b), transparent 76%);
      filter: blur(16px);
      opacity: .9;
      z-index: -2;
      animation: auraPulse 4.5s ease-in-out infinite;
    }

    .hero-planet-atmosphere {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity: .88;
      z-index: 5;
      animation: atmosphereRotate 32s linear infinite;
      background:
        radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, rgba(229,234,240,.16) 124deg, rgba(255,255,255,0) 190deg, rgba(182,189,200,.12) 260deg, rgba(255,255,255,0) 360deg);
    }

    .hero-planet-surface {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
      mix-blend-mode: soft-light;
      opacity: .82;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.20), transparent 16%),
        radial-gradient(circle at 54% 56%, color-mix(in srgb, var(--planet-deep) 36%, transparent), transparent 22%),
        radial-gradient(circle at 68% 30%, color-mix(in srgb, var(--planet-soft) 30%, transparent), transparent 12%);
    }

    .hero-planet-surface::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter: blur(5px);
      animation: surfaceDrift 24s linear infinite;
    }

    .hero-planet-surface::after {
      content: "";
      position: absolute;
      inset: -14%;
      background: repeating-linear-gradient(155deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 24px);
      opacity: .34;
      filter: blur(3px);
      transform: rotate(-10deg);
    }

    .hero-planet-night {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 4;
      background: linear-gradient(120deg, transparent 35%, rgba(0,0,0,.68) 85%);
    }

    .hero-planet-band {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 42%;
      height: 16%;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .72;
      z-index: 6;
      transform: rotate(-15deg);

    .hero-planet-crater {

      border-radius: 50%;

      opacity: .42;
      mix-blend-mode: screen;
      z-index: 6;

    .hero-planet-crater.c2 { width: 12%; height: 12%; left: 58%; top: 28%; opacity: .28; }
    .hero-planet-crater.c3 { width: 10%; height: 10%; left: 48%; top: 62%; opacity: .22; }

    .hero-planet-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 1;
    }

    .hero-planet-orbit::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(220,226,236,.22);
      box-shadow: 0 0 10px rgba(220,226,236,.14);

    .hero-planet-orbit::after {

      inset: -2px;
      border-radius: inherit;
      border: 1px dashed rgba(186,194,206,.22);
      filter: blur(.5px);
    }

      height: 190%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg);
      animation: pOrbit1 12s linear infinite;
    }

    .hero-planet-orbit.po2 {
      width: 250%;
      height: 250%;
      transform: translate(-50%, -50%) rotateX(68deg) rotateY(5deg);
      animation: pOrbit2 24s linear infinite reverse;

    .hero-planet-ring {

      top: 50%;

      height: 210%;

    .hero-planet-moon.two {

    .orbit-progress-name {

    .field,

    .custom-subject-select {
      position: relative;
      min-width: 180px;

    #addGroup {
      position: absolute;
      inset: auto;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .subject-select-trigger {
      width: 100%;
      min-height: 52px;
      padding: 13px 46px 13px 16px;
      border-radius: 18px;
      border: 1px solid rgba(170, 194, 235, 0.14);
      color: #d8e7ff;

      text-align: left;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.018) 34%, rgba(255,255,255,0.01)),
        radial-gradient(circle at 14% 10%, rgba(220, 248, 255, 0.1), transparent 22%),

        radial-gradient(circle at 72% 100%, rgba(129, 140, 248, 0.08), transparent 30%),

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),

    .subject-select-trigger::after {

      height: 10px;

    .subject-select-trigger:hover {
      border-color: rgba(192, 236, 255, 0.32);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 14px 28px rgba(0,0,0,0.18),
        0 0 20px rgba(103, 232, 249, 0.12),
        0 0 16px rgba(129, 140, 248, 0.09);

    .subject-select-trigger:focus-visible,
    .custom-subject-select.open .subject-select-trigger {
      border-color: rgba(192, 236, 255, 0.36);
      box-shadow:
        0 0 0 3px rgba(56, 189, 248, 0.14),

        0 0 22px rgba(103, 232, 249, 0.12);
      outline: none;

    .subject-select-value {

        linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025) 34%, rgba(255,255,255,0.01)),
        radial-gradient(circle at 16% 12%, rgba(220, 248, 255, 0.1), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(103, 232, 249, 0.08), transparent 24%),
        radial-gradient(circle at 74% 100%, rgba(129, 140, 248, 0.08), transparent 28%),
        linear-gradient(160deg, rgba(8, 20, 39, 0.97), rgba(7, 17, 34, 0.975) 46%, rgba(8, 13, 26, 0.985));
      box-shadow:
        0 20px 44px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.05),

        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.018) 42%, rgba(255,255,255,0.01)),

    .radar-top {

      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;

    .date-btn {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);

      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .date-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
    }

    .date-btn.active {
      background:
        linear-gradient(135deg, rgba(139,92,246,0.16), rgba(59,130,246,0.12)),
        rgba(255,255,255,0.04);
      border-color: rgba(139,92,246,0.45);
      box-shadow: 0 16px 40px rgba(32,17,72,0.3);

    .date-top {

      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;

    .date-date { font-size: 17px; font-weight: 700; }
    .date-phase { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .date-count { font-size: 12px; color: var(--muted); margin-top: 12px; }

    .progress {
      height: 10px;
      width: 100%;
      background: rgba(255,255,255,0.08);

      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);

    .progress > span {

    .main {
      display: grid;
      gap: 20px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 120px;

      content: "";
      position: absolute;
      top: -1px;
      left: 50%;
      width: min(180px, 30vw);
      height: 1px;
      transform: translateX(-50%);

      box-shadow: 0 0 18px rgba(79,140,255,0.28);
    }

    .countdown-section {
      position: relative;
      z-index: 2;

      left: 50%;

      transform: translateX(-50%);

      box-shadow: 0 0 18px rgba(79,140,255,0.28);
      pointer-events: none;

    .countdown-section::after {
      bottom: 0;

    .countdown-bridge {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));

      gap: 16px;

      max-width: 1280px;
      align-items: stretch;
      margin: 0 auto;

    .countdown-card {
      position: relative;
      grid-column: span 2;
      overflow: hidden;
      min-height: 146px;
      padding: 17px 18px 16px;
      border-radius: 24px;
      border: 1px solid var(--countdown-border, rgba(255,255,255,0.14));
      background:
        radial-gradient(circle at 88% 16%, var(--countdown-bg-glow, rgba(255,255,255,0.08)), transparent 34%),
        linear-gradient(145deg, var(--countdown-bg-a, rgba(255,255,255,0.1)), var(--countdown-bg-b, rgba(255,255,255,0.03))),
        rgba(8, 13, 28, 0.82);
      box-shadow:
        0 20px 56px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      isolation: isolate;
    }

    .countdown-card::before,
    .countdown-card::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
    }

    .countdown-card::before {
      width: 220px;
      height: 220px;
      right: -68px;
      top: -104px;
      background: radial-gradient(circle, var(--countdown-glow, rgba(74, 222, 255, 0.28)), transparent 68%);
      filter: blur(10px);
      opacity: 0.62;
      z-index: -2;
    }

    .nova-planet-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 42% 38%, rgba(103,232,249,0.2), transparent 36%),
        radial-gradient(circle at 58% 58%, rgba(251,191,36,0.1), transparent 54%),
        radial-gradient(circle at 50% 50%, rgba(59,130,246,0.1), transparent 68%);
      filter: blur(16px);
      opacity: 0.72;
    }

    .nova-planet {
      position: relative;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.88), rgba(236,246,255,0.3) 11%, transparent 18%),
        radial-gradient(circle at 42% 36%, rgba(116,200,255,0.22), transparent 24%),
        radial-gradient(circle at 60% 62%, rgba(10,16,32,0.3), transparent 34%),
        linear-gradient(148deg, #d8ecff 0%, #9fbdd7 16%, #5f7ca8 34%, #2e4266 56%, #16233f 74%, #070d1d 100%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset -18px -22px 34px rgba(5, 10, 24, 0.52),
        inset 14px 14px 24px rgba(255,255,255,0.06),
        inset -4px -8px 16px rgba(0,0,0,0.16),
        0 0 30px rgba(34,211,238,0.12),
        0 0 40px rgba(59,130,246,0.08);
    }

    .nova-planet::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.22), transparent 20%),
        radial-gradient(circle at 46% 44%, rgba(255,255,255,0.08), transparent 18%),
        radial-gradient(circle at 72% 68%, rgba(0,0,0,0.18), transparent 20%);
      filter: blur(4px);
      opacity: 0.62;
    }

    .nova-planet::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.16), transparent 18%),
        linear-gradient(124deg, transparent 34%, rgba(4,8,20,0.56) 78%);
      opacity: 0.82;
    }

    .nova-core {
      position: absolute;
      inset: 0;
      z-index: 2;
      min-width: 0;
      min-height: 0;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      display: grid;
      place-items: center;
      align-content: center;
      padding: 18px;
      background: radial-gradient(circle at 50% 72%, rgba(7,12,26,0.34), transparent 42%);
    }

    .nova-core-date {
      font-size: 16px;
    }

    .nova-core-hours {
      text-shadow: 0 0 14px rgba(255,255,255,0.14);
    }

    .nova-data-pod {
      position: absolute;
      z-index: 3;
      min-width: 98px;
      padding: 9px 11px 8px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04)),
        rgba(8,13,28,0.78);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 14px 32px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.08);
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nova-data-pod.top {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .nova-data-pod.left {
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nova-data-pod.right {
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nova-data-pod.bottom {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .nova-data-label {
      display: block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9fb0d3;
    }

    .nova-data-value {
      display: block;
      margin-top: 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .schedule-table-wrap {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      background:
        radial-gradient(circle at top right, rgba(79,140,255,0.18), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.03);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 26px 70px rgba(0,0,0,0.22);
      overflow: auto;
    }

    .schedule-table {
      width: 100%;
      min-width: 1180px;
      border-collapse: separate;
      border-spacing: 0 12px;
      padding: 8px 14px 14px;
    }

    .schedule-table th,
    .schedule-table td {
      padding: 16px 18px;
      vertical-align: top;
      text-align: left;
      border-bottom: 0;
    }

    .schedule-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(8, 13, 28, 0.96);
      color: #d5defe;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      backdrop-filter: blur(16px);
    }

    .schedule-table tbody tr {
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .schedule-table tbody tr:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
    }

    .schedule-table tbody td {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(6, 10, 24, 0.72);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .schedule-table tbody td:first-child {
      border-left: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px 0 0 22px;
    }

    .schedule-table tbody td:last-child {
      border-right: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 22px 22px 0;
    }

    .schedule-table tr.active-row td {
      background:
        linear-gradient(180deg, rgba(104, 142, 255, 0.14), rgba(34, 211, 238, 0.06)),
        rgba(9, 16, 34, 0.9);
      border-top-color: rgba(114, 153, 255, 0.26);
    }

    .schedule-date-cell {
      position: sticky;
      left: 0;
      z-index: 1;
      min-width: 150px;
      background:
        linear-gradient(180deg, rgba(79,140,255,0.14), rgba(255,255,255,0.03)),
        rgba(8, 13, 28, 0.94);
    }

    .schedule-date-main {
      font-family: "Space Grotesk", sans-serif;
      font-size: 25px;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: #eef4ff;
    }

    .schedule-phase {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .schedule-day-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .schedule-list {
      display: grid;
      gap: 6px;
      color: #dbe7ff;
      font-size: 13px;
      line-height: 1.55;
    }

    .schedule-list span {
      display: block;
    }

    .schedule-list.tight {
      gap: 5px;
      font-size: 12.5px;
    }

    .schedule-task-panel {
      --subject-glow: rgba(255,255,255,0.12);
      --subject-border: rgba(255,255,255,0.12);
      --subject-accent: #dbe7ff;
      --subject-soft: rgba(255,255,255,0.04);
      min-width: 240px;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 20px;
      background:
        radial-gradient(circle at top right, var(--subject-glow), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.03);
      border: 1px solid var(--subject-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 16px 34px rgba(0,0,0,0.16);
    }

    .schedule-task-panel.physics {
      --subject-glow: rgba(95, 143, 255, 0.25);
      --subject-border: rgba(95, 143, 255, 0.24);
      --subject-accent: #8ab5ff;
      --subject-soft: rgba(95, 143, 255, 0.09);
    }

    .schedule-task-panel.math {
      --subject-glow: rgba(251, 191, 36, 0.24);
      --subject-border: rgba(251, 191, 36, 0.22);
      --subject-accent: #ffd56f;
      --subject-soft: rgba(251, 191, 36, 0.09);
    }

    .schedule-task-panel.english {
      --subject-glow: rgba(34, 211, 238, 0.24);
      --subject-border: rgba(34, 211, 238, 0.22);
      --subject-accent: #79ecff;
      --subject-soft: rgba(34, 211, 238, 0.09);
    }

    .schedule-task-panel.review {
      --subject-glow: rgba(244, 114, 182, 0.22);
      --subject-border: rgba(244, 114, 182, 0.2);
      --subject-accent: #ff9ac7;
      --subject-soft: rgba(244, 114, 182, 0.08);
    }

    .schedule-task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .schedule-task-headline {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .schedule-task-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--subject-soft);
      border: 1px solid var(--subject-border);
      color: var(--subject-accent);
      font-size: 16px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .schedule-task-title {
      color: #eef4ff;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .schedule-task-meta {
      color: var(--subject-accent);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .schedule-task-summary {
      font-size: 12px;
      color: var(--muted);
    }

    .schedule-task-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .schedule-task-line {
      flex: 1 1 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06));
    }

    .schedule-task-items {
      display: grid;
      gap: 8px;
    }

    .schedule-subject-stack {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 14px;
      min-width: 560px;
    }

    .schedule-task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 10px 11px;
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .schedule-task-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-top: 6px;
      background: var(--subject-accent);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
      flex: none;
    }

    .schedule-task-item.done {
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.16);
    }

    .schedule-task-text {
      color: #edf3ff;
      font-size: 13px;
      line-height: 1.5;
    }

    .schedule-task-item.done .schedule-task-text {
      color: #9fb0d3;
      text-decoration: line-through;
    }

    .schedule-task-state {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #c7d2fe;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .schedule-task-item.done .schedule-task-state {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.2);
      color: #a7f3d0;
    }

    .schedule-progress-cell {
      min-width: 120px;
    }

    .schedule-progress-stack {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .schedule-progress-meta {
      display: grid;
      gap: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .schedule-progress-percent {
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.05em;
      color: #eef4ff;
    }

    .schedule-progress-bar {
      position: relative;
      width: 18px;
      height: 132px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .schedule-progress-bar > span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      height: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, var(--violet), var(--blue) 58%, var(--cyan));
      transition: height .25s ease;
    }

    .schedule-note-cell {
      min-width: 240px;
    }

    .schedule-note-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      min-height: 100%;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .schedule-note-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9fb0d3;
    }

    .schedule-note-snippet {
      color: #dbe7ff;
      font-size: 13px;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 0;
    }

    .mission-copy:empty,
    .schedule-note-snippet:empty {
      display: none;
    }

    .schedule-action-cell {
      min-width: 140px;
    }

    .schedule-action-stack {
      display: grid;
      gap: 10px;
      justify-items: start;
    }

    .schedule-mini-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .schedule-open-btn {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(79,140,255,0.24), rgba(34,211,238,0.16));
      color: #eef4ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.22s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
    }

    .schedule-open-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(96,165,250,0.32);
      background: linear-gradient(135deg, rgba(79,140,255,0.34), rgba(34,211,238,0.22));
    }

    @media (max-width: 1180px) {
      .study-analytics {
        grid-template-columns: minmax(0, 1fr);
      }

      .analytics-card.wide {
        grid-column: auto;
      }

      .analytics-head {
        flex-direction: column;
        align-items: stretch;
      }

      .analytics-metrics {
        grid-template-columns: minmax(0, 1fr);
      }

      .nova-planet-system {
        width: 100%;
        min-height: 314px;
      }

      .nova-data-pod.left,
      .nova-data-pod.right {
        top: auto;
        bottom: 58px;
        transform: none;
      }

      .nova-data-pod.left {
        left: 10px;
      }

      .nova-data-pod.right {
        right: 10px;
      }

      .schedule-subject-stack {
        grid-template-columns: minmax(260px, 1fr);
        min-width: 340px;
      }
    }

    .mission-top {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) 280px;
      gap: 20px;
      align-items: stretch;
    }

    .mission-overview {
      padding: 24px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      align-content: stretch;
    }

    .mission-overview::after {
      content: "";
      position: absolute;
      right: -50px;
      bottom: -54px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .mission-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c7d2fe;
    }

    .mission-title {
      margin-top: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(30px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .mission-copy {
      margin-top: 10px;
      color: #d5e1fb;
      line-height: 1.8;
      max-width: 720px;
    }

    .overview-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      height: 100%;
    }

    .overview-card {
      display: grid;
      gap: 8px;
      align-content: start;
      padding: 18px;
      border-radius: 20px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 132px;
    }

    .overview-card-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .overview-card-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 2.6vw, 31px);
      line-height: 1;
      color: #f8fbff;
    }

    .overview-card-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .mission-focus {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .focus-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .focus-chip span:first-child {
      color: #e6efff;
      font-size: 14px;
      font-weight: 600;
    }

    .focus-chip span:last-child {
      color: var(--muted);
      font-size: 13px;
    }

    .focus-chip.pace-chip {
      position: relative;
      align-items: center;
    }

    .pace-menu {
      position: relative;
      margin-left: auto;
      z-index: 8;
    }

    .pace-menu summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: #eef4ff;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .pace-menu summary::-webkit-details-marker {
      display: none;
    }

    .pace-menu summary:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
    }

    .pace-menu summary::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0.8;
    }

    .pace-menu[open] summary::after {
      transform: rotate(-135deg) translateY(-1px);
    }

    .pace-current {
      white-space: nowrap;
    }

    .pace-options {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 220px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8, 13, 28, 0.96);
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      z-index: 5;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .pace-option {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d8e4ff;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .pace-option.active {
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .mission-side {
      padding: 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .mission-side .big {
      font-family: "Space Grotesk", sans-serif;
      font-size: 42px;
      line-height: 1;
    }

    .muted {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .sections {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
    }

    .section {
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      padding: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 44px rgba(0,0,0,0.12);
      display: block;
    }

    .section summary {
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #dbe7ff;
      list-style: none;
      cursor: pointer;
      user-select: none;
    }

    .section summary::-webkit-details-marker {
      display: none;
    }

    .section summary::before {
      content: "▸";
      display: inline-flex;
      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c7d2fe;
      font-size: 11px;
      transition: transform .2s ease;
    }

    .section[open] summary::before {
      transform: rotate(90deg);
    }

    .section-count {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c7d2fe;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .task-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .task-grid-head {
      --task-head-line: rgba(255,255,255,0.12);
      display: grid;
      grid-template-columns: 66px 74px minmax(240px, 1.45fr) minmax(120px, 0.7fr) minmax(160px, 0.9fr) 104px;
      gap: 0;
      align-items: center;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(132, 168, 255, 0.14);
      background:
        linear-gradient(135deg, rgba(74, 119, 255, 0.32), rgba(74, 119, 255, 0.08) 16%, rgba(58, 189, 248, 0.22) 34%, rgba(124, 92, 246, 0.24) 56%, rgba(255, 191, 90, 0.2) 78%, rgba(255, 128, 164, 0.2) 100%),
        linear-gradient(180deg, rgba(14, 23, 46, 0.98), rgba(10, 18, 38, 0.98));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 18px 38px rgba(5, 12, 28, 0.22);
    }

    .task-grid-head span {
      padding: 12px 14px;
      border-right: 1px solid var(--task-head-line);
      color: #eef4ff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    .task-grid-head span:nth-child(1) { color: #dff7ff; }
    .task-grid-head span:nth-child(2) { color: #d7e5ff; }
    .task-grid-head span:nth-child(3) { color: #e3dcff; }
    .task-grid-head span:nth-child(4) { color: #ffe0a8; }
    .task-grid-head span:nth-child(5) { color: #ffd0e2; }
    .task-grid-head span:nth-child(6) { color: #d8f5ff; }

    .task-btn {
      position: relative;
    }

    .task-grid-head span:last-child {
      border-right: 0;
      text-align: center;
    }

    .section-empty {
      --empty-accent: rgba(255,255,255,0.18);
      --empty-soft: rgba(255,255,255,0.05);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(0,0,0,0.16);
      border: 1px dashed var(--empty-accent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .section-empty.physics {
      --empty-accent: rgba(95, 143, 255, 0.28);
      --empty-soft: rgba(95, 143, 255, 0.1);
    }

    .section-empty.physics .section-empty-hint {
      display: block;
      margin-top: 2px;
    }

    .section-empty.math .section-empty-hint,
    .section-empty.english .section-empty-hint {
      display: block;
      margin-top: 2px;
    }

    .section-empty.math {
      --empty-accent: rgba(251, 191, 36, 0.28);
      --empty-soft: rgba(251, 191, 36, 0.1);
    }

    .section-empty.english {
      --empty-accent: rgba(34, 211, 238, 0.28);
      --empty-soft: rgba(34, 211, 238, 0.1);
    }

    .section-empty.review {
      --empty-accent: rgba(244, 114, 182, 0.26);
      --empty-soft: rgba(244, 114, 182, 0.1);
    }

    .section-empty-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--empty-soft);
      border: 1px solid var(--empty-accent);
      color: #eef4ff;
      font-size: 15px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .section-empty-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .section-empty-title {
      color: #eef4ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-empty-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      display: none;
    }

    .section-empty-hint {
      color: #cbd8f3;
      font-size: 12px;
      line-height: 1.55;
      display: none;
    }

    .task-btn {
      --task-glow: rgba(139,92,246,0.18);
      --task-border: rgba(255,255,255,0.1);
      --task-soft: rgba(255,255,255,0.04);
      --task-accent: #dbe7ff;
      width: 100%;
      display: grid;
      grid-template-columns: 66px 74px minmax(240px, 1.45fr) minmax(120px, 0.7fr) minmax(160px, 0.9fr) 104px;
      gap: 0;
      align-items: center;
      text-align: left;
      padding: 0;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
      border: 1px solid var(--task-border);
      color: white;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 16px 34px rgba(0,0,0,0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease;
    }

    .task-btn.physics {
      --task-glow: rgba(95, 143, 255, 0.2);
      --task-border: rgba(95, 143, 255, 0.2);
      --task-soft: rgba(95, 143, 255, 0.18);
      --task-accent: #8ab5ff;
    }

    .task-btn.math {
      --task-glow: rgba(251, 191, 36, 0.18);
      --task-border: rgba(251, 191, 36, 0.18);
      --task-soft: rgba(251, 191, 36, 0.16);
      --task-accent: #ffd56f;
    }

    .task-btn.english {
      --task-glow: rgba(34, 211, 238, 0.18);
      --task-border: rgba(34, 211, 238, 0.18);
      --task-soft: rgba(34, 211, 238, 0.16);
      --task-accent: #79ecff;
    }

    .task-btn.review {
      --task-glow: rgba(244, 114, 182, 0.16);
      --task-border: rgba(244, 114, 182, 0.18);
      --task-soft: rgba(244, 114, 182, 0.14);
      --task-accent: #ff9ac7;
    }

    .task-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--task-border) 72%, white);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 20px 42px rgba(0,0,0,0.2),
        0 0 24px var(--task-soft);
    }

    .task-btn.done {
      color: #8b9ab9;
      background:
        linear-gradient(180deg, rgba(52,211,153,0.08), rgba(255,255,255,0.02)),
        rgba(8, 13, 28, 0.55);
      border-color: rgba(52,211,153,0.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 16px 38px rgba(0,0,0,0.16),
        0 0 18px rgba(52,211,153,0.08);
    }

    .task-btn.done .task-text { text-decoration: line-through; }

    .task-card { min-width: 0; }

    .task-main {
      display: grid;
      grid-template-columns: 66px 74px minmax(240px, 1.45fr) minmax(120px, 0.7fr) minmax(160px, 0.9fr);
      grid-column: 1 / 6;
      align-items: stretch;
      gap: 0;
      min-width: 0;
      text-align: left;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 0;
    }

    .task-cell {
      min-width: 0;
      padding: 14px 14px;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: grid;
      align-content: center;
      gap: 6px;
      min-height: 82px;
    }

    .task-cell.check-col {
      place-items: center;
      padding: 14px 10px;
    }

    .task-cell.stt-col {
      justify-items: center;
      color: #f6fbff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      letter-spacing: -0.04em;
    }

    .task-copy {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .task-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .check {
      margin-top: 0;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--task-border) 85%, var(--task-accent));
      flex: 0 0 auto;
      position: relative;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
    }

    .task-btn.done .check::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), #8bf3c9);
    }

    .task-text {
      line-height: 1.6;
      font-size: 14px;
      color: #f4f7ff;
      font-weight: 600;
    }

    .task-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #edf4ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .task-time-main {
      color: #f6fbff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .task-time-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .task-note-box {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .task-note-label {
      color: #c7d2fe;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .task-structured {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .task-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .task-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #d9e6ff;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .task-subject-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--task-soft);
      color: var(--task-accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .task-subject-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--task-accent);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
      flex: none;
    }

    .task-meta-label {
      opacity: 0.72;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
    }

    .task-note {
      color: #cbd8f3;
      font-size: 12px;
      line-height: 1.55;
      padding-top: 0;
    }

    .task-state-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e8f1ff;
    }

    .task-state-pill.done {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.28);
      color: #b9f5dc;
    }

    .task-state-pill.pending {
      background: rgba(79,140,255,0.12);
      border-color: rgba(79,140,255,0.22);
      color: #d8e7ff;
    }

    .task-actions {
      position: relative;
      display: grid;
      align-content: center;
      justify-items: end;
      gap: 8px;
      min-width: 122px;
      padding: 14px 12px;
    }

    .task-action-label {
      color: rgba(223, 233, 255, 0.72);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .task-action-trigger {
      min-width: 92px;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.18), rgba(34,211,238,0.12)),
        rgba(255,255,255,0.04);
      border-color: rgba(95, 143, 255, 0.22);
    }

    .task-action-menu {
      position: absolute;
      top: calc(100% - 6px);
      right: 12px;
      min-width: 168px;
      display: none;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(14, 22, 40, 0.98), rgba(9, 16, 31, 0.98)),
        rgba(8, 13, 28, 0.96);
      box-shadow: 0 20px 38px rgba(0,0,0,0.3);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 12;
    }

    .task-actions.open .task-action-menu {
      display: grid;
    }

    .task-menu-btn {
      width: 100%;
      justify-content: center;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .task-edit-btn {
      background:
        linear-gradient(135deg, rgba(79,140,255,0.18), rgba(34,211,238,0.12)),
        rgba(255,255,255,0.05);
      border-color: rgba(79,140,255,0.22);
    }

    .task-delete-btn {
      min-width: 108px;
      justify-content: center;
      background: linear-gradient(135deg, rgba(251,113,133,0.16), rgba(255,255,255,0.05));
      border-color: rgba(251,113,133,0.22);
    }

    .task-delete-btn:hover {
      border-color: rgba(251,113,133,0.38);
      box-shadow: 0 14px 28px rgba(0,0,0,0.18);
    }

    .task-btn.done .task-text,
    .task-btn.done .task-note {
      color: #99a9c8;
    }

    @media (max-width: 760px) {
      .task-grid-head {
        display: none;
      }

      .task-btn {
        grid-template-columns: 1fr;
      }

      .task-main {
        grid-template-columns: 1fr;
      }

      .task-cell {
        min-height: auto;
        padding: 12px 14px;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }

      .task-cell.check-col,
      .task-cell.stt-col {
        justify-items: start;
      }

      .task-actions {
        min-width: 0;
        justify-items: stretch;
        padding: 12px 14px 14px;
      }

      .task-delete-btn {
        width: 100%;
      }
    }

    .mission-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 18px 20px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mission-footer .hint {
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .action-links {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 14px 32px rgba(37,99,235,0.26);
    }

    .primary-btn:hover { filter: brightness(1.08); }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #e8f0ff;
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.68;
    }

    @keyframes driftNebula {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: .82; }
      to { transform: translate3d(-2%, 2%, 0) scale(1.05); opacity: 1; }
    }

    @keyframes driftStars {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-90px, -260px, 0); }
    }

    @keyframes driftStarsReverse {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(70px, 220px, 0); }
    }

    @keyframes twinkle {
      from { opacity: .45; transform: scale(1); }
      to { opacity: .9; transform: scale(1.03); }
    }

    @keyframes shooting {
      0%,100% { opacity: 0; transform: translate3d(0,0,0) rotate(-25deg) scaleX(.7); }
      8% { opacity: 1; }
      18% { opacity: 0; transform: translate3d(-220px,140px,0) rotate(-25deg) scaleX(1); }
    }

    @keyframes flagDotAppear {
      0% { opacity: 0; transform: scale(.18); }
      42% { opacity: .46; transform: scale(.72); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes flagDotTwinkle {
      0% { opacity: .16; filter: drop-shadow(0 0 4px rgba(255,214,140,.22)); }
      36% { opacity: 1; filter: drop-shadow(0 0 13px rgba(255,240,196,.76)); }
      100% { opacity: .34; filter: drop-shadow(0 0 7px rgba(255,226,170,.42)); }
    }

    @keyframes flagAuraPulse {
      0% { opacity: .28; transform: scale(.92); }
      100% { opacity: .82; transform: scale(1.05); }
    }

    @keyframes flagAuraDrift {
      0% { opacity: .18; transform: translate3d(-6px,4px,0) scale(.96); }
      100% { opacity: .58; transform: translate3d(8px,-5px,0) scale(1.08); }
    }

    @keyframes planetFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes heroPlanetFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    @keyframes auraPulse {
      0%,100% { transform: scale(1); opacity: .72; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes atmosphereRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes surfaceDrift {
      from { transform: translateX(0) rotate(0deg); }
      to { transform: translateX(-10px) rotate(8deg); }
    }

    @keyframes bandShift {
      0%,100% { transform: rotate(-15deg) translateY(0); opacity: .55; }
      50% { transform: rotate(-15deg) translateY(2px); opacity: .86; }
    }

    @keyframes moonOrbit1 {
      0%,100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(14px,-16px,0) scale(1.08); }
    }

    @keyframes moonOrbit2 {
      0%,100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(-12px,14px,0) scale(.92); }
    }

    @keyframes pOrbit1 {
      from { transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg) rotateZ(0deg); }
      to { transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg) rotateZ(360deg); }
    }

    @keyframes pOrbit2 {
      from { transform: translate(-50%, -50%) rotateX(68deg) rotateY(5deg) rotateZ(0deg); }
      to { transform: translate(-50%, -50%) rotateX(68deg) rotateY(5deg) rotateZ(360deg); }
    }

    .import-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(180px, 0.55fr) minmax(0, 1.45fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.085), rgba(255,255,255,0.025)),
        radial-gradient(circle at 8% 18%, rgba(139, 233, 255, 0.14), transparent 34%),
        radial-gradient(circle at 92% 10%, rgba(255, 216, 107, 0.16), transparent 28%),
        radial-gradient(circle at 72% 88%, rgba(255, 120, 168, 0.1), transparent 34%),
        rgba(8, 13, 28, 0.74);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 20px 54px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.07);
      overflow: hidden;
      isolation: isolate;
    }

    .import-card::before {
      content: "";
      position: absolute;
      inset: -80px auto auto -70px;
      width: 180px;
      height: 180px;

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));

    function expandTaskEntry(text) {
      const normalized = String(text).trim();
      if (!normalized) return [];

      const colonMatch = normalized.match(/^([^:]+:\s*)(.+)$/);
      if (colonMatch) {
        const [, prefix, rest] = colonMatch;
        if (rest.includes(",")) {
          return rest.split(",").map((part) => `${prefix}${part.trim()}`).filter(Boolean);
        }
      }

      const seriesMatch = normalized.match(/^(Bắc Trung Nam Đề|Đề|Topic)\s+(.+)$/i);
      if (seriesMatch && seriesMatch[2].includes(",")) {
        const label = seriesMatch[1];
        return seriesMatch[2].split(",").map((part) => `${label} ${part.trim()}`).filter(Boolean);
      }

      return [normalized];
    }

    function createStructuredTaskItem({ date = "", group = "", time = "", content = "", note = "", text = "", done = false }) {
      const rawText = String(text || "").trim();
      const parsedTime = time || (rawText.includes(" · ") ? rawText.split(" · ")[0].trim() : "");
      const parsedContent = content || (rawText.includes(" · ") ? rawText.split(" · ").slice(1).join(" · ").trim() : rawText);
      return {
        date: String(date || "").trim(),
        group: String(group || "").trim(),
        time: String(parsedTime || "").trim(),
        content: String(parsedContent || "").trim(),
        note: String(note || "").trim(),
        text: String(parsedContent || rawText).trim(),
        done: !!done
      };
    }

    function createTaskItems(list) {
      return list.flatMap((text) => expandTaskEntry(text)).map((text) => createStructuredTaskItem({ text, content: text }));
    }

    function normalizeTaskItems(items, date = "", group = "") {
      if (!Array.isArray(items)) return [];
      return items
        .filter((item) => item && ((typeof item.content === "string" && item.content.trim()) || (typeof item.text === "string" && item.text.trim())))
        .map((item) => createStructuredTaskItem({ ...item, date: item.date || date, group: item.group || group, done: item.done }));
    }

    function taskIdentity(item) {
      return [item.date, item.group, item.time, item.content, item.note].join("|").trim();
    }

    function createEmptyTaskState() {
      return {
        physics: [],
        math: [],
        english: [],
        review: [],
        dailyNote: "",
        pace: DEFAULT_PACE,
        customAdd: ""
      };

    function getTaskList(taskState) {
      return TASK_GROUPS.flatMap((group) => taskState[group] || []);
    }

    function mergeTaskItems(savedItems, freshItems, date = "", group = "") {
      const safeFresh = normalizeTaskItems(freshItems, date, group);
      const safeSaved = normalizeTaskItems(savedItems, date, group);
      if (!safeSaved.length) return safeFresh;
      if (!safeFresh.length) return safeSaved;

      const savedByText = new Map(safeSaved.map((item) => [taskIdentity(item), !!item.done]));
      const merged = safeFresh.map((item) => ({
        ...item,
        done: savedByText.has(taskIdentity(item)) ? savedByText.get(taskIdentity(item)) : item.done
      }));

      safeSaved.forEach((item) => {
        if (!merged.some((fresh) => taskIdentity(fresh) === taskIdentity(item))) merged.push(item);
      });

      return merged;
    }

    function createTaskMap() {
      const map = {};
      initialSchedule.forEach((day) => {
        const nextState = createEmptyTaskState();
        TASK_GROUPS.forEach((group) => {
          nextState[group] = createTaskItems(day[group]);
        });
        map[day.date] = nextState;
      });
      return map;
    }

    function normalizeSchedule(savedSchedule) {
      const savedByDate = new Map(
        Array.isArray(savedSchedule)
          ? savedSchedule.filter((day) => day && typeof day.date === "string").map((day) => [day.date, day])
          : []
      );

      return initialSchedule.map((freshDay) => {
        const savedDay = savedByDate.get(freshDay.date) || {};
        return {
          ...freshDay,
          phase: typeof savedDay.phase === "string" && savedDay.phase.trim() ? savedDay.phase : freshDay.phase,
          note: typeof savedDay.note === "string" ? savedDay.note : freshDay.note
        };
      });
    }

    function mergeTasks(savedTasks, freshTasks) {
      const merged = {};
      Object.keys(freshTasks).forEach((date) => {
        const savedDay = savedTasks && savedTasks[date] ? savedTasks[date] : {};
        const mergedDay = createEmptyTaskState();
        TASK_GROUPS.forEach((group) => {
          mergedDay[group] = mergeTaskItems(savedDay[group], freshTasks[date][group], date, group);
        });
        mergedDay.dailyNote = typeof savedDay.dailyNote === "string" ? savedDay.dailyNote : "";
        mergedDay.pace = typeof savedDay.pace === "string" ? savedDay.pace : DEFAULT_PACE;
        mergedDay.customAdd = typeof savedDay.customAdd === "string" ? savedDay.customAdd : "";
        merged[date] = mergedDay;
      });
      return merged;
    }

        return {
          schedule,
          selectedDate: validDates.has(saved.selectedDate) ? saved.selectedDate : initialSchedule[0].date,
          query: typeof saved.query === "string" ? saved.query : "",
          phaseFilter: typeof saved.phaseFilter === "string" ? saved.phaseFilter : "Tất cả",
          tab: typeof saved.tab === "string" ? saved.tab : "all",

        };

        console.error("Không đọc được dữ liệu localStorage, dùng trạng thái mặc định:", err);
        return clone(defaultState);
      }
    }

    const state = loadState();

    function persistState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    function saveState() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {

        saveTimer = 0;

      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = 0;

      persistState();

    function slugifyDateForFile(dateText) {
      return String(dateText || "ngay")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "") || "ngay";

    function exportDayBackup(date) {
      const day = state.schedule.find((item) => item.date === date);
      const taskState = ensureTaskState(date);
      if (!day || !taskState) {
        alert("Khong tim thay du lieu ngay nay de backup.");
        return;
      }

      flushState();

      const backupPayload = {
        app: "vsat",
        type: "daily-backup",
        exportedAt: new Date().toISOString(),
        day: clone(day),
        tasks: clone(taskState)
      };

      const blob = new Blob([JSON.stringify(backupPayload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const safeDate = slugifyDateForFile(date);
      const todayStamp = new Date().toISOString().slice(0, 10);

      link.href = url;
      link.download = `vsat-backup-${safeDate}-${todayStamp}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();

      window.setTimeout(() => URL.revokeObjectURL(url), 500);

    function sampleBetween(min, max) {
      return min + (Math.random() * (max - min));

      return Math.min(max, Math.max(min, value));

      return {

        y: clampNumber(Number.isFinite(y) ? y : luckyCometPointer.y, 18, Math.max(18, height - 18))

    function rememberLuckyCometPointer(event) {

    function resolveLuckyCometCaptionPoint(anchor) {
      const width = window.innerWidth || document.documentElement.clientWidth || 1280;
      const height = window.innerHeight || document.documentElement.clientHeight || 720;
      const point = normalizeLuckyCometPointer(anchor || luckyCometPointer);
      const side = point.x > width - 210 ? -1 : 1;

      return {

    function getLuckyCometTaskBoost(taskMinutes = 0) {
      const safeMinutes = Math.max(0, Number(taskMinutes) || 0);
      const boostRange = LUCKY_COMET_TASK_BOOST_FULL_MINUTES - LUCKY_COMET_TASK_BOOST_START_MINUTES;
      const progress = boostRange
        ? clampNumber((safeMinutes - LUCKY_COMET_TASK_BOOST_START_MINUTES) / boostRange, 0, 1)
        : 0;
      return progress * progress * (3 - (2 * progress));
    }

    function getLuckyCometDynamicWeight(rarity, taskBoost) {
      const [lowMultiplier, highMultiplier] = LUCKY_COMET_TASK_WEIGHT_MULTIPLIERS[rarity.key] || [1, 1];
      const multiplier = lowMultiplier + ((highMultiplier - lowMultiplier) * taskBoost);
      return Math.max(0.1, rarity.weight * multiplier);
    }

    function pickLuckyCometRarity(taskMinutes = 0) {
      const taskBoost = getLuckyCometTaskBoost(taskMinutes);
      const weightedRarities = LUCKY_COMET_RARITIES.map((rarity) => ({
        rarity,
        weight: getLuckyCometDynamicWeight(rarity, taskBoost)
      }));
      const totalWeight = weightedRarities.reduce((sum, item) => sum + item.weight, 0);
      const roll = Math.random() * totalWeight;
      let total = 0;

      for (const item of weightedRarities) {
        total += item.weight;
        if (roll < total) return item.rarity;
      }

      return LUCKY_COMET_RARITIES[0];
    }
