<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <meta name="theme-color" content="#050918" />
  <title>Lịch học 12/05 - 10/06</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #02040c;
      --bg-2: #061126;
      --bg-3: #0b1a39;
      --bg-4: #160f33;
      --panel: rgba(8, 13, 28, 0.7);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --border: rgba(161, 176, 255, 0.14);
      --text: #eef4ff;
      --muted: #9fb0d3;
      --blue: #4f8cff;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --rose: #fb7185;
      --green: #34d399;
      --amber: #fbbf24;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(91, 126, 255, 0.2), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(34, 211, 238, 0.14), transparent 16%),
        radial-gradient(circle at 50% 84%, rgba(168, 85, 247, 0.12), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 38%, var(--bg-3) 72%, var(--bg-4));
      overflow-x: hidden;
    }

    body { position: relative; }
    button, input, textarea, select { font: inherit; }

    .universe {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .nebula,
    .nebula::before,
    .nebula::after {
      content: "";
      position: absolute;
      inset: -16%;
      filter: blur(62px);
    }

    .nebula {
      background:
        radial-gradient(circle at 14% 28%, rgba(88, 113, 255, 0.22), transparent 14%),
        radial-gradient(circle at 78% 24%, rgba(58, 235, 255, 0.16), transparent 14%),
        radial-gradient(circle at 46% 74%, rgba(196, 103, 255, 0.14), transparent 16%);
      animation: driftNebula 24s ease-in-out infinite alternate;
    }

    .nebula::before {
      background:
        radial-gradient(circle at 30% 62%, rgba(122, 160, 255, 0.16), transparent 14%),
        radial-gradient(circle at 70% 58%, rgba(83, 244, 255, 0.1), transparent 14%);
      animation: driftNebula 32s ease-in-out infinite alternate-reverse;
    }

    .nebula::after {
      background:
        radial-gradient(circle at 52% 34%, rgba(255, 255, 255, 0.06), transparent 9%),
        radial-gradient(circle at 34% 82%, rgba(191, 121, 255, 0.1), transparent 14%);
      animation: driftNebula 36s ease-in-out infinite alternate;
    }

    .space-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(130, 170, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130, 170, 255, 0.045) 1px, transparent 1px);
      background-size: 100px 100px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 84%);
      opacity: 0.22;
      transform: perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }

    .stars,
    .stars2,
    .stars3 {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size: 800px 300px;
      opacity: .9;
      animation: driftStars 100s linear infinite;
    }

    .stars2 {
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size: 900px 380px;
      animation: driftStarsReverse 145s linear infinite;
      opacity: .55;
    }

    .stars3 {
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size: 1000px 420px;
      animation: twinkle 7s ease-in-out infinite alternate;
      opacity: .7;
      filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      filter: drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity: 0;
      pointer-events: none;
      transform: rotate(-25deg);
      animation: shooting 9s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .shooting-star.one { top: 12%; left: 72%; animation-delay: 0s; }
    .shooting-star.two { top: 26%; left: 18%; width: 140px; animation-delay: 3s; }
    .shooting-star.three { top: 8%; left: 45%; width: 210px; animation-delay: 6s; }

    .flag-burst {
      --flag-top: 88px;
      --flag-right: max(5%, 22px);
      --flag-shift-x: -18px;
      --flag-shift-y: 14px;
      --flag-tilt: -5deg;
      position: absolute;
      right: var(--flag-right);
      top: var(--flag-top);
      width: min(300px, 34vw);
      aspect-ratio: 5 / 3;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(var(--flag-shift-x), var(--flag-shift-y), 0) rotate(var(--flag-tilt)) scale(.96);
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
      filter: drop-shadow(0 0 16px rgba(255,214,136,.12));
    }

    .flag-burst::before {
      content: "";
      position: absolute;
      inset: -10% -8%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,205,112,.16), transparent 34%),
        radial-gradient(circle at 50% 52%, rgba(255,244,218,.08), transparent 58%);
      filter: blur(22px);
      opacity: 0;
      transform: scale(.88);
      transition: opacity .9s ease, transform 1s ease;
    }

    .flag-burst::after {
      content: "";
      position: absolute;
      inset: 8% 12%;
      background: radial-gradient(circle at 50% 50%, rgba(255,232,170,.16), transparent 62%);
      filter: blur(24px);
      opacity: 0;
    }

    body.flag-burst-active .flag-burst {
      opacity: 1;
      transform: translate3d(0, 0, 0) rotate(var(--flag-tilt)) scale(1);
      filter: drop-shadow(0 0 22px rgba(255,224,158,.22));
    }

    body.flag-burst-active .flag-burst::before {
      opacity: .72;
      transform: scale(1);
      animation: flagAuraPulse 2.8s ease-in-out infinite alternate;
    }

    body.flag-burst-active .flag-burst::after {
      opacity: .5;
      animation: flagAuraDrift 3.2s ease-in-out infinite alternate;
    }

    .flag-burst svg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flag-dot {
      fill: #ffe4a0;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      filter: drop-shadow(0 0 5px rgba(255,224,154,.28));
    }

    .flag-dot.major {
      fill: #fff5d6;
      filter: drop-shadow(0 0 10px rgba(255,238,196,.48));
    }

    .flag-dot.soft {
      fill: #ffd27f;
      filter: drop-shadow(0 0 4px rgba(255,202,108,.22));
    }

    body.flag-burst-active .flag-dot {
      animation:
        flagDotAppear .9s ease forwards,
        flagDotTwinkle 2.25s ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s), calc(var(--delay, 0s) + .92s);
    }

    body.flag-burst-active .flag-dot.soft {
      animation-duration: 1s, 1.9s;
    }

    body.flag-burst-active .flag-dot.major {
      animation-duration: .82s, 2.5s;
    }

    .floating-planet {
      position: absolute;
      border-radius: 50%;
      box-shadow:
        inset -20px -24px 36px rgba(0,0,0,0.38),
        inset 8px 8px 16px rgba(255,255,255,0.12),
        0 24px 40px rgba(0,0,0,0.28);
      opacity: 0.82;
      animation: planetFloat 9s ease-in-out infinite;
    }

    .floating-planet::before,
    .floating-planet::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .floating-planet::before {
      inset: -18%;
      background: radial-gradient(circle, rgba(94, 156, 255, 0.18), transparent 66%);
      filter: blur(12px);
    }

    .floating-planet::after {
      inset: 8%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.28), transparent 18%),
        radial-gradient(circle at 62% 54%, rgba(0,0,0,0.18), transparent 20%);
      opacity: 0.88;
    }

    .floating-planet.p1 {
      width: 78px;
      height: 78px;
      left: 6%;
      top: 22%;
      background: linear-gradient(155deg, #b7d2ff, #5279ff 46%, #15214c 100%);
    }

    .floating-planet.p3 .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150%;
      height: 34%;
      transform: translate(-50%, -50%) rotate(-12deg);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .floating-planet.p3 {
      width: 56px;
      height: 56px;
      left: 18%;
      bottom: 14%;
      background: linear-gradient(155deg, #a7f3d0, #059669 46%, #062a28 100%);
      animation-duration: 8s;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 32px;
    }

    .hero-shell {
      position: relative;
      overflow: visible;
      padding: 32px;
      border-radius: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 420px);
      gap: 28px;
      align-items: stretch;
      position: relative;
      z-index: 2;
      overflow: visible;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: stretch;
      height: 100%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.22);
      color: #ddd6fe;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #d8b4fe);
      box-shadow: 0 0 12px rgba(103, 232, 255, 0.75);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy p {
      color: var(--muted);
      max-width: 720px;
      line-height: 1.8;
      font-size: 15px;
    }

    .hero-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-tag {
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e4ff;
      font-size: 13px;
    }

    .hero-day-card {
      padding: 28px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top right, rgba(34,211,238,0.18), transparent 24%),
        radial-gradient(circle at 18% 18%, rgba(79,140,255,0.16), transparent 26%),
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 32px 84px rgba(0,0,0,0.24);
      position: relative;
      overflow: visible;
      display: grid;
      gap: 22px;
      height: 100%;
    }

    .hero-day-card::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .hero-day-card::before {
      content: "";
      position: absolute;
      right: 166px;
      top: 8px;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(116,160,255,.2), transparent 56%),
        radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
      filter: blur(18px);
      opacity: 0.92;
    }

    .hero-day-main,
    .hero-day-focus {
      position: relative;
      z-index: 1;
    }

    .hero-day-focus {
      z-index: 4;
    }

    .hero-day-main {
      display: grid;
      gap: 14px;
      padding-right: 232px;
    }

    .hero-progress-inline {
      width: min(320px, calc(100% - 40px));
      margin-top: 2px;
    }

    .hero-day-focus {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-focus-card {
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 122px;
      padding: 16px 16px 15px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025)),
        rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .hero-focus-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .hero-focus-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1;
      color: #f8fbff;
    }

    .hero-focus-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero-kpi-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-kpi-card {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
        rgba(5, 10, 22, 0.32);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c7d2fe;
    }

    .hero-kpi-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 26px;
      line-height: 1;
      color: #f8fbff;
      letter-spacing: -0.05em;
    }

    .hero-kpi-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .hero-planet {
      --planet-highlight: #f8fafc;
      --planet-soft: #c7cdd6;
      --planet-mid: #818899;
      --planet-deep: #303746;
      --planet-shadow: #171c25;
      --planet-glow-a: rgba(126,174,255,.18);
      --planet-glow-b: rgba(196,122,255,.08);
      --planet-band: rgba(232,236,242,.28);
      --planet-crater-light: rgba(255,255,255,.16);
      --planet-crater-dark: rgba(0,0,0,.14);
      position: absolute;
      top: 16px;
      right: 92px;
      width: 118px;
      height: 118px;
      pointer-events: none;
      z-index: 1;
      transform-style: preserve-3d;
      animation: heroPlanetFloat 8s ease-in-out infinite;
    }

    .hero-planet-ball {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transform-style: preserve-3d;
      box-shadow:
        inset -30px -34px 46px rgba(0,0,0,.48),
        inset 12px 12px 24px rgba(255,255,255,.10),
        inset -6px -8px 14px rgba(0,0,0,.2),
        0 26px 46px rgba(0,0,0,.38);
      overflow: visible;
      isolation: isolate;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.18) 12%, transparent 18%),
        radial-gradient(circle at 52% 58%, color-mix(in srgb, var(--planet-soft) 34%, transparent), transparent 26%),
        linear-gradient(155deg, var(--planet-highlight) 0%, var(--planet-soft) 36%, var(--planet-mid) 58%, var(--planet-deep) 76%, var(--planet-shadow) 100%);
    }

    .hero-planet-ball::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter: blur(7px);
      z-index: 6;
      pointer-events: none;
    }

    .hero-planet-ball::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 22px rgba(119,166,255,.10), inset 0 0 18px rgba(255,255,255,.04);
      pointer-events: none;
      z-index: 2;
    }

    .hero-planet-aura {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--planet-glow-a), transparent 60%),
        radial-gradient(circle, var(--planet-glow-b), transparent 76%);
      filter: blur(16px);
      opacity: .9;
      z-index: -2;
      animation: auraPulse 4.5s ease-in-out infinite;
    }

    .hero-planet-atmosphere {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity: .88;
      z-index: 5;
      animation: atmosphereRotate 32s linear infinite;
      background:
        radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, rgba(229,234,240,.16) 124deg, rgba(255,255,255,0) 190deg, rgba(182,189,200,.12) 260deg, rgba(255,255,255,0) 360deg);
    }

    .hero-planet-surface {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
      mix-blend-mode: soft-light;
      opacity: .82;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.20), transparent 16%),
        radial-gradient(circle at 54% 56%, color-mix(in srgb, var(--planet-deep) 36%, transparent), transparent 22%),
        radial-gradient(circle at 68% 30%, color-mix(in srgb, var(--planet-soft) 30%, transparent), transparent 12%);
    }

    .hero-planet-surface::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter: blur(5px);
      animation: surfaceDrift 24s linear infinite;
    }

    .hero-planet-surface::after {
      content: "";
      position: absolute;
      inset: -14%;
      background: repeating-linear-gradient(155deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 24px);
      opacity: .34;
      filter: blur(3px);
      transform: rotate(-10deg);
    }

    .hero-planet-night {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 4;
      background: linear-gradient(120deg, transparent 35%, rgba(0,0,0,.68) 85%);
    }

    .hero-planet-band {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 42%;
      height: 16%;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .72;
      z-index: 6;
      transform: rotate(-15deg);
      background: linear-gradient(90deg, transparent, var(--planet-band), transparent);
      animation: bandShift 9s ease-in-out infinite;
    }

    .hero-planet-crater {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--planet-crater-light), var(--planet-crater-dark) 70%, transparent 72%);
      opacity: .42;
      mix-blend-mode: screen;
      z-index: 6;
    }

    .hero-planet-crater.c1 { width: 18%; height: 18%; left: 24%; top: 46%; }

      width: 100%;

      border-radius: 18px;
      border: 1px solid rgba(170, 194, 235, 0.14);

        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.018) 34%, rgba(255,255,255,0.01)),

      --countdown-glow: rgba(255, 120, 168, 0.3);

      --countdown-strong: #ffd86b;
      --countdown-soft: rgba(255, 120, 168, 0.16);
    }

    .countdown-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 34px 90px rgba(0,0,0,0.32),
        0 0 30px var(--countdown-soft);
    }

    .countdown-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .countdown-kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #d9e6ff;
      opacity: 0.88;
    }

    .countdown-title {
      margin-top: 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(21px, 2.15vw, 27px);
      line-height: 0.98;
      letter-spacing: -0.04em;
      max-width: 270px;
    }

    .countdown-date {
      margin-top: 6px;
      color: var(--countdown-strong);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .countdown-badge {
      flex: none;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #f8fbff;
      font-size: 11px;
      box-shadow: 0 0 24px var(--countdown-soft);
    }

    .countdown-track {
      position: relative;
      margin-top: 13px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .countdown-track::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 0;
      width: 140px;
      height: 1px;
      background: linear-gradient(90deg, var(--countdown-line), transparent);
      box-shadow: 0 0 20px var(--countdown-line);
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .countdown-segment {
      padding: 10px 8px 9px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(4, 8, 20, 0.5);
      border: 1px solid rgba(255,255,255,0.09);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .countdown-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(20px, 2.3vw, 28px);
      line-height: 1;
      letter-spacing: -0.05em;
      color: #ffffff;
      text-shadow: 0 0 22px rgba(255,255,255,0.16);
    }

    .countdown-label {
      margin-top: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #a7b8de;
    }

    .countdown-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.58;
      max-width: 400px;
    }

    .schedule-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .schedule-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .study-analytics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 0;
      margin-bottom: 0;
    }

    .analytics-shell {
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .analytics-stage {
      width: 100%;
    }

    .analytics-card {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 88% 8%, rgba(148, 197, 255, 0.16), transparent 24%),
        radial-gradient(circle at 16% 120%, rgba(34, 211, 238, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(196, 214, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 24px 60px rgba(0,0,0,0.2);
      min-height: 280px;
      overflow: hidden;
      isolation: isolate;
    }

    .analytics-card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 18% 0%, rgba(255,255,255,0.04), transparent 24%);
      pointer-events: none;
      z-index: -1;
    }

    .analytics-card.wide {
      grid-column: 1 / -1;
    }

    .analytics-card.hours {
      background:
        radial-gradient(circle at 88% 8%, rgba(96, 165, 250, 0.2), transparent 24%),
        radial-gradient(circle at 12% 100%, rgba(34, 211, 238, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
    }

    .analytics-card.growth {
      background:
        radial-gradient(circle at 86% 8%, rgba(167, 139, 250, 0.22), transparent 24%),
        radial-gradient(circle at 16% 100%, rgba(34, 211, 238, 0.1), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
    }

    .analytics-card.nova {
      background:
        radial-gradient(circle at 86% 8%, rgba(251, 191, 36, 0.18), transparent 24%),
        radial-gradient(circle at 10% 100%, rgba(52, 211, 153, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
    }

    .analytics-card.tasks {
      background:
        radial-gradient(circle at 88% 8%, rgba(251, 191, 36, 0.16), transparent 24%),
        radial-gradient(circle at 16% 100%, rgba(244, 114, 182, 0.14), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.03);
    }

    .analytics-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .analytics-kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9fb0d3;
    }

    .analytics-title {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 700;
      color: #eef4ff;
    }

    .analytics-highlight {
      padding: 10px 14px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(8, 13, 28, 0.48);
      border: 1px solid rgba(255,255,255,0.1);
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      color: #fff;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .analytics-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .analytics-metric {
      padding: 12px 14px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .analytics-metric span {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9fb0d3;
    }

    .analytics-metric strong {
      display: block;
      margin-top: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 23px;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .chart-board {
      position: relative;
      padding: 12px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,0.06), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        rgba(6, 10, 24, 0.48);
      border: 1px solid rgba(206, 221, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 14px 38px rgba(0,0,0,0.16);
      overflow: hidden;
    }

    .chart-board::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 84% 10%, rgba(103, 232, 249, 0.06), transparent 20%);
      pointer-events: none;
    }

    .chart-scroll {
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
    }

    .chart-scroll::-webkit-scrollbar {
      height: 8px;
    }

    .chart-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(159, 176, 211, 0.28);
    }

    .chart-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
    }

    .chart-svg {
      display: block;
      min-width: 100%;
      height: auto;
    }

    .chart-y-label,
    .chart-x-label,
    .chart-value-label,
    .chart-callout {
      font-family: "Space Grotesk", sans-serif;
    }

    .chart-y-label {
      fill: #8ea2cc;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .chart-x-label {
      fill: #9fb0d3;
      font-size: 10px;
      letter-spacing: 0.03em;
    }

    .chart-x-label.today {
      fill: #ffffff;
    }

    .chart-value-label {
      fill: #eef4ff;
      font-size: 10px;
      letter-spacing: 0.03em;
    }

    .chart-callout {
      fill: #ffffff;
      font-size: 10px;
      letter-spacing: 0.03em;
    }

    .chart-empty {
      min-height: 280px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #a7b8de;
      font-size: 13px;
      line-height: 1.7;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.02);
    }

    .nova-panel {
      display: grid;
      gap: 14px;
      align-items: start;
      min-height: 100%;
    }

    .nova-orbit {
      position: relative;
      min-height: 210px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 50%, rgba(251,191,36,0.08), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(52,211,153,0.06), transparent 52%),
        rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      padding: 22px;
    }

    .nova-orbit::before,
    .nova-orbit::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
    }

    .nova-orbit::before {
      top: 34px;
      right: 62px;
    }

    .nova-orbit::after {
      left: 56px;
      bottom: 40px;
      width: 7px;
      height: 7px;
      background: rgba(103, 232, 249, 0.86);
      box-shadow: 0 0 18px rgba(34,211,238,0.22);
    }

    .nova-orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 0 18px rgba(255,255,255,0.04);
    }

    .nova-orbit-ring.one {
      width: 198px;
      height: 198px;
      transform: rotate(16deg);
    }

    .nova-orbit-ring.two {
      width: 146px;
      height: 146px;
      transform: rotate(-18deg);
      border-color: rgba(251,191,36,0.18);
    }

    .nova-core {
      position: relative;
      z-index: 1;
      min-width: 164px;
      min-height: 124px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 38%),
        rgba(8,13,28,0.92);
      box-shadow:
        0 0 24px rgba(52,211,153,0.12),
        0 0 42px rgba(251,191,36,0.1),
        inset 0 1px 0 rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 16px 18px;
    }

    .nova-core-kicker,
    .nova-core-note {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #dce8ff;
    }

    .nova-core-date {
      display: block;
      margin-top: 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      color: #ffffff;
      letter-spacing: -0.03em;
    }

    .nova-core-hours {
      display: block;
      margin: 8px 0 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 34px;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.05em;
    }

    .nova-copy {
      display: grid;
      gap: 10px;
    }

    .nova-orbit {
      min-height: 282px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 50%, rgba(251,191,36,0.08), transparent 26%),
        radial-gradient(circle at 50% 50%, rgba(52,211,153,0.05), transparent 52%),
        rgba(255,255,255,0.02);
      padding: 18px;
    }

    .nova-orbit::before,
    .nova-orbit::after {
      content: none;
    }

    .nova-planet-system {
      --nova-task-ratio: 0;
      --nova-active-ratio: 0;
      position: relative;
      width: min(100%, 430px);
      min-height: 246px;
      display: grid;
      place-items: center;
    }

    .nova-planet-system::before,
    .nova-planet-system::after {
      content: "";
      position: absolute;
      inset: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .nova-planet-system::before {
      width: 230px;
      height: 230px;
      background: conic-gradient(
        from -90deg,
        rgba(251,191,36,0.95) 0 calc(var(--nova-task-ratio) * 1%),
        rgba(255,255,255,0.04) calc(var(--nova-task-ratio) * 1%) 100%
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
      opacity: 0.74;
    }

    .nova-planet-system::after {
      width: 266px;
      height: 266px;
      background: conic-gradient(
        from 90deg,
        rgba(34,211,238,0.78) 0 calc(var(--nova-active-ratio) * 1%),
        rgba(255,255,255,0.03) calc(var(--nova-active-ratio) * 1%) 100%
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      opacity: 0.52;
    }

    .nova-orbit-ring {
      pointer-events: none;
    }

    .nova-orbit-ring.one {
      width: 206px;
      height: 206px;
    }

    .nova-orbit-ring.two {
      width: 156px;
      height: 156px;
    }

    .nova-planet-wrap {
      position: relative;
      z-index: 1;
      width: 170px;
      height: 170px;
      display: grid;
      place-items: center;
    }

    .nova-planet-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 42% 38%, rgba(103,232,249,0.2), transparent 36%),
        radial-gradient(circle at 58% 58%, rgba(251,191,36,0.1), transparent 54%),
        radial-gradient(circle at 50% 50%, rgba(59,130,246,0.1), transparent 68%);
      filter: blur(16px);
      opacity: 0.72;
    }

    .nova-planet {
      position: relative;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.88), rgba(236,246,255,0.3) 11%, transparent 18%),
        radial-gradient(circle at 42% 36%, rgba(116,200,255,0.22), transparent 24%),
        radial-gradient(circle at 60% 62%, rgba(10,16,32,0.3), transparent 34%),
        linear-gradient(148deg, #d8ecff 0%, #9fbdd7 16%, #5f7ca8 34%, #2e4266 56%, #16233f 74%, #070d1d 100%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset -18px -22px 34px rgba(5, 10, 24, 0.52),
        inset 14px 14px 24px rgba(255,255,255,0.06),
        inset -4px -8px 16px rgba(0,0,0,0.16),
        0 0 30px rgba(34,211,238,0.12),
        0 0 40px rgba(59,130,246,0.08);
    }

    .nova-planet::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.22), transparent 20%),
        radial-gradient(circle at 46% 44%, rgba(255,255,255,0.08), transparent 18%),
        radial-gradient(circle at 72% 68%, rgba(0,0,0,0.18), transparent 20%);
      filter: blur(4px);
      opacity: 0.62;
    }

    .nova-planet::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.16), transparent 18%),
        linear-gradient(124deg, transparent 34%, rgba(4,8,20,0.56) 78%);
      opacity: 0.82;
    }

    .nova-core {
      position: absolute;
      inset: 0;
      z-index: 2;
      min-width: 0;
      min-height: 0;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      display: grid;
      place-items: center;
      align-content: center;
      padding: 18px;
      background: radial-gradient(circle at 50% 72%, rgba(7,12,26,0.34), transparent 42%);
    }

    .nova-core-date {
      font-size: 16px;
    }

    .nova-core-hours {
      text-shadow: 0 0 14px rgba(255,255,255,0.14);
    }

    .nova-data-pod {
      position: absolute;
      z-index: 3;
      min-width: 98px;
      padding: 9px 11px 8px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04)),
        rgba(8,13,28,0.78);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 14px 32px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.08);
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nova-data-pod.top {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .nova-data-pod.left {
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nova-data-pod.right {
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nova-data-pod.bottom {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .nova-data-label {
      display: block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9fb0d3;
    }

    .nova-data-value {
      display: block;
      margin-top: 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .schedule-table-wrap {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      background:
        radial-gradient(circle at top right, rgba(79,140,255,0.18), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.03);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 26px 70px rgba(0,0,0,0.22);
      overflow: auto;

      width: 100%;
      min-width: 1180px;
      border-collapse: separate;
      border-spacing: 0 12px;
      padding: 8px 14px 14px;
    }

    .schedule-table th,
    .schedule-table td {
      padding: 16px 18px;
      vertical-align: top;
      text-align: left;
      border-bottom: 0;
    }

      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(8, 13, 28, 0.96);
      color: #d5defe;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      backdrop-filter: blur(16px);
    }

    .schedule-table tbody tr {
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .schedule-table tbody tr:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
    }

    .schedule-table tbody td {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(6, 10, 24, 0.72);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .schedule-table tbody td:first-child {
      border-left: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px 0 0 22px;
    }

    .schedule-table tbody td:last-child {
      border-right: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 22px 22px 0;
    }

    .schedule-table tr.active-row td {
      background:
        linear-gradient(180deg, rgba(104, 142, 255, 0.14), rgba(34, 211, 238, 0.06)),
        rgba(9, 16, 34, 0.9);
      border-top-color: rgba(114, 153, 255, 0.26);

      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);

      content: "";
      width: 8px;
      height: 8px;

      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0.8;

      background: rgba(255,255,255,0.035);
      padding: 18px;
      backdrop-filter: blur(10px);

      box-shadow: 0 18px 44px rgba(0,0,0,0.12);
      display: block;

      position: sticky;
      top: 0;
      z-index: 2;

      align-items: center;
      padding: 6px 0 10px;

      list-style: none;

      content: "▸";

      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;

      background: rgba(255,255,255,0.06);

        const dd = String(cursor.getDate()).padStart(2, "0");
        const mm = String(cursor.getMonth() + 1).padStart(2, "0");
        days.push({
          date: `${dd}/${mm}`,

          weekday: weekdayMap[cursor.getDay()],
          physics: [],

      return days;

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function expandTaskEntry(text) {
      const normalized = String(text).trim();
      if (!normalized) return [];

      const colonMatch = normalized.match(/^([^:]+:\s*)(.+)$/);
      if (colonMatch) {
        const [, prefix, rest] = colonMatch;
        if (rest.includes(",")) {
          return rest.split(",").map((part) => `${prefix}${part.trim()}`).filter(Boolean);
        }
      }

      const seriesMatch = normalized.match(/^(Bắc Trung Nam Đề|Đề|Topic)\s+(.+)$/i);
      if (seriesMatch && seriesMatch[2].includes(",")) {
        const label = seriesMatch[1];
        return seriesMatch[2].split(",").map((part) => `${label} ${part.trim()}`).filter(Boolean);
      }

      return [normalized];
    }

    function createStructuredTaskItem({ date = "", group = "", time = "", content = "", note = "", text = "", done = false }) {
      const rawText = String(text || "").trim();
      const parsedTime = time || (rawText.includes(" · ") ? rawText.split(" · ")[0].trim() : "");
      const parsedContent = content || (rawText.includes(" · ") ? rawText.split(" · ").slice(1).join(" · ").trim() : rawText);
      return {
        date: String(date || "").trim(),
        group: String(group || "").trim(),
        time: String(parsedTime || "").trim(),
        content: String(parsedContent || "").trim(),
        note: String(note || "").trim(),
        text: String(parsedContent || rawText).trim(),
        done: !!done
      };
    }

    function createTaskItems(list) {
      return list.flatMap((text) => expandTaskEntry(text)).map((text) => createStructuredTaskItem({ text, content: text }));
    }

    function normalizeTaskItems(items, date = "", group = "") {
      if (!Array.isArray(items)) return [];
      return items
        .filter((item) => item && ((typeof item.content === "string" && item.content.trim()) || (typeof item.text === "string" && item.text.trim())))
        .map((item) => createStructuredTaskItem({ ...item, date: item.date || date, group: item.group || group, done: item.done }));
    }

    function taskIdentity(item) {
      return [item.date, item.group, item.time, item.content, item.note].join("|").trim();
    }

    function mergeTaskItems(savedItems, freshItems, date = "", group = "") {
      const safeFresh = normalizeTaskItems(freshItems, date, group);
      const safeSaved = normalizeTaskItems(savedItems, date, group);
      if (!safeSaved.length) return safeFresh;
      if (!safeFresh.length) return safeSaved;

      const savedByText = new Map(safeSaved.map((item) => [taskIdentity(item), !!item.done]));
      const merged = safeFresh.map((item) => ({
        ...item,
        done: savedByText.has(taskIdentity(item)) ? savedByText.get(taskIdentity(item)) : item.done
      }));

      safeSaved.forEach((item) => {
        if (!merged.some((fresh) => taskIdentity(fresh) === taskIdentity(item))) merged.push(item);
      });

      return merged;
    }

    function createTaskMap() {
      const map = {};
      initialSchedule.forEach((day) => {
        map[day.date] = {
          physics: createTaskItems(day.physics),
          math: createTaskItems(day.math),
          english: createTaskItems(day.english),
          review: createTaskItems(day.review),
          dailyNote: "",
          pace: "Đúng nhịp",
          customAdd: ""
        };
      });
      return map;
    }

    const defaultState = {
      schedule: clone(initialSchedule),
      selectedDate: initialSchedule[0].date,
      query: "",
      phaseFilter: "Tất cả",
      tab: "all",
      tasks: createTaskMap()
    };

    function normalizeSchedule(savedSchedule) {
      const savedByDate = new Map(
        Array.isArray(savedSchedule)
          ? savedSchedule.filter((day) => day && typeof day.date === "string").map((day) => [day.date, day])
          : []
      );

      return initialSchedule.map((freshDay) => {
        const savedDay = savedByDate.get(freshDay.date) || {};
        return {
          ...freshDay,
          phase: typeof savedDay.phase === "string" && savedDay.phase.trim() ? savedDay.phase : freshDay.phase,
          note: typeof savedDay.note === "string" ? savedDay.note : freshDay.note
        };
      });
    }

    function mergeTasks(savedTasks, freshTasks) {
      const merged = {};
      Object.keys(freshTasks).forEach((date) => {
        const savedDay = savedTasks && savedTasks[date] ? savedTasks[date] : {};
        merged[date] = {
          physics: mergeTaskItems(savedDay.physics, freshTasks[date].physics, date, "physics"),
          math: mergeTaskItems(savedDay.math, freshTasks[date].math, date, "math"),
          english: mergeTaskItems(savedDay.english, freshTasks[date].english, date, "english"),
          review: mergeTaskItems(savedDay.review, freshTasks[date].review, date, "review"),
          dailyNote: typeof savedDay.dailyNote === "string" ? savedDay.dailyNote : "",
          pace: typeof savedDay.pace === "string" ? savedDay.pace : "Đúng nhịp",
          customAdd: typeof savedDay.customAdd === "string" ? savedDay.customAdd : ""
        };
      });
      return merged;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        const saved = JSON.parse(raw);
        const schedule = normalizeSchedule(saved.schedule);
        const validDates = new Set(schedule.map((day) => day.date));

        return {
          schedule,
          selectedDate: validDates.has(saved.selectedDate) ? saved.selectedDate : initialSchedule[0].date,
          query: typeof saved.query === "string" ? saved.query : "",
          phaseFilter: typeof saved.phaseFilter === "string" ? saved.phaseFilter : "Tất cả",
          tab: typeof saved.tab === "string" ? saved.tab : "all",
          tasks: mergeTasks(saved.tasks, createTaskMap())
        };
      } catch (err) {
        console.error("Không đọc được dữ liệu localStorage, dùng trạng thái mặc định:", err);
        return clone(defaultState);
      }
    }

    const state = loadState();

    function persistState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.error("Không lưu được dữ liệu vào localStorage:", err);
      }
    }

    function saveState() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        persistState();
        saveTimer = 0;
      }, 120);
    }

    function flushState() {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = 0;
      }
      persistState();
    }

    function slugifyDateForFile(dateText) {
      return String(dateText || "ngay")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "") || "ngay";
    }

    function exportDayBackup(date) {
      const day = state.schedule.find((item) => item.date === date);
      const taskState = ensureTaskState(date);
      if (!day || !taskState) {
        alert("Khong tim thay du lieu ngay nay de backup.");
        return;
      }

      flushState();

      const backupPayload = {
        app: "vsat",
        type: "daily-backup",
        exportedAt: new Date().toISOString(),
        day: clone(day),
        tasks: clone(taskState)
      };

      const blob = new Blob([JSON.stringify(backupPayload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const safeDate = slugifyDateForFile(date);
      const todayStamp = new Date().toISOString().slice(0, 10);

      link.href = url;
      link.download = `vsat-backup-${safeDate}-${todayStamp}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();

      window.setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function scheduleRender() {
      if (renderRaf) return;
      renderRaf = window.requestAnimationFrame(() => {
        renderRaf = 0;

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function hashPlanetSeed(seed) {
      return String(seed).split("").reduce((hash, char) => ((hash << 5) - hash + char.charCodeAt(0)) >>> 0, 2166136261);

    function applyDailyPlanetPalette(seed) {
      const planet = document.querySelector(".hero-planet");
      if (!planet) return;

      const daySeed = seed || new Date().toLocaleDateString("vi-VN");
      const palette = DAILY_PLANET_PALETTES[hashPlanetSeed(daySeed) % DAILY_PLANET_PALETTES.length];
      planet.style.setProperty("--planet-highlight", palette.highlight);
      planet.style.setProperty("--planet-soft", palette.soft);
      planet.style.setProperty("--planet-mid", palette.mid);
      planet.style.setProperty("--planet-deep", palette.deep);
      planet.style.setProperty("--planet-shadow", palette.shadow);
      planet.style.setProperty("--planet-glow-a", palette.glowA);
      planet.style.setProperty("--planet-glow-b", palette.glowB);
      planet.style.setProperty("--planet-band", palette.band);
      planet.setAttribute("data-planet-palette", palette.name);

      if (target.getTime() <= now.getTime()) {
        target = new Date(currentYear + 1, month - 1, day, 0, 0, 0, 0);
      }
      return target;
    }

    function getCountdownParts(targetTime) {
      const diff = Math.max(0, targetTime - Date.now());
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return {
        done: diff <= 0,
        days: String(days).padStart(2, "0"),
        hours: String(hours).padStart(2, "0"),
        minutes: String(minutes).padStart(2, "0"),
        seconds: String(seconds).padStart(2, "0")
      };
    }

    function initExamCountdowns() {
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }

      examCountdownNodes = [...document.querySelectorAll("[data-countdown-target]")].map((item) => ({
        targetTime: Number(item.dataset.countdownTarget),
        days: item.querySelector("[data-unit='days']"),
        hours: item.querySelector("[data-unit='hours']"),
        minutes: item.querySelector("[data-unit='minutes']"),
        seconds: item.querySelector("[data-unit='seconds']"),
        note: item.querySelector(".countdown-note"),
        done: false
      }));
      if (!examCountdownNodes.length) return;

      const updateCountdowns = () => {
        examCountdownNodes.forEach((item) => {
          const parts = getCountdownParts(item.targetTime);

          if (item.days && item.days.textContent !== parts.days) item.days.textContent = parts.days;
          if (item.hours && item.hours.textContent !== parts.hours) item.hours.textContent = parts.hours;
          if (item.minutes && item.minutes.textContent !== parts.minutes) item.minutes.textContent = parts.minutes;
          if (item.seconds && item.seconds.textContent !== parts.seconds) item.seconds.textContent = parts.seconds;

          const note = item.note;
          if (parts.done && !item.done && item.note) {
            item.note.textContent = "Đã tới mốc thi. Hít sâu, vào phòng với cái đầu thật tỉnh và gọn.";
            if (note) note.textContent = "Đã tới mốc thi. Hít sâu, vào phòng với cái đầu thật tỉnh và gọn.";
          }
          item.done = parts.done;
        });
      };

      updateCountdowns();
      examCountdownTimer = window.setInterval(updateCountdowns, 1000);
    }

    function allTasks() {
      return Object.values(state.tasks).flatMap((day) => [...day.physics, ...day.math, ...day.english, ...day.review]);
    }

    function parseStudyMinutes(value) {
      const text = String(value || "").trim();
      if (!text) return 0;

      const rangeMatch = text.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
      if (rangeMatch) {
        const start = Number(rangeMatch[1]) * 60 + Number(rangeMatch[2]);
        const end = Number(rangeMatch[3]) * 60 + Number(rangeMatch[4]);
        return end > start ? end - start : 0;
      }

      const hourMinuteMatch = text.match(/(\d+(?:[.,]\d+)?)\s*(h|gio|hr)\s*(?:(\d{1,2})\s*(p|phut|min))?/i);
      if (hourMinuteMatch) {
        const hours = Number(hourMinuteMatch[1].replace(",", "."));
        const minutes = hourMinuteMatch[3] ? Number(hourMinuteMatch[3]) : 0;
        return Math.round(hours * 60) + minutes;
      }

      const minuteMatch = text.match(/(\d+)\s*(p|phut|min)/i);
      if (minuteMatch) return Number(minuteMatch[1]);

      return 0;
    }

    function formatStudyMinutes(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = Math.floor(safeMinutes / 60);
      const minutes = safeMinutes % 60;
      if (!hours) return `${minutes}p`;
      if (!minutes) return `${hours}h`;
      return `${hours}h ${minutes}p`;
    }

    function totalDoneStudyMinutes() {
      return allTasks()
        .filter((item) => item.done)
        .reduce((sum, item) => sum + parseStudyMinutes(item.time), 0);
    }

    function shortDateLabel(dateText) {
      const parts = String(dateText || "").split("/");
      if (parts.length >= 2) return `${parts[0]}/${parts[1]}`;
      return String(dateText || "");
    }

    function parseScheduleDate(dateText) {
      const [ddText, mmText] = String(dateText || "").split("/");
      const day = Number(ddText);
      const month = Number(mmText);
      if (!day || !month) return null;

      let year = SCHEDULE_RANGE.startYear;
      if (SCHEDULE_RANGE.startYear !== SCHEDULE_RANGE.endYear && month < SCHEDULE_RANGE.startMonth) {
        year = SCHEDULE_RANGE.endYear;
      }
      return new Date(year, month - 1, day, 12, 0, 0, 0);
    }

    function getTodayCutoffDate() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0, 0);
    }

    function formatAxisMinutesLabel(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = safeMinutes / 60;
      if (safeMinutes === 0) return "0h";
      if (hours >= 1) return `${hours % 1 === 0 ? hours.toFixed(0) : hours.toFixed(1)}h`;
      return `${safeMinutes}p`;
    }

    function formatCompactMinutes(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = Math.floor(safeMinutes / 60);
      const minutes = safeMinutes % 60;
      if (!hours) return `${minutes}p`;
      if (!minutes) return `${hours}h`;
      if (hours >= 10) return `${hours}h`;
      return `${hours}h${String(minutes).padStart(2, "0")}`;
    }

    function getNiceStep(maxValue, segments = 4, mode = "number") {
      const safeMax = Math.max(0, Number(maxValue) || 0);
      if (!safeMax) return mode === "minutes" ? 30 : 1;

      const rough = safeMax / Math.max(1, segments);
      const magnitude = 10 ** Math.floor(Math.log10(Math.max(rough, 1)));
      const normalized = rough / magnitude;
      let multiplier = 10;

      if (normalized <= 1) multiplier = 1;
      else if (normalized <= 2) multiplier = 2;
      else if (normalized <= 2.5) multiplier = 2.5;
      else if (normalized <= 4) multiplier = 4;
      else if (normalized <= 5) multiplier = 5;

      let step = multiplier * magnitude;
      if (mode === "tasks") step = Math.max(1, Math.round(step));
      return step;
    }

    function buildAxisModel(maxValue, segments = 4, mode = "number") {
      const safeMax = Math.max(0, Number(maxValue) || 0);
      if (!safeMax) {
        const topValue = mode === "minutes" ? 60 : 4;
        const step = topValue / segments;
        const ticks = Array.from({ length: segments + 1 }, (_, index) => topValue - (step * index));
        return { topValue, step, ticks };
      }

      const step = getNiceStep(maxValue, segments, mode);
      let topValue = step * segments;

      while (topValue < maxValue) topValue += step;
      if (mode === "minutes" && maxValue > 0 && topValue < 60) topValue = 60;
      if (mode === "tasks" && topValue < 4) topValue = 4;

      const ticks = Array.from({ length: segments + 1 }, (_, index) => topValue - (step * index));
      return { topValue, step, ticks };
    }

    function buildLinePath(points) {
      if (!points.length) return "";
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
    }

    function buildAreaPath(points, baselineY) {
      if (!points.length) return "";
      return `M ${points[0].x} ${baselineY} L ${points.map((point) => `${point.x} ${point.y}`).join(" L ")} L ${points[points.length - 1].x} ${baselineY} Z`;
    }

    function buildStudyAnalytics(days) {
      const todayCutoff = getTodayCutoffDate();
      const chartDays = days.filter((day) => {
        const parsed = parseScheduleDate(day.date);
        return parsed && parsed.getTime() <= todayCutoff.getTime();
      });

      let cumulativeDoneMinutes = 0;
      const stats = chartDays.map((day) => {
        const taskState = ensureTaskState(day.date);
        const tasks = [...taskState.physics, ...taskState.math, ...taskState.english, ...taskState.review];
        const plannedMinutes = tasks.reduce((sum, item) => sum + parseStudyMinutes(item.time), 0);
        const doneTasks = tasks.filter((item) => item.done);
        const doneMinutes = doneTasks.reduce((sum, item) => sum + parseStudyMinutes(item.time), 0);
        cumulativeDoneMinutes += doneMinutes;
        return {
          date: day.date,
          label: shortDateLabel(day.date),
          tasks,
          plannedMinutes,
          doneMinutes,
          doneCount: doneTasks.length,
          cumulativeDoneMinutes
        };
      });

      const maxPlannedMinutes = Math.max(...stats.map((item) => item.plannedMinutes), 0);
      const maxDoneMinutes = Math.max(...stats.map((item) => item.doneMinutes), 0);
      const maxDoneCount = Math.max(...stats.map((item) => item.doneCount), 0);
      const maxCumulativeDoneMinutes = Math.max(...stats.map((item) => item.cumulativeDoneMinutes), 0);
      const taskHighlight = stats.reduce((best, item) => item.doneCount > best.doneCount ? item : best, stats[0] || {
        date: "",
        doneCount: 0
      });
      const highlight = stats.reduce((best, item) => item.doneMinutes > best.doneMinutes ? item : best, stats[0] || {
        date: "",
        label: "",
        plannedMinutes: 0,
        doneMinutes: 0,
        doneCount: 0,
        cumulativeDoneMinutes: 0,
        tasks: []
      });

      return {
        stats,
        cutoffLabel: shortDateLabel(`${String(todayCutoff.getDate()).padStart(2, "0")}/${String(todayCutoff.getMonth() + 1).padStart(2, "0")}`),
        renderedThroughLabel: stats.length ? stats[stats.length - 1].date : "",
        maxPlannedMinutes,
        maxDoneMinutes,
        maxDoneCount,
        maxCumulativeDoneMinutes,
        highlight,
        taskHighlight,
        totalPlannedMinutes: stats.reduce((sum, item) => sum + item.plannedMinutes, 0),
        totalDoneMinutes: stats.reduce((sum, item) => sum + item.doneMinutes, 0),
        activeDays: stats.filter((item) => item.doneMinutes > 0).length,
        averageDoneMinutes: stats.length ? Math.round(stats.reduce((sum, item) => sum + item.doneMinutes, 0) / stats.length) : 0,
        currentChartDate: stats.length ? stats[stats.length - 1].date : ""
      };
    }

    function getProgress() {
      const tasks = allTasks();
      const total = tasks.length;
      const done = tasks.filter((item) => item.done).length;
      return total ? Math.round((done * 100) / total) : 0;
    }

    function groupProgress(key, taskState = ensureTaskState(state.selectedDate)) {
      const items = taskState[key] || [];
      const done = items.filter((item) => item.done).length;
      return items.length ? Math.round((done * 100) / items.length) : 0;
    }

    function filteredDays() {
      return state.schedule.filter((day) => {
        const taskGroup = state.tasks[day.date] || { physics: [], math: [], english: [], review: [] };
        const tasks = [...taskGroup.physics, ...taskGroup.math, ...taskGroup.english, ...taskGroup.review];
        const taskTexts = tasks.map((task) => task.text);
        const haystack = [day.date, day.weekday, day.phase, day.note, ...taskTexts].join(" ").toLowerCase();
        const queryMatch = !state.query || haystack.includes(state.query.toLowerCase());
        const phaseMatch = state.phaseFilter === "Tất cả" || day.phase === state.phaseFilter;
        let tabMatch = true;
        if (state.tab === "active") tabMatch = tasks.some((task) => !task.done);
        if (state.tab === "done") tabMatch = tasks.length > 0 && tasks.every((task) => task.done);
        return queryMatch && phaseMatch && tabMatch;
      });
    }

      return ["Tất cả", ...new Set(state.schedule.map((day) => day.phase))];

    function getNormalizedTaskOrder(rawValue, max) {
      const parsed = Number.parseInt(String(rawValue || "").trim(), 10);
      if (!Number.isFinite(parsed)) return max;
      return Math.max(1, Math.min(parsed, max));
    }

    function insertTaskAt(list, item, order) {
      const normalizedOrder = getNormalizedTaskOrder(order, list.length + 1);
      list.splice(normalizedOrder - 1, 0, item);

      const taskNote = taskNoteInput ? taskNoteInput.value.trim() : "";
      const dayNote = dayNoteInput ? dayNoteInput.value.trim() : "";

      if (!text) {

            day.note = dayNoteInput.value;

    function simplifyText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function normalizeImportSubject(rawSubject) {
      const subject = simplifyText(rawSubject);
      const subjectMap = new Map([
        ["vat li", "physics"], ["vat ly", "physics"], ["ly", "physics"], ["vl", "physics"], ["physics", "physics"],
        ["toan", "math"], ["math", "math"], ["maths", "math"], ["m", "math"],
        ["tieng anh", "english"], ["anh", "english"], ["ta", "english"], ["english", "english"],
        ["on loi", "review"], ["on tap", "review"], ["recall", "review"], ["review", "review"], ["loi sai", "review"]
      ]);
      return subjectMap.get(subject) || "";
    }

    function normalizeImportDate(rawDate) {
      const value = String(rawDate || "").trim();
      const match = value.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?$/);
      if (!match) return "";
      const day = Number(match[1]);
      const month = Number(match[2]);
      const year = match[3] ? Number(match[3].length === 2 ? `20${match[3]}` : match[3]) : 2026;
      if (year !== 2026 || day < 1 || day > 31 || month < 1 || month > 12) return "";
      const normalized = `${String(day).padStart(2, "0")}/${String(month).padStart(2, "0")}`;
      return state.schedule.some((dayItem) => dayItem.date === normalized) ? normalized : "";
    }

    function parseScheduleImportText(rawText) {
      const errors = [];
      const entries = [];
      const cleanText = String(rawText || "").replace(/^\uFEFF/, "").replace(/\r/g, "");
      const lines = cleanText.split("\n");

      lines.forEach((rawLine, index) => {
        const lineNumber = index + 1;
        const line = rawLine.trim();
        if (!line || line.startsWith("#")) return;

        const lowerLine = simplifyText(line);
        if (lineNumber === 1 && lowerLine.includes("ngay") && lowerLine.includes("mon") && lowerLine.includes("noi dung")) return;

        const separator = line.includes("|") ? "|" : (line.includes(";") ? ";" : "");
        if (!separator) {
          errors.push(`Dòng ${lineNumber}: thiếu dấu phân cách | giữa các cột.`);
          return;
        }

        const parts = line.split(separator).map((part) => part.trim());
        if (parts.length < 4) {
          errors.push(`Dòng ${lineNumber}: cần ít nhất 4 cột: Ngày | Môn | Giờ | Nội dung.`);
          return;
        }

        const [dateRaw, subjectRaw, timeRaw, contentRaw, ...noteParts] = parts;
        const date = normalizeImportDate(dateRaw);
        const group = normalizeImportSubject(subjectRaw);
        const time = timeRaw.trim();
        const content = contentRaw.trim();
        const note = noteParts.join(" | ").trim();

        if (!date) errors.push(`Dòng ${lineNumber}: ngày "${dateRaw}" không nằm trong khoảng 13/05 - 10/06/2026.`);
        if (!group) errors.push(`Dòng ${lineNumber}: môn "${subjectRaw}" chưa đúng. Dùng Vật lí, Toán, Tiếng Anh hoặc Ôn lỗi.`);
        if (!content) errors.push(`Dòng ${lineNumber}: thiếu nội dung học.`);
        if (!date || !group || !content) return;

        entries.push({
          lineNumber,
          date,
          group,
          time,
          content,
          note
        });
      });

      if (!entries.length && !errors.length) {
        errors.push("File rỗng hoặc chỉ có dòng chú thích. Hãy thêm ít nhất một dòng lịch học.");
      }

      return { entries, errors };
    }

      state.schedule.forEach((day) => {
        day.note = "";
        const taskState = ensureTaskState(day.date);
        taskState.physics = [];

    function appendDayNote(day, note) {
      if (!note) return;
      const current = String(day.note || "").trim();
      if (!current) {
        day.note = note;
        return;
      }
      if (!current.includes(note)) day.note = `${current}\n${note}`;
    }

    function findScheduleDay(date) {
      return state.schedule.find((day) => day.date === date) || null;
    }

    function isPlainObject(value) {
      return value && typeof value === "object" && !Array.isArray(value);
    }

    function parseBackupFilePayload(rawText) {
      const text = String(rawText || "").trim();
      if (!text || !text.startsWith("{")) return null;

      try {
        const payload = JSON.parse(text);
        if (!isPlainObject(payload) || payload.type !== "daily-backup") return null;
        return payload;
      } catch (err) {
        return null;
      }
    }

    function importDailyBackup(rawText, mode) {
      const payload = parseBackupFilePayload(rawText);
      if (!payload) return false;

      const backupDay = isPlainObject(payload.day) ? payload.day : null;
      const backupTasks = isPlainObject(payload.tasks) ? payload.tasks : null;
      const date = backupDay && typeof backupDay.date === "string" ? backupDay.date.trim() : "";
      const targetDay = findScheduleDay(date);

      if (!date || !targetDay || !backupTasks) {
        importStatus = {
          type: "error",
          message: "File backup khong hop le hoac ngay trong backup khong ton tai trong lich hien tai."
        };
        alert(importStatus.message);
        scheduleRender();
        return true;
      }

      state.tasks[date] = {
        physics: normalizeTaskItems(backupTasks.physics, date, "physics"),
        math: normalizeTaskItems(backupTasks.math, date, "math"),
        english: normalizeTaskItems(backupTasks.english, date, "english"),
        review: normalizeTaskItems(backupTasks.review, date, "review"),
        dailyNote: typeof backupTasks.dailyNote === "string" ? backupTasks.dailyNote : "",
        pace: typeof backupTasks.pace === "string" && backupTasks.pace.trim() ? backupTasks.pace : "Đúng nhịp",
        customAdd: typeof backupTasks.customAdd === "string" ? backupTasks.customAdd : ""
      };

      targetDay.note = typeof backupDay.note === "string" ? backupDay.note : targetDay.note;
      if (typeof backupDay.phase === "string" && backupDay.phase.trim()) targetDay.phase = backupDay.phase;

      state.selectedDate = date;
      importStatus = {
        type: "success",
        message: `Da phuc hoi backup ngay ${date} vao web thanh cong.`
      };
      saveState();
      scheduleRender();
      return true;
    }

    function importScheduleFromText(rawText, mode) {
      if (importDailyBackup(rawText, mode)) return;

      const { entries, errors } = parseScheduleImportText(rawText);
      if (errors.length) {
        importStatus = {
          type: "error",
          message: `File chưa đúng công thức. ${errors.slice(0, 5).join(" ")}${errors.length > 5 ? " ..." : ""}`
        };
        alert(importStatus.message);
        scheduleRender();
        return;
      }

      if (mode === "replace") clearAllImportedScheduleData();

      let added = 0;
      let skipped = 0;
      entries.forEach((entry) => {
        const taskState = ensureTaskState(entry.date);
        if (!Array.isArray(taskState[entry.group])) taskState[entry.group] = [];

        const nextItem = createStructuredTaskItem({
          date: entry.date,
          group: entry.group,
          time: entry.time,
          content: entry.content,
          note: entry.note,
          done: false
        });
        const duplicated = taskState[entry.group].some((item) => taskIdentity(createStructuredTaskItem(item)) === taskIdentity(nextItem));
        if (duplicated) {
          skipped += 1;
        } else {
          taskState[entry.group].push(nextItem);
          added += 1;
        }
      });

      state.selectedDate = entries[0].date;
      importStatus = {
        type: "success",
        message: `Đã nhập ${added} lịch học từ file. ${skipped ? `Bỏ qua ${skipped} dòng bị trùng.` : "Không có dòng trùng."}`
      };
      saveState();
      scheduleRender();
    }

    function handleImportFile(file) {
      if (!file) return;
      const modeInput = document.getElementById("importMode");
      const mode = modeInput ? modeInput.value : "append";
      const reader = new FileReader();

      reader.onload = () => importScheduleFromText(reader.result, mode);
      reader.onerror = () => {
        importStatus = { type: "error", message: "Không đọc được file. Hãy thử lưu lại file dưới dạng UTF-8 rồi nhập lại." };
        alert(importStatus.message);
        scheduleRender();
      };
      reader.readAsText(file, "UTF-8");
    }

    function sectionHtml(title, groupKey, items) {
