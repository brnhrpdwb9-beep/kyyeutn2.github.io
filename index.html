    function buildLuckyCometRoute(reducedMotion = false) {
      const width = Math.max(window.innerWidth || 0, 960);
      const height = Math.max(window.innerHeight || 0, 640);
      const fromLeft = Math.random() < 0.5;

      let startX;
      let startY;
      let endX;
      let endY;

      if (reducedMotion) {
        startY = sampleBetween(height * 0.14, Math.min(height * 0.26, 190));
        startX = fromLeft
          ? sampleBetween(width * 0.18, width * 0.28)
          : sampleBetween(width * 0.72, width * 0.82);
        endX = startX + (fromLeft ? 1 : -1) * sampleBetween(92, 152);
        endY = startY + sampleBetween(46, 88);
      } else {
        const entryPad = sampleBetween(180, 320);
        const exitPad = sampleBetween(620, 760);
        startY = sampleBetween(-70, Math.min(height * 0.1, 80));
        startX = fromLeft
          ? -entryPad
          : width + entryPad;
        endX = fromLeft
          ? width + exitPad
          : -exitPad;
        endY = sampleBetween(height * 0.54, height + 120);
      }

      const dx = endX - startX;
      const dy = endY - startY;
      const length = Math.hypot(dx, dy) || 1;

      return {
        startX,
        startY,
        endX,
        endY,
        dx,
        dy,
        fromLeft,
        angle: Math.atan2(dy, dx) * (180 / Math.PI),
        unitX: dx / length,
        unitY: dy / length,
        perpX: -dy / length,
        perpY: dx / length
      };
    }

    function projectLuckyCometOffset(route, back = 0, side = 0) {
      return {
        x: (route.unitX * back) + (route.perpX * side),
        y: (route.unitY * back) + (route.perpY * side)
      };
    }

    function getLuckyCometSlots(formation, count) {
      const safeCount = Math.max(1, Math.min(count, 5));
      const main = { main: true, back: 0, side: 0, endBack: 0, endSide: 0, scale: 1, delay: 0 };
      if (safeCount === 1) return [main];

      const slots = [main];
      const totalSubs = safeCount - 1;

      if (formation === "twin") {
        for (let index = 0; index < totalSubs; index += 1) {
          const wave = Math.ceil((index + 1) / 2);
          const side = (index % 2 === 0 ? 48 : -48) * wave;
          slots.push({
            back: -92 - (index * 68),
            side,
            endBack: -66 - (index * 56),
            endSide: side * 0.5,
            scale: Math.max(0.58, 0.78 - (index * 0.055)),
            delay: 92 + (index * 86)
          });
        }
        return slots;
      }

      if (formation === "crescent") {
        const sideSets = {
          2: [54],
          3: [-58, 62],
          4: [-72, 18, 78],
          5: [-82, -34, 34, 86]
        };
        const sides = sideSets[safeCount] || sideSets[5];
        sides.slice(0, totalSubs).forEach((side, index) => {
          slots.push({
            back: -78 - (index * 56),
            side,
            endBack: -52 - (index * 42),
            endSide: side * 0.38,
            scale: Math.max(0.58, 0.8 - (index * 0.05)),
            delay: 84 + (index * 82)
          });
        });
        return slots;
      }

      if (formation === "spiral") {
        for (let index = 0; index < totalSubs; index += 1) {
          const wave = index + 1;
          const side = (index % 2 === 0 ? 58 : -50) * wave * 0.7;
          slots.push({
            back: -86 - (index * 64),
            side,
            endBack: -48 - (index * 48),
            endSide: side * -0.34,
            scale: Math.max(0.56, 0.78 - (index * 0.05)),
            delay: 96 + (index * 78)
          });
        }
        return slots;
      }

      for (let index = 0; index < totalSubs; index += 1) {
        const wave = Math.ceil((index + 1) / 2);
        const side = (index % 2 === 0 ? -42 : 42) * wave;
        slots.push({
          back: -84 - (index * 62),
          side,
          endBack: -58 - (index * 48),
          endSide: side * 0.42,
          scale: Math.max(0.58, 0.78 - (index * 0.055)),
          delay: 82 + (index * 78)
        });
      }
      return slots;
    }

    function createLuckyCometParticles(count, scale) {

    function drawLuckyCometParticles(ctx, comet, tone, progress, fade, radius, tailLength) {
      const spread = radius * 2.15;
      const sparkleFade = 1 - clampNumber((progress - 0.7) / 0.3, 0, 1);
      const particleCount = comet.particles.length;
      const raritySoftness = comet.rarityKey === "rare" ? 0.74 : 0.84;
      const wave = progress * LUCKY_TWO_PI;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let index = 0; index < particleCount; index += 1) {
        const particle = comet.particles[index];
        const tailX = -tailLength * particle.trail * (0.68 + (progress * 0.2));
        const wobble = Math.sin(wave + particle.phase) * particle.drift;
        const x = tailX + wobble * 0.25;
        const y = (particle.side * spread * particle.depth) + (wobble * 0.12);
        const depthScale = 1.12 - (particle.depth * 0.46);
        const alpha = particle.alpha * fade * sparkleFade * (0.28 + (0.42 * particle.depth)) * raritySoftness;
        const size = particle.size * depthScale;

        if (alpha <= 0.02) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.depth > 0.72 ? tone.glint || tone.core : tone.accent || tone.rim;
        ctx.beginPath();
        if (particle.depth > 0.82 && comet.rarityKey !== "common") {
          ctx.moveTo(x, y - size);
          ctx.lineTo(x + size, y);
          ctx.lineTo(x, y + size);
          ctx.lineTo(x - size, y);
          ctx.closePath();
        } else {
          ctx.arc(x, y, size, 0, Math.PI * 2);
        }
        ctx.fill();
      }
      ctx.restore();
    }

        ctx.bezierCurveTo(radius * 1.86, 0, radius * 1.5, radius * 0.54, radius * 0.54, radius * 0.82);
        ctx.bezierCurveTo(-radius * 0.44, radius * 0.86, -radius * 1.1, radius * 0.5, -radius * 1.28, radius * 0.02);
      } else {

      ctx.beginPath();
      ctx.moveTo(-radius * back, 0);
      ctx.lineTo(-radius * 0.48, -radius * top);
      ctx.lineTo(radius * 0.56, -radius * (top * 0.9));
      ctx.lineTo(radius * longNose, 0);
      ctx.lineTo(radius * 0.56, radius * (bottom * 0.9));

    function drawEnergyCometCore(ctx, radius, tone, progress, fade, variant = "common") {
      const profile = LUCKY_COMET_CORE_PROFILES[variant] || LUCKY_COMET_CORE_PROFILES.common;
      const pulse = 0.82 + (Math.sin(progress * Math.PI) * 0.18);
      const shimmer = 0.5 + (Math.sin((progress * Math.PI * 2.4) + radius) * 0.5);
      const centerX = radius * 0.42;

      ctx.save();
      ctx.rotate(Math.sin(progress * Math.PI * 1.4) * 0.035);

      ctx.globalCompositeOperation = "source-over";
      const depthShade = ctx.createRadialGradient(centerX - (radius * 0.18), radius * 0.22, radius * 0.12, centerX, radius * 0.12, radius * profile.core * 1.28);
      depthShade.addColorStop(0, tone.shadow || "rgba(0,0,0,0.24)");
      depthShade.addColorStop(0.46, "rgba(0,0,0,0.12)");
      depthShade.addColorStop(1, "rgba(0,0,0,0)");
      ctx.globalAlpha = fade * 0.18;
      ctx.fillStyle = depthShade;
      ctx.beginPath();
      ctx.ellipse(centerX - (radius * 0.08), radius * 0.12, radius * profile.core * 1.22, radius * profile.core * 0.62, -0.04, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";

      const outerAura = ctx.createRadialGradient(centerX, 0, radius * 0.1, centerX, 0, radius * profile.halo);
      outerAura.addColorStop(0, "rgba(255,255,255,0.08)");
      outerAura.addColorStop(0.18, tone.warm || "rgba(255,255,255,0.16)");
      outerAura.addColorStop(0.46, tone.trail || "rgba(103,232,249,0.2)");
      outerAura.addColorStop(0.78, tone.wake || "rgba(103,232,249,0.08)");
      outerAura.addColorStop(1, "rgba(255,255,255,0)");
      ctx.globalAlpha = fade * profile.alpha * pulse;
      ctx.fillStyle = outerAura;
      ctx.beginPath();
      ctx.ellipse(centerX, 0, radius * profile.halo * 1.08, radius * profile.halo * 0.56, -0.08, 0, Math.PI * 2);
      ctx.fill();

      const ionField = ctx.createRadialGradient(centerX + (radius * 0.2), -radius * 0.04, 0, centerX, 0, radius * profile.core * 1.38);
      ionField.addColorStop(0, "rgba(255,255,255,0.46)");
      ionField.addColorStop(0.16, tone.core || "rgba(248,251,255,0.72)");
      ionField.addColorStop(0.34, tone.rim || "rgba(158,215,255,0.58)");
      ionField.addColorStop(0.62, tone.trail || "rgba(103,232,249,0.24)");
      ionField.addColorStop(1, "rgba(255,255,255,0)");
      ctx.globalAlpha = fade * 0.72 * pulse;
      ctx.fillStyle = ionField;
      ctx.beginPath();
      ctx.ellipse(centerX, 0, radius * profile.core * 1.58, radius * profile.core * 0.86, -0.1, 0, Math.PI * 2);
      ctx.fill();

      nucleus.addColorStop(0.72, tone.rim || "rgba(158,215,255,0.18)");

      ctx.lineWidth = Math.max(1, radius * 0.032);

      ctx.ellipse(centerX - (radius * 0.04), 0, radius * profile.ring * 1.18, radius * profile.ring * 0.5, 0.32, Math.PI * 0.2, Math.PI * 1.68);
      ctx.stroke();

      flare.addColorStop(0.42, tone.trail || "rgba(103,232,249,0.18)");
      flare.addColorStop(0.56, "rgba(255,255,255,0.62)");
      flare.addColorStop(0.7, tone.trail || "rgba(103,232,249,0.18)");

        const angle = (index / profile.sparks) * LUCKY_TWO_PI + (progress * Math.PI * 1.2);
        const orbitX = centerX + (Math.cos(angle) * radius * profile.ring * 0.72);

        spark.addColorStop(0.34, tone.core || "rgba(248,251,255,0.36)");
        spark.addColorStop(1, "rgba(255,255,255,0)");
        ctx.globalAlpha = fade * (0.34 + (0.22 * Math.sin(angle + progress)));
        ctx.fillStyle = spark;
        ctx.beginPath();
        ctx.arc(orbitX, orbitY, sparkSize * 2.8, 0, Math.PI * 2);
        ctx.fill();

      ctx.restore();

    function drawLuckyCometBody(ctx, comet, rarity, tone, progress, fade) {
      const isRare = rarity.key === "rare";
      const profile = LUCKY_COMET_BODY_PROFILES[rarity.key] || LUCKY_COMET_BODY_PROFILES.common;
      const radius = comet.radius * (1 + (Math.sin(progress * Math.PI) * 0.07)) * profile.radius;
      const tailLength = comet.tailLength * (0.88 + (Math.sin(progress * Math.PI) * 0.12)) * profile.tail;
      const wakeHeight = radius * (profile.wake + (comet.main ? profile.mainWake : 0));

      ctx.save();
      ctx.translate(comet.x, comet.y);
      ctx.rotate(comet.angle);
      ctx.globalCompositeOperation = "lighter";

      const broadTrail = ctx.createLinearGradient(-tailLength, 0, radius * 0.7, 0);
      broadTrail.addColorStop(0, "rgba(255,255,255,0)");
      broadTrail.addColorStop(0.24, tone.wake);
      broadTrail.addColorStop(0.64, tone.trail);
      broadTrail.addColorStop(0.92, tone.warm || tone.facet || "rgba(255,255,255,0.14)");
      broadTrail.addColorStop(1, "rgba(255,255,255,0)");

      ctx.save();
      ctx.globalAlpha = fade * profile.broadAlpha * 0.2;
      ctx.strokeStyle = broadTrail;
      ctx.lineCap = "butt";
      ctx.lineWidth = Math.max(4, wakeHeight * 0.3);
      ctx.beginPath();
      ctx.moveTo(-tailLength, 0);
      ctx.bezierCurveTo(-tailLength * 0.68, -radius * 0.12, -tailLength * 0.18, -radius * 0.2, radius * 1.3, -radius * 0.02);
      ctx.stroke();
      ctx.globalAlpha = fade * profile.broadAlpha * 0.36;
      ctx.lineWidth = Math.max(1.5, radius * 0.08);
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.9, -radius * 0.46);
      ctx.bezierCurveTo(-tailLength * 0.54, -radius * 0.7, -tailLength * 0.12, -radius * 0.6, radius * 1.08, -radius * 0.26);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.88, radius * 0.42);
      ctx.bezierCurveTo(-tailLength * 0.54, radius * 0.64, -tailLength * 0.1, radius * 0.52, radius * 1.02, radius * 0.2);
      ctx.stroke();
      ctx.restore();

      const bladeTrail = ctx.createLinearGradient(-tailLength * 0.82, 0, radius * 1.1, 0);
      bladeTrail.addColorStop(0, "rgba(255,255,255,0)");
      bladeTrail.addColorStop(0.46, tone.trail);
      bladeTrail.addColorStop(0.86, tone.rim);
      bladeTrail.addColorStop(0.96, tone.facet || "rgba(255,255,255,0.18)");
      bladeTrail.addColorStop(1, "rgba(255,255,255,0)");

      ctx.save();
      ctx.globalAlpha = fade * profile.bladeAlpha * 0.82;
      ctx.strokeStyle = bladeTrail;
      ctx.lineCap = "butt";
      ctx.lineWidth = Math.max(2, radius * 0.18);
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.82, 0);
      ctx.bezierCurveTo(-tailLength * 0.42, -radius * 0.03, -tailLength * 0.12, radius * 0.02, radius * 0.98, 0);
      ctx.stroke();
      ctx.globalAlpha = fade * profile.bladeAlpha * 0.34;
      ctx.lineWidth = Math.max(1.2, radius * 0.05);
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.76, -radius * profile.bladeOuter);
      ctx.bezierCurveTo(-tailLength * 0.42, -radius * profile.bladeOuter * 0.9, -tailLength * 0.1, -radius * profile.bladeInner, radius * 0.86, -radius * profile.bladeHead);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.74, radius * profile.bladeOuter);
      ctx.bezierCurveTo(-tailLength * 0.42, radius * profile.bladeOuter * 0.88, -tailLength * 0.1, radius * profile.bladeInner, radius * 0.82, radius * 0.16);
      ctx.stroke();
      ctx.restore();

      if (rarity.key === "uncommon" || rarity.key === "mythic") {
        ctx.globalAlpha = fade * (rarity.key === "mythic" ? 0.24 : 0.18);
        ctx.strokeStyle = tone.facet || "rgba(255,255,255,0.18)";
        ctx.lineWidth = Math.max(1, radius * 0.035);
        ctx.beginPath();
        ctx.moveTo(-tailLength * 0.76, -radius * 0.34);
        ctx.bezierCurveTo(-tailLength * 0.5, -radius * 0.7, -tailLength * 0.14, -radius * 0.5, radius * 0.9, -radius * 0.24);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-tailLength * 0.78, radius * 0.32);
        ctx.bezierCurveTo(-tailLength * 0.52, radius * 0.66, -tailLength * 0.14, radius * 0.52, radius * 0.86, radius * 0.22);
        ctx.stroke();
      }

      if (isRare) {
        ctx.globalAlpha = fade * 0.24;
        ctx.strokeStyle = tone.facet || "rgba(220,226,239,0.2)";
        ctx.lineWidth = Math.max(1, radius * 0.03);
        ctx.beginPath();
        ctx.moveTo(-tailLength * 0.72, -radius * 0.26);
        ctx.bezierCurveTo(-tailLength * 0.45, -radius * 0.44, -tailLength * 0.18, -radius * 0.32, radius * 0.82, -radius * 0.18);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-tailLength * 0.74, radius * 0.24);
        ctx.bezierCurveTo(-tailLength * 0.44, radius * 0.42, -tailLength * 0.2, radius * 0.34, radius * 0.78, radius * 0.16);
        ctx.stroke();
      }

      drawLuckyCometParticles(ctx, comet, tone, progress, fade, radius, tailLength);

      if (rarity.key === "epic" || rarity.key === "mythic") {
        ctx.globalAlpha = fade * 0.42;
        ctx.strokeStyle = rarity.key === "mythic" ? "rgba(216,226,238,0.62)" : "rgba(226,207,170,0.58)";
        ctx.lineWidth = Math.max(1, radius * 0.055);
        ctx.beginPath();
        ctx.ellipse(radius * 0.08, 0, radius * 1.92, radius * 0.78, -0.22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = fade * 0.26;
        ctx.beginPath();
        ctx.ellipse(radius * 0.05, 0, radius * 2.5, radius * 1.04, 0.34, 0, Math.PI * 2);
        ctx.stroke();
      }

      const bladeAura = ctx.createLinearGradient(-tailLength * 0.32, 0, radius * 1.72, 0);
      bladeAura.addColorStop(0, "rgba(255,255,255,0)");
      bladeAura.addColorStop(0.28, tone.wake);
      bladeAura.addColorStop(0.58, tone.trail);
      bladeAura.addColorStop(0.84, tone.warm);
      bladeAura.addColorStop(1, "rgba(255,255,255,0)");
      ctx.save();
      ctx.globalAlpha = fade * 0.34;
      ctx.strokeStyle = bladeAura;
      ctx.lineCap = "butt";
      ctx.lineWidth = Math.max(1.4, radius * 0.11);
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.34, -radius * 0.5);
      ctx.bezierCurveTo(-tailLength * 0.08, -radius * 0.86, radius * 0.8, -radius * 0.74, radius * 1.78, -radius * 0.28);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.34, radius * 0.46);
      ctx.bezierCurveTo(-tailLength * 0.08, radius * 0.76, radius * 0.76, radius * 0.66, radius * 1.58, radius * 0.2);
      ctx.stroke();
      ctx.restore();

      ctx.globalAlpha = fade * 0.18;
      ctx.strokeStyle = tone.facet || "rgba(255,255,255,0.18)";
      ctx.lineWidth = Math.max(1, radius * 0.035);
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.18, -radius * 0.62);
      ctx.bezierCurveTo(radius * 0.06, -radius * 1.06, radius * 0.92, -radius * 0.92, radius * 1.66, -radius * 0.22);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-tailLength * 0.2, radius * 0.58);
      ctx.bezierCurveTo(radius * 0.08, radius * 0.98, radius * 0.94, radius * 0.82, radius * 1.58, radius * 0.2);
      ctx.stroke();

      ctx.globalCompositeOperation = "source-over";
      if (rarity.key === "common") {
        drawCommonCometCore(ctx, radius, tone, progress, fade);
      } else if (rarity.key === "uncommon") {
        drawUncommonCometCore(ctx, radius, tone, progress, fade);
      } else if (isRare) {
        drawRareCometCore(ctx, radius, tone, progress, fade);
      } else if (rarity.key === "epic") {
        drawEpicCometCore(ctx, radius, tone, progress, fade);
      } else if (rarity.key === "mythic") {
        drawMythicCometCore(ctx, radius, tone, progress, fade);
      } else {
        const core = ctx.createRadialGradient(-radius * 0.34, -radius * 0.36, radius * 0.16, 0, 0, radius * 1.38);
        core.addColorStop(0, "#ffffff");
        core.addColorStop(0.22, tone.core);
        core.addColorStop(0.64, tone.rim);
        core.addColorStop(1, tone.shadow);
        ctx.globalAlpha = fade;
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.ellipse(0, 0, radius * 1.28, radius * 0.92, 0, 0, Math.PI * 2);
        ctx.fill();

        const shade = ctx.createLinearGradient(-radius * 1.1, -radius, radius * 1.2, radius);
        shade.addColorStop(0, "rgba(255,255,255,0.26)");
        shade.addColorStop(0.48, "rgba(255,255,255,0)");
        shade.addColorStop(1, "rgba(3,8,20,0.3)");
        ctx.fillStyle = shade;
        ctx.beginPath();
        ctx.ellipse(0, 0, radius * 1.28, radius * 0.92, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = fade * 0.86;
        ctx.fillStyle = tone.glint || "rgba(255,255,255,0.82)";
        ctx.beginPath();
        ctx.ellipse(-radius * 0.34, -radius * 0.28, radius * 0.28, radius * 0.13, -0.28, 0, Math.PI * 2);
        ctx.fill();
      }

      if (rarity.key === "mythic") {
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = fade * (0.18 + (Math.sin(progress * Math.PI) * 0.3));
        const bloom = ctx.createRadialGradient(0, 0, radius * 0.6, 0, 0, radius * 4.7);
        bloom.addColorStop(0, "rgba(255,255,255,0.24)");
        bloom.addColorStop(0.42, "rgba(190,199,222,0.16)");
        bloom.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = bloom;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 4.7, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function startLuckyCometCanvasEffect({ overlay, rarity, route, slots, baseDuration, reducedMotion, triggerPoint }) {
      const canvas = document.createElement("canvas");
      canvas.className = "lucky-comet-canvas";
      canvas.setAttribute("aria-hidden", "true");
      overlay.appendChild(canvas);

      const { ctx, width: canvasWidth, height: canvasHeight } = fitLuckyCometCanvas(canvas);
      const tone = getLuckyCometTone(rarity);
      let longestLife = 0;

      const comets = slots.map((slot, index) => {
        const startOffset = projectLuckyCometOffset(route, slot.back || 0, slot.side || 0);
        const endOffset = projectLuckyCometOffset(route, slot.endBack ?? slot.back ?? 0, slot.endSide ?? 0);
        const startX = route.startX + startOffset.x;
        const startY = route.startY + startOffset.y;
        const endX = route.endX + endOffset.x;
        const endY = route.endY + endOffset.y;
        const dx = endX - startX;
        const dy = endY - startY;
        const durationMs = Math.round(baseDuration + (index * (reducedMotion ? 22 : 46)));
        const delayMs = Math.round(slot.delay || 0);
        const scale = (slot.scale || 1) * rarity.scale;
        const particleBase = reducedMotion ? (slot.main ? 22 : 12) : (slot.main ? 44 : 22);
        const particleCount = Math.round(particleBase * clampNumber(scale, 0.62, 1.35));
        longestLife = Math.max(longestLife, delayMs + durationMs);

        return {
          rarityKey: rarity.key,
          main: !!slot.main,
          startX,
          startY,
          dx,
          dy,
          angle: Math.atan2(dy, dx),
          durationMs,
          delayMs,
          scale,
          radius: rarity.headSize * 0.92 * scale,
          tailLength: rarity.length * 0.82 * scale,
          particles: createLuckyCometParticles(particleCount, scale)
        };
      });
      comets.sort((a, b) => a.scale - b.scale);

      let caption = null;
      const mainComet = comets.find((item) => item.main);
      if (mainComet && rarity.label) {
        const captionPoint = resolveLuckyCometCaptionPoint(triggerPoint);
        caption = createLuckyCometCaption({
          rarity,
          x: captionPoint.x,
          y: captionPoint.y,
          delayMs: Math.round(mainComet.delayMs + 90),
          durationMs: Math.round(Math.min(1800, mainComet.durationMs * 0.48))
        });
        if (caption) overlay.appendChild(caption);
      }

      const startedAt = performance.now();
      let frameId = 0;
      const drawFrame = (now) => {
        luckyCometFrames.delete(frameId);
        const elapsed = now - startedAt;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        for (let index = 0; index < comets.length; index += 1) {
          const comet = comets[index];
          const local = (elapsed - comet.delayMs) / comet.durationMs;
          if (local < 0 || local > 1) continue;

          const progress = easeLuckyComet(local);
          const fadeIn = clampNumber(local / 0.16, 0, 1);
          const fadeOut = 1 - clampNumber((local - 0.86) / 0.14, 0, 1);
          const fade = fadeIn * fadeOut;
          const depthLift = Math.sin(local * Math.PI) * comet.radius * 0.34;

          comet.x = comet.startX + (comet.dx * progress);
          comet.y = comet.startY + (comet.dy * progress) - depthLift;
          drawLuckyCometBody(ctx, comet, rarity, tone, progress, fade);
        }

        if (elapsed <= longestLife + 120) {
          frameId = requestAnimationFrame(drawFrame);
          luckyCometFrames.add(frameId);
        } else {
          canvas.remove();
          if (caption) caption.remove();
        }
      };

      frameId = requestAnimationFrame(drawFrame);
      luckyCometFrames.add(frameId);
      return longestLife;
    }

    function spawnLuckyCometEffect(rarityKey, useCluster, triggerPoint) {
      const rarity = LUCKY_COMET_RARITY_MAP[rarityKey] || LUCKY_COMET_RARITY_MAP.common;
      if (luckyClusterActive) return;
      if (useCluster) clearLuckyCometVisualLayer();

      const overlay = ensureLuckyCometOverlay();
      if (!overlay) return;

      const reducedMotion = prefersReducedMotionLuckyComet();
      const route = buildLuckyCometRoute(reducedMotion);
      const count = useCluster ? rarity.clusterSize : 1;
      const formation = useCluster ? pickLuckyCometFormation(rarity.key) : "arrow";
      const slots = getLuckyCometSlots(formation, count);
      const baseDuration = Math.round(
        reducedMotion
          ? sampleBetween(420, 640)
          : sampleBetween(rarity.durationRange[0], rarity.durationRange[1])
      );

      if (useCluster) luckyClusterActive = true;
      const longestLife = startLuckyCometCanvasEffect({
        overlay,
        rarity,
        route,
        slots,
        baseDuration,
        reducedMotion,
        triggerPoint
      });

      if (useCluster) {
        setLuckyCometTimer(() => {
          luckyClusterActive = false;
        }, longestLife + 180);
      }
    }

    function queueLuckyCometCompletion(triggerPoint, taskMinutes = 0) {
      if (luckyClusterActive) return;

      const now = Date.now();
      if (now < luckyCometCooldownUntil) return;

      const rarity = pickLuckyCometRarity(taskMinutes);
      const useCluster = rarity.clusterChance > 0 && (Math.random() * 100) < rarity.clusterChance;
      const captionAnchor = normalizeLuckyCometPointer(triggerPoint || luckyCometPointer);
      luckyCometCooldownUntil = now + (useCluster ? 3600 : 2400);

      setLuckyCometTimer(() => {
        spawnLuckyCometEffect(rarity.key, useCluster, captionAnchor);
      }, Math.round(sampleBetween(80, 180)));
    }

    function getUpcomingExamDate(month, day, year) {
      const fixedYear = Number(year);
      if (Number.isInteger(fixedYear) && fixedYear >= 2000) {
        return new Date(fixedYear, month - 1, day, 0, 0, 0, 0);
      }

      const now = new Date();
      const currentYear = now.getFullYear();
      let target = new Date(currentYear, month - 1, day, 0, 0, 0, 0);
      if (target.getTime() <= now.getTime()) {
        target = new Date(currentYear + 1, month - 1, day, 0, 0, 0, 0);
      }
      return target;
    }

    function formatExamDate(target) {
      const dd = String(target.getDate()).padStart(2, "0");
      const mm = String(target.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}/${target.getFullYear()}`;
    }

    function getCountdownParts(targetTime) {
      const diff = Math.max(0, targetTime - Date.now());
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return {
        done: diff <= 0,
        days: String(days).padStart(2, "0"),
        hours: String(hours).padStart(2, "0"),
        minutes: String(minutes).padStart(2, "0"),
        seconds: String(seconds).padStart(2, "0")
      };
    }

    function initExamCountdowns() {
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }

      examCountdownNodes = [...document.querySelectorAll("[data-countdown-target]")].map((item) => ({
        targetTime: Number(item.dataset.countdownTarget),
        days: item.querySelector("[data-unit='days']"),
        hours: item.querySelector("[data-unit='hours']"),
        minutes: item.querySelector("[data-unit='minutes']"),
        seconds: item.querySelector("[data-unit='seconds']"),
        note: item.querySelector(".countdown-note"),
        done: false
      }));
      if (!examCountdownNodes.length) return;

      const updateCountdowns = () => {
        examCountdownNodes.forEach((item) => {
          const parts = getCountdownParts(item.targetTime);

          if (item.days && item.days.textContent !== parts.days) item.days.textContent = parts.days;
          if (item.hours && item.hours.textContent !== parts.hours) item.hours.textContent = parts.hours;
          if (item.minutes && item.minutes.textContent !== parts.minutes) item.minutes.textContent = parts.minutes;
          if (item.seconds && item.seconds.textContent !== parts.seconds) item.seconds.textContent = parts.seconds;

          const note = item.note;
          if (parts.done && !item.done && item.note) {
            item.note.textContent = "Đã tới mốc thi. Hít sâu, vào phòng với cái đầu thật tỉnh và gọn.";
            if (note) note.textContent = "Đã tới mốc thi. Hít sâu, vào phòng với cái đầu thật tỉnh và gọn.";
          }
          item.done = parts.done;
        });
      };

      updateCountdowns();
      examCountdownTimer = window.setInterval(updateCountdowns, 1000);
    }

    function allTasks() {
      return buildGlobalTaskStats({ collectAll: true }).all;
    }

    function parseStudyClockMinutes(hoursText, minutesText = "0") {
      const hours = Number(hoursText);
      const minutes = Number(minutesText || 0);
      if (!Number.isFinite(hours) || !Number.isFinite(minutes)) return null;
      if (hours === 24 && minutes === 0) return 24 * 60;
      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
      return (hours * 60) + minutes;
    }

    function parseStudyMinutes(value) {
      const text = String(value || "").trim();
      if (!text) return 0;

      const rangeMatch = text.match(STUDY_TIME_RANGE_RE);
      if (rangeMatch) {
        const start = parseStudyClockMinutes(rangeMatch[1], rangeMatch[2]);
        const end = parseStudyClockMinutes(rangeMatch[3], rangeMatch[4]);
        if (start === null || end === null) return 0;

        let duration = end - start;
        if (duration < 0) duration += 24 * 60;
        return duration > 0 && duration <= 16 * 60 ? duration : 0;
      }

      const hourMinuteMatch = text.match(STUDY_HOUR_MINUTE_RE);
      if (hourMinuteMatch) {
        const hours = Number(hourMinuteMatch[1].replace(",", "."));
        const minutes = hourMinuteMatch[3] ? Number(hourMinuteMatch[3]) : 0;
        return Math.round(hours * 60) + minutes;
      }

      const minuteMatch = text.match(STUDY_MINUTE_RE);
      if (minuteMatch) return Number(minuteMatch[1]);

      return 0;
    }

    function formatStudyMinutes(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = Math.floor(safeMinutes / 60);
      const minutes = safeMinutes % 60;
      if (!hours) return `${minutes}p`;
      if (!minutes) return `${hours}h`;
      return `${hours}h ${minutes}p`;
    }

    function summarizeTaskItems(items) {
      const summary = {
        total: 0,
        done: 0,
        plannedMinutes: 0,
        doneMinutes: 0
      };

      for (const item of items || []) {
        summary.total += 1;
        const minutes = parseStudyMinutes(item.time);
        summary.plannedMinutes += minutes;
        if (item.done) {
          summary.done += 1;
          summary.doneMinutes += minutes;
        }
      }

      return summary;
    }

    function getTaskPercent(summary) {
      return summary.total ? Math.round((summary.done * 100) / summary.total) : 0;
    }

    function buildGlobalTaskStats({ collectAll = false } = {}) {
      const all = collectAll ? [] : null;
      const summary = {
        total: 0,
        done: 0,
        doneMinutes: 0
      };

      Object.values(state.tasks).forEach((day) => {
        TASK_GROUPS.forEach((group) => {
          const items = day[group] || [];
          items.forEach((item) => {
            if (collectAll) all.push(item);
            summary.total += 1;
            if (item.done) {
              summary.done += 1;
              summary.doneMinutes += parseStudyMinutes(item.time);
            }
          });
        });
      });

      return collectAll ? { all, ...summary } : summary;
    }

    function shortDateLabel(dateText) {
      const parts = String(dateText || "").split("/");
      if (parts.length >= 2) return `${parts[0]}/${parts[1]}`;
      return String(dateText || "");
    }

    function parseScheduleDate(dateText) {
      const cacheKey = String(dateText || "");
      if (scheduleDateCache.has(cacheKey)) return scheduleDateCache.get(cacheKey);

      const [ddText, mmText] = cacheKey.split("/");
      const day = Number(ddText);
      const month = Number(mmText);
      if (!day || !month) return null;

      let year = SCHEDULE_RANGE.startYear;
      if (SCHEDULE_RANGE.startYear !== SCHEDULE_RANGE.endYear && month < SCHEDULE_RANGE.startMonth) {
        year = SCHEDULE_RANGE.endYear;
      }
      const parsedDate = new Date(year, month - 1, day, 12, 0, 0, 0);
      scheduleDateCache.set(cacheKey, parsedDate);
      return parsedDate;
    }

    function getTodayCutoffDate() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0, 0);
    }

    function getNearestDayToToday(days) {
      const todayTime = getTodayCutoffDate().getTime();
      let nearestDay = null;
      let nearestDistance = Infinity;

      (days || []).forEach((day) => {
        const parsed = parseScheduleDate(day.date);
        if (!parsed) return;
        const distance = Math.abs(parsed.getTime() - todayTime);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestDay = day;
        }
      });

      return nearestDay;
    }

    function formatAxisMinutesLabel(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = safeMinutes / 60;
      if (safeMinutes === 0) return "0h";
      if (hours >= 1) return `${hours % 1 === 0 ? hours.toFixed(0) : hours.toFixed(1)}h`;
      return `${safeMinutes}p`;
    }

    function formatCompactMinutes(totalMinutes) {
      const safeMinutes = Math.max(0, Number(totalMinutes) || 0);
      const hours = Math.floor(safeMinutes / 60);
      const minutes = safeMinutes % 60;
      if (!hours) return `${minutes}p`;
      if (!minutes) return `${hours}h`;
      if (hours >= 10) return `${hours}h`;
      return `${hours}h${String(minutes).padStart(2, "0")}`;
    }

    function getNiceStep(maxValue, segments = 4, mode = "number") {
      const safeMax = Math.max(0, Number(maxValue) || 0);
      if (!safeMax) return mode === "minutes" ? 30 : 1;

      const rough = safeMax / Math.max(1, segments);
      const magnitude = 10 ** Math.floor(Math.log10(Math.max(rough, 1)));
      const normalized = rough / magnitude;
      let multiplier = 10;

      if (normalized <= 1) multiplier = 1;
      else if (normalized <= 2) multiplier = 2;
      else if (normalized <= 2.5) multiplier = 2.5;
      else if (normalized <= 4) multiplier = 4;
      else if (normalized <= 5) multiplier = 5;

      let step = multiplier * magnitude;
      if (mode === "tasks") step = Math.max(1, Math.round(step));
      return step;
    }

    function buildAxisModel(maxValue, segments = 4, mode = "number") {
      const safeMax = Math.max(0, Number(maxValue) || 0);
      if (!safeMax) {
        const topValue = mode === "minutes" ? 60 : 4;
        const step = topValue / segments;
        const ticks = Array.from({ length: segments + 1 }, (_, index) => topValue - (step * index));
        return { topValue, step, ticks };
      }

      const step = getNiceStep(maxValue, segments, mode);
      let topValue = step * segments;

      while (topValue < maxValue) topValue += step;
      if (mode === "minutes" && maxValue > 0 && topValue < 60) topValue = 60;
      if (mode === "tasks" && topValue < 4) topValue = 4;

      const ticks = Array.from({ length: segments + 1 }, (_, index) => topValue - (step * index));
      return { topValue, step, ticks };
    }

    function buildLinePath(points) {
      if (!points.length) return "";
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
    }

    function buildAreaPath(points, baselineY) {
      if (!points.length) return "";
      return `M ${points[0].x} ${baselineY} L ${points.map((point) => `${point.x} ${point.y}`).join(" L ")} L ${points[points.length - 1].x} ${baselineY} Z`;
    }

    function buildStudyAnalytics(days) {
      const todayCutoff = getTodayCutoffDate();
      const chartDays = days.filter((day) => {
        const parsed = parseScheduleDate(day.date);
        return parsed && parsed.getTime() <= todayCutoff.getTime();
      });

      let cumulativeDoneMinutes = 0;
      const stats = chartDays.map((day) => {
        const taskState = ensureTaskState(day.date);
        const tasks = getTaskList(taskState);
        const summary = summarizeTaskItems(tasks);
        const plannedMinutes = summary.plannedMinutes;
        const doneMinutes = summary.doneMinutes;
        cumulativeDoneMinutes += doneMinutes;
        return {
          date: day.date,
          label: shortDateLabel(day.date),
          tasks,
          plannedMinutes,
          doneMinutes,
          doneCount: summary.done,
          cumulativeDoneMinutes
        };
      });

      const analyticsSummary = {
        maxPlannedMinutes: 0,
        maxDoneMinutes: 0,
        maxDoneCount: 0,
        maxCumulativeDoneMinutes: 0,
        totalPlannedMinutes: 0,
        totalDoneMinutes: 0,
        activeDays: 0
      };
      stats.forEach((item) => {
        analyticsSummary.maxPlannedMinutes = Math.max(analyticsSummary.maxPlannedMinutes, item.plannedMinutes);
        analyticsSummary.maxDoneMinutes = Math.max(analyticsSummary.maxDoneMinutes, item.doneMinutes);
        analyticsSummary.maxDoneCount = Math.max(analyticsSummary.maxDoneCount, item.doneCount);
        analyticsSummary.maxCumulativeDoneMinutes = Math.max(analyticsSummary.maxCumulativeDoneMinutes, item.cumulativeDoneMinutes);
        analyticsSummary.totalPlannedMinutes += item.plannedMinutes;
        analyticsSummary.totalDoneMinutes += item.doneMinutes;
        if (item.doneMinutes > 0) analyticsSummary.activeDays += 1;
      });
      const taskHighlight = stats.reduce((best, item) => item.doneCount > best.doneCount ? item : best, stats[0] || {
        date: "",
        doneCount: 0
      });
      const highlight = stats.reduce((best, item) => item.doneMinutes > best.doneMinutes ? item : best, stats[0] || {
        date: "",
        label: "",
        plannedMinutes: 0,
        doneMinutes: 0,
        doneCount: 0,
        cumulativeDoneMinutes: 0,
        tasks: []
      });

      return {
        stats,
        cutoffLabel: shortDateLabel(`${String(todayCutoff.getDate()).padStart(2, "0")}/${String(todayCutoff.getMonth() + 1).padStart(2, "0")}`),
        renderedThroughLabel: stats.length ? stats[stats.length - 1].date : "",
        maxPlannedMinutes: analyticsSummary.maxPlannedMinutes,
        maxDoneMinutes: analyticsSummary.maxDoneMinutes,
        maxDoneCount: analyticsSummary.maxDoneCount,
        maxCumulativeDoneMinutes: analyticsSummary.maxCumulativeDoneMinutes,
        highlight,
        taskHighlight,
        totalPlannedMinutes: analyticsSummary.totalPlannedMinutes,
        totalDoneMinutes: analyticsSummary.totalDoneMinutes,
        activeDays: analyticsSummary.activeDays,
        averageDoneMinutes: stats.length ? Math.round(analyticsSummary.totalDoneMinutes / stats.length) : 0,
        currentChartDate: stats.length ? stats[stats.length - 1].date : ""
      };
    }

    function getProgress() {
      return getTaskPercent(buildGlobalTaskStats());
    }

    function groupProgress(key, taskState = ensureTaskState(state.selectedDate)) {
      return getTaskPercent(summarizeTaskItems(taskState[key] || []));
    }

    function filteredDays() {
      const normalizedQuery = state.query.toLowerCase();
      return state.schedule.filter((day) => {
        const taskGroup = state.tasks[day.date] || createEmptyTaskState();
        const tasks = getTaskList(taskGroup);
        let haystack = `${day.date || ""} ${day.weekday || ""} ${day.phase || ""} ${day.note || ""}`;
        tasks.forEach((task) => {
          haystack += ` ${task.text || ""}`;
        });
        haystack = haystack.toLowerCase();
        const queryMatch = !normalizedQuery || haystack.includes(normalizedQuery);
        const phaseMatch = state.phaseFilter === "Tất cả" || day.phase === state.phaseFilter;
        let tabMatch = true;
        if (state.tab === "active") tabMatch = tasks.some((task) => !task.done);
        if (state.tab === "done") tabMatch = tasks.length > 0 && tasks.every((task) => task.done);
        return queryMatch && phaseMatch && tabMatch;
      });
    }

    function phases() {
      return ["Tất cả", ...new Set(state.schedule.map((day) => day.phase))];
    }

    function ensureTaskState(date) {
      if (!state.tasks[date]) {
        state.tasks[date] = createEmptyTaskState();
      }
      return state.tasks[date];
    }

    function toggleTask(group, index, triggerPoint) {
      const taskState = ensureTaskState(state.selectedDate);
      const item = taskState[group] && taskState[group][index];
      if (!item) return;
      const wasDone = !!item.done;
      item.done = !item.done;
      if (!wasDone && item.done) {
        queueLuckyCometCompletion(triggerPoint, parseStudyMinutes(item.time));
      }
      saveState();
      scheduleRender();
    }

    function deleteTask(group, index) {
      const taskState = ensureTaskState(state.selectedDate);
      if (!taskState[group] || !taskState[group][index]) return;
      if (editingTask && editingTask.date === state.selectedDate && editingTask.group === group && editingTask.index === index) {
        editingTask = null;
      }
      taskState[group].splice(index, 1);
      saveState();
      scheduleRender();
    }

    function resetTaskEditor() {
      editingTask = null;
      syncSubjectSelectUi("physics");
      syncTaskOrderInput("physics");
      const addBtn = document.querySelector('[data-action="add-task"]');
      if (addBtn) addBtn.textContent = "Thêm";
    }

    function syncTaskOrderInput(group = "physics", value = null) {
      const orderInput = document.getElementById("addOrder");
      if (!orderInput) return;

      if (value !== null && value !== undefined && value !== "") {
        orderInput.value = String(value);
        return;
      }

      const taskState = ensureTaskState(state.selectedDate);
      const list = Array.isArray(taskState[group]) ? taskState[group] : [];
      orderInput.value = String(list.length + 1);
    }

    function getNormalizedTaskOrder(rawValue, max) {
      const parsed = Number.parseInt(String(rawValue || "").trim(), 10);
      if (!Number.isFinite(parsed)) return max;
      return Math.max(1, Math.min(parsed, max));
    }

    function insertTaskAt(list, item, order) {
      const normalizedOrder = getNormalizedTaskOrder(order, list.length + 1);
      list.splice(normalizedOrder - 1, 0, item);
    }

    function editTask(group, index) {
      const taskState = ensureTaskState(state.selectedDate);
      const item = taskState[group] && taskState[group][index];
      if (!item) return;

      editingTask = { date: state.selectedDate, group, index };
      const groupInput = document.getElementById("addGroup");
      const orderInput = document.getElementById("addOrder");
      const timeInput = document.getElementById("addTime");
      const textInput = document.getElementById("addText");
      const taskNoteInput = document.getElementById("addTaskNote");
      const addBtn = document.querySelector('[data-action="add-task"]');

      if (groupInput) groupInput.value = group;
      syncSubjectSelectUi(group);
      if (orderInput) orderInput.value = String(index + 1);
      if (timeInput) timeInput.value = item.time || "";
      if (textInput) textInput.value = item.content || item.text || "";
      if (taskNoteInput) taskNoteInput.value = item.note || "";
      if (addBtn) addBtn.textContent = "Cập nhật";
      if (textInput) textInput.focus();
    }

    function addTaskFromForm() {
      const groupInput = document.getElementById("addGroup");
      const orderInput = document.getElementById("addOrder");
      const timeInput = document.getElementById("addTime");
      const textInput = document.getElementById("addText");
      const taskNoteInput = document.getElementById("addTaskNote");
      const dayNoteInput = document.getElementById("noteInput");
      const group = groupInput ? groupInput.value : "physics";
      const taskOrder = orderInput ? orderInput.value.trim() : "";
      const time = timeInput ? timeInput.value.trim() : "";
      const text = textInput ? textInput.value.trim() : "";
      const taskNote = taskNoteInput ? taskNoteInput.value.trim() : "";
      const dayNote = dayNoteInput ? dayNoteInput.value.trim() : "";

      if (!text) {
        if (!editingTask && dayNote) {
          const day = getSelectedDay();
          if (day) {
            day.note = dayNoteInput.value;
            saveState();
            scheduleRender();
          }
          return;
        }
        alert("Nhập nội dung lịch học trước đã. Ví dụ: Làm đề VSAT 1 hoặc Ôn dao động cơ.");
        return;
      }

      const taskState = ensureTaskState(state.selectedDate);
      if (!Array.isArray(taskState[group])) taskState[group] = [];
      const nextItem = createStructuredTaskItem({
        date: state.selectedDate,
        group,
        time,
        content: text,
        note: taskNote,
        done: false
      });

      if (editingTask && editingTask.date === state.selectedDate) {
        const sourceList = taskState[editingTask.group];
        const targetList = taskState[group];
        if (Array.isArray(sourceList) && sourceList[editingTask.index] && Array.isArray(targetList)) {
          const preservedDone = !!sourceList[editingTask.index].done;
          sourceList.splice(editingTask.index, 1);
          insertTaskAt(targetList, { ...nextItem, done: preservedDone }, taskOrder);
        }
      } else {
        insertTaskAt(taskState[group], nextItem, taskOrder);
      }

      if (orderInput) syncTaskOrderInput(group);
      if (timeInput) timeInput.value = "";
      if (textInput) textInput.value = "";
      if (taskNoteInput) taskNoteInput.value = "";
      resetTaskEditor();
      saveState();
      scheduleRender();
    }

    function simplifyText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function normalizeImportSubject(rawSubject) {
      const subject = simplifyText(rawSubject);
      const subjectMap = new Map([
        ["vat li", "physics"], ["vat ly", "physics"], ["ly", "physics"], ["vl", "physics"], ["physics", "physics"],
        ["toan", "math"], ["math", "math"], ["maths", "math"], ["m", "math"],
        ["tieng anh", "english"], ["anh", "english"], ["ta", "english"], ["english", "english"],
        ["on loi", "review"], ["on tap", "review"], ["recall", "review"], ["review", "review"], ["loi sai", "review"]
      ]);
      return subjectMap.get(subject) || "";
    }

    function normalizeImportDate(rawDate) {
      const value = String(rawDate || "").trim();
      const match = value.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?$/);
      if (!match) return "";
      const day = Number(match[1]);
      const month = Number(match[2]);
      const year = match[3] ? Number(match[3].length === 2 ? `20${match[3]}` : match[3]) : 2026;
      if (year !== 2026 || day < 1 || day > 31 || month < 1 || month > 12) return "";
      const normalized = `${String(day).padStart(2, "0")}/${String(month).padStart(2, "0")}`;
      return state.schedule.some((dayItem) => dayItem.date === normalized) ? normalized : "";
    }

    function parseScheduleImportText(rawText) {
      const errors = [];
      const entries = [];
      const cleanText = String(rawText || "").replace(/^\uFEFF/, "").replace(/\r/g, "");
      const lines = cleanText.split("\n");

      lines.forEach((rawLine, index) => {
        const lineNumber = index + 1;
        const line = rawLine.trim();
        if (!line || line.startsWith("#")) return;

        const lowerLine = simplifyText(line);
        if (lineNumber === 1 && lowerLine.includes("ngay") && lowerLine.includes("mon") && lowerLine.includes("noi dung")) return;

        const separator = line.includes("|") ? "|" : (line.includes(";") ? ";" : "");
        if (!separator) {
          errors.push(`Dòng ${lineNumber}: thiếu dấu phân cách | giữa các cột.`);
          return;
        }

        const parts = line.split(separator).map((part) => part.trim());
        if (parts.length < 4) {
          errors.push(`Dòng ${lineNumber}: cần ít nhất 4 cột: Ngày | Môn | Giờ | Nội dung.`);
          return;
        }

        const [dateRaw, subjectRaw, timeRaw, contentRaw, ...noteParts] = parts;
        const date = normalizeImportDate(dateRaw);
        const group = normalizeImportSubject(subjectRaw);
        const time = timeRaw.trim();
        const content = contentRaw.trim();
        const note = noteParts.join(" | ").trim();

        if (!date) errors.push(`Dòng ${lineNumber}: ngày "${dateRaw}" không nằm trong khoảng 13/05 - 10/06/2026.`);
        if (!group) errors.push(`Dòng ${lineNumber}: môn "${subjectRaw}" chưa đúng. Dùng Vật lí, Toán, Tiếng Anh hoặc Ôn lỗi.`);
        if (!content) errors.push(`Dòng ${lineNumber}: thiếu nội dung học.`);
        if (!date || !group || !content) return;

        entries.push({
          lineNumber,
          date,
          group,
          time,
          content,
          note
        });
      });

      if (!entries.length && !errors.length) {
        errors.push("File rỗng hoặc chỉ có dòng chú thích. Hãy thêm ít nhất một dòng lịch học.");
      }

      return { entries, errors };
    }

    function clearAllImportedScheduleData() {
      state.schedule.forEach((day) => {
        day.note = "";
        const taskState = ensureTaskState(day.date);
        TASK_GROUPS.forEach((group) => {
          taskState[group] = [];
        });
        taskState.pace = DEFAULT_PACE;
      });
    }

    function appendDayNote(day, note) {
      if (!note) return;
      const current = String(day.note || "").trim();
      if (!current) {
        day.note = note;
        return;
      }
      if (!current.includes(note)) day.note = `${current}\n${note}`;
    }

    function findScheduleDay(date) {
      return state.schedule.find((day) => day.date === date) || null;
    }

    function isPlainObject(value) {
      return value && typeof value === "object" && !Array.isArray(value);
    }

    function parseBackupFilePayload(rawText) {
      const text = String(rawText || "").trim();
      if (!text || !text.startsWith("{")) return null;

      try {
        const payload = JSON.parse(text);
        if (!isPlainObject(payload) || payload.type !== "daily-backup") return null;
        return payload;
      } catch (err) {
        return null;
      }
    }

    function importDailyBackup(rawText, mode) {
      const payload = parseBackupFilePayload(rawText);
      if (!payload) return false;

      const backupDay = isPlainObject(payload.day) ? payload.day : null;
      const backupTasks = isPlainObject(payload.tasks) ? payload.tasks : null;
      const date = backupDay && typeof backupDay.date === "string" ? backupDay.date.trim() : "";
      const targetDay = findScheduleDay(date);

      if (!date || !targetDay || !backupTasks) {
        importStatus = {
          type: "error",
          message: "File backup khong hop le hoac ngay trong backup khong ton tai trong lich hien tai."
        };
        alert(importStatus.message);
        scheduleRender();
        return true;
      }

      const restoredTaskState = createEmptyTaskState();
      TASK_GROUPS.forEach((group) => {
        restoredTaskState[group] = normalizeTaskItems(backupTasks[group], date, group);
      });
      restoredTaskState.dailyNote = typeof backupTasks.dailyNote === "string" ? backupTasks.dailyNote : "";
      restoredTaskState.pace = typeof backupTasks.pace === "string" && backupTasks.pace.trim() ? backupTasks.pace : DEFAULT_PACE;
      restoredTaskState.customAdd = typeof backupTasks.customAdd === "string" ? backupTasks.customAdd : "";
      state.tasks[date] = restoredTaskState;

      targetDay.note = typeof backupDay.note === "string" ? backupDay.note : targetDay.note;
      if (typeof backupDay.phase === "string" && backupDay.phase.trim()) targetDay.phase = backupDay.phase;

      state.selectedDate = date;
      importStatus = {
        type: "success",
        message: `Da phuc hoi backup ngay ${date} vao web thanh cong.`
      };
      saveState();
      scheduleRender();
      return true;
    }

    function importScheduleFromText(rawText, mode) {
      if (importDailyBackup(rawText, mode)) return;

      const { entries, errors } = parseScheduleImportText(rawText);
      if (errors.length) {
        importStatus = {
          type: "error",
          message: `File chưa đúng công thức. ${errors.slice(0, 5).join(" ")}${errors.length > 5 ? " ..." : ""}`
        };
        alert(importStatus.message);
        scheduleRender();
        return;
      }

      if (mode === "replace") clearAllImportedScheduleData();

      let added = 0;
      let skipped = 0;
      entries.forEach((entry) => {
        const taskState = ensureTaskState(entry.date);
        if (!Array.isArray(taskState[entry.group])) taskState[entry.group] = [];

        const nextItem = createStructuredTaskItem({
          date: entry.date,
          group: entry.group,
          time: entry.time,
          content: entry.content,
          note: entry.note,
          done: false
        });
        const duplicated = taskState[entry.group].some((item) => taskIdentity(createStructuredTaskItem(item)) === taskIdentity(nextItem));
        if (duplicated) {
          skipped += 1;
        } else {
          taskState[entry.group].push(nextItem);
          added += 1;
        }
      });

      state.selectedDate = entries[0].date;
      importStatus = {
        type: "success",
        message: `Đã nhập ${added} lịch học từ file. ${skipped ? `Bỏ qua ${skipped} dòng bị trùng.` : "Không có dòng trùng."}`
      };
      saveState();
      scheduleRender();
    }

    function handleImportFile(file) {
      if (!file) return;
      const modeInput = document.getElementById("importMode");
      const mode = modeInput ? modeInput.value : "append";
      const reader = new FileReader();

      reader.onload = () => importScheduleFromText(reader.result, mode);
      reader.onerror = () => {
        importStatus = { type: "error", message: "Không đọc được file. Hãy thử lưu lại file dưới dạng UTF-8 rồi nhập lại." };
        alert(importStatus.message);
        scheduleRender();
      };
      reader.readAsText(file, "UTF-8");
    }

    function syncRadarDateListPosition() {
      const list = document.querySelector(".date-list");
      const target = list && list.querySelector("[data-radar-focus='today']");
      if (!list || !target) return;

      const listRect = list.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const targetOffset = (targetRect.top - listRect.top) + list.scrollTop;
      const centeredTop = targetOffset - ((list.clientHeight - targetRect.height) / 2);
      list.scrollTop = Math.max(0, centeredTop);
    }

    function syncGrowthChartScrollPosition() {
      const scroll = document.querySelector('[data-chart-scroll="growth-constellation"]');
      if (!scroll) return;

      const focusX = Number(scroll.dataset.chartFocusX || 0);
      if (!Number.isFinite(focusX) || focusX <= 0) return;

      const maxScrollLeft = Math.max(0, scroll.scrollWidth - scroll.clientWidth);
      const rightPadding = 96;
      const targetLeft = focusX - scroll.clientWidth + rightPadding;
      scroll.scrollLeft = clampNumber(targetLeft, 0, maxScrollLeft);
    }

    function syncHeroOrbitHeight() {
      const leftCard = document.querySelector(".hero-day-card");
      const rightCard = document.querySelector(".hero-orbit");
      const columns = document.querySelector(".orbit-progress-columns");
      const tracks = document.querySelectorAll(".orbit-progress-track");

      if (!leftCard || !rightCard || !columns) return;

      const leftHeight = Math.ceil(leftCard.getBoundingClientRect().height);
      const orbitStyle = window.getComputedStyle(rightCard);
      const padTop = parseFloat(orbitStyle.paddingTop) || 0;
      const padBottom = parseFloat(orbitStyle.paddingBottom) || 0;
      const availableHeight = Math.max(226, leftHeight - padTop - padBottom);
      const trackHeight = Math.max(150, availableHeight - 78);

      rightCard.style.height = `${leftHeight}px`;
      rightCard.style.minHeight = `${leftHeight}px`;
      columns.style.height = `${availableHeight}px`;
      tracks.forEach((track) => {
        track.style.height = `${trackHeight}px`;
      });
    }

    function positionMenuByTrigger(trigger, menu) {
      if (!trigger || !menu) return;
      const triggerRect = trigger.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      const gap = 8;
      const viewportPadding = 12;
      const menuWidth = Math.max(menuRect.width || 176, 150);
      const menuHeight = Math.max(menuRect.height || 112, 86);

      let left = triggerRect.right - menuWidth;
      left = Math.max(viewportPadding, Math.min(left, window.innerWidth - menuWidth - viewportPadding));

      let top = triggerRect.bottom + gap;
      if (top + menuHeight > window.innerHeight - viewportPadding) {
        top = Math.max(viewportPadding, triggerRect.top - menuHeight - gap);
      }

      menu.style.setProperty("--floating-menu-left", `${left}px`);
      menu.style.setProperty("--floating-menu-top", `${top}px`);
    }

    function positionFloatingMenu(wrap, triggerSelector, menuSelector) {
      const trigger = wrap && wrap.querySelector(triggerSelector);
      const menu = wrap && wrap.querySelector(menuSelector);
      positionMenuByTrigger(trigger, menu);
    }

      const scheduleMenu = document.getElementById("scheduleFloatingMenu");
      if (openScheduleTrigger && scheduleMenu && scheduleMenu.classList.contains("open")) {

    }

      menu.classList.add("open");

      trigger.setAttribute("aria-expanded", "true");

        >Mở ngày</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn task-edit-btn"
          data-action="open-day-editor"
          data-date="${safeDate}"
        >Sửa nhanh</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn"
          data-action="export-day-backup"
          data-date="${safeDate}"
        >Xuất backup</button>
      `;
      menu.classList.add("open");
      menu.setAttribute("aria-hidden", "false");
      trigger.setAttribute("aria-expanded", "true");
      positionMenuByTrigger(trigger, menu);
    }

    function handleAppClick(event) {
      const cometPointer = rememberLuckyCometPointer(event);
      const target = event.target.closest("[data-tab], [data-action]");
      if (!target) {
        closeFloatingMenus();
        return;
      }

      if (target.dataset.tab) {
        state.tab = target.dataset.tab;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle-subject-menu") {
        const wrap = target.closest("[data-subject-select]");
        if (!wrap) return;
        const isOpen = wrap.classList.contains("open");
        closeFloatingMenus();
        if (!isOpen) {
          wrap.classList.add("open");
          target.setAttribute("aria-expanded", "true");
        }
        return;
      }

      if (target.dataset.action === "select-subject-option") {
        const value = String(target.dataset.value || "physics");
        syncSubjectSelectUi(value);
        if (!editingTask) syncTaskOrderInput(value);
        closeSubjectMenu();
        if (editingTask) {
          const addBtn = document.querySelector('[data-action="add-task"]');
          if (addBtn) addBtn.textContent = "Cập nhật";
        }
        return;
      }

      if (target.dataset.action === "toggle-row-menu") {
        const wrap = target.closest(".schedule-row-actions");
        if (!wrap) return;
        const isOpen = wrap.classList.contains("open");
        closeFloatingMenus();
        if (!isOpen) {
          wrap.classList.add("open");
          openScheduleFloatingMenu(target);
        }
        return;
      }

      if (target.dataset.action === "open-day-editor") {
        closeFloatingMenus();
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        window.setTimeout(() => {
          const editor = document.querySelector(".mission-footer");
          if (editor) editor.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 80);
        return;
      }

      if (target.dataset.action === "export-day-backup") {
        closeFloatingMenus();
        exportDayBackup(target.dataset.date);
        return;
      }

      if (target.dataset.action === "select-date") {
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle") {
        closeFloatingMenus();
        toggleTask(target.dataset.group, Number(target.dataset.index), cometPointer);
        return;
      }

      if (target.dataset.action === "delete-task") {
        closeFloatingMenus();
        deleteTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "toggle-task-menu") {
        const menu = document.getElementById("taskFloatingMenu");
        const sameTaskOpen = menu
          && menu.classList.contains("open")
          && menu.dataset.group === target.dataset.group
          && menu.dataset.index === target.dataset.index;
        closeFloatingMenus();
        if (!sameTaskOpen) {
          const floatingMenu = ensureTaskFloatingMenu();
          floatingMenu.dataset.group = target.dataset.group;
          floatingMenu.dataset.index = target.dataset.index;
          openTaskFloatingMenu(target);
        }
        return;
      }

      if (target.dataset.action === "edit-task") {
        closeFloatingMenus();
        editTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "add-task") {
        addTaskFromForm();
        return;
      }

      if (target.dataset.action === "clear-day") {
        clearSelectedDay();
        return;
      }

      if (target.dataset.action === "download-template") {
        downloadImportTemplate();
        return;
      }

      if (target.dataset.action === "set-pace") {
        const paceMenu = target.closest(".pace-menu");
        if (paceMenu) paceMenu.open = false;
        setPace(target.dataset.pace);
      }
    }

    function handleAppInput(event) {
      if (event.target.id === "searchInput") {
        state.query = event.target.value;
        saveState();
        if (searchInputTimer) clearTimeout(searchInputTimer);
        searchInputTimer = window.setTimeout(() => {
          searchInputTimer = 0;
          scheduleRender();
        }, 120);
        return;
      }

      if (event.target.id === "noteInput") {
        const day = getSelectedDay();
        day.note = event.target.value;
        saveState();
        return;
      }

      if (event.target.id === "addTime" || event.target.id === "addText" || event.target.id === "addTaskNote" || event.target.id === "addGroup" || event.target.id === "addOrder") {
        if (editingTask) {
          const addBtn = document.querySelector('[data-action="add-task"]');
          if (addBtn) addBtn.textContent = "Cập nhật";
        }
      }
    }

    function handleAppChange(event) {
      if (event.target.id === "importFile") {
        handleImportFile(event.target.files && event.target.files[0]);
        return;
      }

      if (event.target.id !== "phaseSelect") return;
      state.phaseFilter = event.target.value;
      saveState();
      scheduleRender();
    }

    function randomizeFlagBurstPose() {
      const flagBurst = document.querySelector(".flag-burst");
      if (!flagBurst) return;

      const top = 42 + Math.round(Math.random() * 68);
      const right = 20 + Math.round(Math.random() * 54);
      const shiftX = -8 - Math.round(Math.random() * 22);
      const shiftY = 8 + Math.round(Math.random() * 14);
      const tilt = -12 + Math.round(Math.random() * 16);

      flagBurst.style.setProperty("--flag-top", `${top}px`);
      flagBurst.style.setProperty("--flag-right", `${right}px`);
      flagBurst.style.setProperty("--flag-shift-x", `${shiftX}px`);
      flagBurst.style.setProperty("--flag-shift-y", `${shiftY}px`);
      flagBurst.style.setProperty("--flag-tilt", `${tilt}deg`);
    }

    function triggerFlagBurst() {
      randomizeFlagBurstPose();
      document.body.classList.remove("flag-burst-active");
      void document.body.offsetWidth;
      document.body.classList.add("flag-burst-active");

      if (flagBurstTimer) clearTimeout(flagBurstTimer);
      flagBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("flag-burst-active");
        flagBurstTimer = 0;
      }, 4200);
    }

    function startFlagBurstLoop() {
      if (flagBurstLoop) clearInterval(flagBurstLoop);
      flagBurstLoop = window.setInterval(() => {
        triggerFlagBurst();
      }, 10000);
    }

    app.addEventListener("click", handleAppClick);
    app.addEventListener("input", handleAppInput);
    app.addEventListener("change", handleAppChange);
    window.addEventListener("pointermove", rememberLuckyCometPointer, { passive: true });
    window.addEventListener("resize", () => {
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
        syncOpenFloatingMenus();
      });
    });
    window.addEventListener("scroll", scheduleFloatingMenuSync, { passive: true });
    window.addEventListener("pagehide", () => {
      if (renderRaf) {
        cancelAnimationFrame(renderRaf);
        renderRaf = 0;
      }
      if (syncHeightRaf) {
        cancelAnimationFrame(syncHeightRaf);
        syncHeightRaf = 0;
      }
      if (floatingMenuSyncRaf) {
        cancelAnimationFrame(floatingMenuSyncRaf);
        floatingMenuSyncRaf = 0;
      }
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }
      clearLuckyCometEffects();
      flushState();
    });
    render();
    window.setTimeout(triggerFlagBurst, 1800);
    startFlagBurstLoop();

  </script>
</body>
</html>
