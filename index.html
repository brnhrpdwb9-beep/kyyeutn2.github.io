                  <span class="badge">${visibleDays.length} ngày</span>
                  <span class="badge">${done}/${total} việc</span>
                  <span class="badge ${paceClassMap[selectedTaskState.pace]}">${escapeHtml(selectedTaskState.pace)}</span>
                </div>
              </div>

              <div class="schedule-table-wrap">
                <table class="schedule-table">
                  <thead>
                    <tr>
                      <th>Ngày</th>
                      <th>Lịch học theo môn</th>
                      <th>Tiến độ</th>
                      <th>Ghi chú</th>
                      <th class="schedule-action-head">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${visibleDays.map((day) => {
                      const taskState = ensureTaskState(day.date);
                      const mainTasks = [...taskState.physics, ...taskState.math, ...taskState.english, ...taskState.review];
                      const mainDone = mainTasks.filter((item) => item.done).length;
                      const mainPercent = mainTasks.length ? Math.round((mainDone * 100) / mainTasks.length) : 0;

                      const renderTaskPanel = (title, items, variant, icon) => {
                        const panelMood = {
                          physics: "BLUE ORBIT",
                          math: "VIOLET ENGINE",
                          english: "ROSE SIGNAL",
                          review: "GREEN RESET"
                        }[variant] || "TASK";
                        return `
                        <div class="schedule-task-panel ${variant}">
                          <div class="schedule-task-head">
                            <div class="schedule-task-headline">
                              <span class="schedule-task-icon">${icon}</span>
                              <div>
                                <div class="schedule-task-eyebrow">${panelMood}</div>
                                <div class="schedule-task-title">${title}</div>
                                <div class="schedule-task-summary">${items.length ? `${items.filter((item) => item.done).length} / ${items.length} mục đã xong` : "Chưa nhập lịch"}</div>
                              </div>
                            </div>
                            <span class="schedule-task-meta">${items.filter((item) => item.done).length}/${items.length}</span>
                          </div>
                          <div class="schedule-task-divider">
                            <span class="schedule-task-line"></span>
                          </div>
                          <div class="schedule-task-items">
                            ${items.length ? items.map((item) => `
                              <div class="schedule-task-item ${item.done ? "done" : ""}">
                                <span class="schedule-task-dot"></span>
                                <span class="schedule-task-text">${escapeHtml(item.text)}</span>
                                <span class="schedule-task-state">${item.done ? "Xong" : "Chưa"}</span>
                              </div>
                            `).join("") : `<div class="muted">Chưa nhập</div>`}
                          </div>
                        </div>
                      `;
                      };

                      return `
                        <tr class="${state.selectedDate === day.date ? "active-row" : ""}">
                          <td class="schedule-date-cell">
                            <div class="schedule-date-main">${escapeHtml(day.date)}</div>
                            <div class="schedule-phase">${escapeHtml(day.weekday || day.phase)}</div>
                            <div class="schedule-day-badges">
                              <span class="badge ${paceClassMap[taskState.pace]}">${escapeHtml(taskState.pace)}</span>
                            </div>
                          </td>
                          <td>
                            <div class="schedule-subject-stack">
                              ${renderTaskPanel("Vật lí", taskState.physics, "physics", "L")}
                              ${renderTaskPanel("Toán", taskState.math, "math", "T")}
                              ${renderTaskPanel("Tiếng Anh", taskState.english, "english", "A")}
                              ${renderTaskPanel("Ôn lỗi", taskState.review, "review", "R")}
                            </div>
                          </td>
                          <td class="schedule-progress-cell">
                            <div class="schedule-progress-stack">
                              <div class="schedule-progress-meta">
                                <span class="schedule-progress-percent">${mainPercent}%</span>
                                <span>${mainDone}/${mainTasks.length} nhiệm vụ</span>
                              </div>
                              <div class="schedule-progress-bar"><span style="height:${mainPercent}%"></span></div>
                            </div>
                          </td>
                          <td class="schedule-note-cell">
                            <div class="schedule-note-card">
                              <div class="schedule-note-label">Ghi chú trong ngày</div>
                              <div class="schedule-note-snippet">${escapeHtml(getDisplayNote(day))}</div>
                            </div>
                          </td>
                          <td class="schedule-action-cell">
                            <div class="schedule-row-actions">
                              <button
                                type="button"
                                class="schedule-open-btn schedule-dot-btn"
                                aria-label="Tùy chọn ngày ${day.date}"
                                title="Tùy chọn"
                                data-action="toggle-row-menu"
                                data-date="${day.date}"
                              >⋯</button>
                              <div class="schedule-row-menu">
                                <button type="button" class="schedule-open-btn task-menu-btn" data-action="select-date" data-date="${day.date}">Mở ngày</button>
                                <button type="button" class="schedule-open-btn task-menu-btn task-edit-btn" data-action="open-day-editor" data-date="${day.date}">Sửa nhanh</button>
                              </div>
                            </div>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            </section>
        </section>
      `;

      applyDailyPlanetPalette(selectedDay.date);
      syncSubjectSelectUi(editingTask && editingTask.date === state.selectedDate ? editingTask.group : "physics");
      syncDynamicUi(selectedDay, currentDone, currentDayTasks, learnedMinutes, done, total);
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
      });
      initExamCountdowns();
    }

    function syncHeroOrbitHeight() {
      const leftCard = document.querySelector(".hero-day-card");
      const rightCard = document.querySelector(".hero-orbit");
      const columns = document.querySelector(".orbit-progress-columns");
      const tracks = document.querySelectorAll(".orbit-progress-track");

      if (!leftCard || !rightCard || !columns) return;

      const leftHeight = Math.ceil(leftCard.getBoundingClientRect().height);
      const orbitStyle = window.getComputedStyle(rightCard);
      const padTop = parseFloat(orbitStyle.paddingTop) || 0;
      const padBottom = parseFloat(orbitStyle.paddingBottom) || 0;
      const availableHeight = Math.max(226, leftHeight - padTop - padBottom);
      const trackHeight = Math.max(150, availableHeight - 78);

      rightCard.style.height = `${leftHeight}px`;
      rightCard.style.minHeight = `${leftHeight}px`;
      columns.style.height = `${availableHeight}px`;
      tracks.forEach((track) => {
        track.style.height = `${trackHeight}px`;
      });
    }


    function ensureTaskFloatingMenu() {
      let menu = document.getElementById("taskFloatingMenu");
      if (!menu) {
        menu = document.createElement("div");
        menu.id = "taskFloatingMenu";
        menu.className = "task-floating-menu";
        menu.setAttribute("aria-hidden", "true");
        app.appendChild(menu);
      }
      return menu;
    }

    function ensureScheduleFloatingMenu() {
      let menu = document.getElementById("scheduleFloatingMenu");
      if (!menu) {
        menu = document.createElement("div");
        menu.id = "scheduleFloatingMenu";
        menu.className = "schedule-floating-menu";
        menu.setAttribute("aria-hidden", "true");
        app.appendChild(menu);
      }
      return menu;
    }

    function getSubjectLabel(value) {
      const subjectLabels = {
        physics: "Vật lí",
        math: "Toán",
        english: "Tiếng Anh",
        review: "Ôn lỗi / Recall"
      };
      return subjectLabels[value] || subjectLabels.physics;
    }

    function syncSubjectSelectUi(value) {
      const wrap = document.querySelector("[data-subject-select]");
      if (!wrap) return;
      const input = wrap.querySelector("#addGroup");
      const label = wrap.querySelector("[data-subject-label]");
      if (input) input.value = value;
      if (label) label.textContent = getSubjectLabel(value);
      wrap.querySelectorAll(".subject-select-option").forEach((option) => {
        option.classList.toggle("active", option.dataset.value === value);
      });
    }

    function closeSubjectMenu() {
      document.querySelectorAll("[data-subject-select].open").forEach((wrap) => {
        wrap.classList.remove("open");
        const trigger = wrap.querySelector(".subject-select-trigger");
        if (trigger) trigger.setAttribute("aria-expanded", "false");
      });
    }

    function resetTaskMenuTriggers() {
      document.querySelectorAll(".task-action-trigger[aria-expanded='true']").forEach((trigger) => {
        trigger.setAttribute("aria-expanded", "false");
      });
    }

    function resetScheduleMenuTriggers() {
      document.querySelectorAll(".schedule-dot-btn[aria-expanded='true']").forEach((trigger) => {
        trigger.setAttribute("aria-expanded", "false");
      });
    }

    function closeFloatingMenus() {
      closeSubjectMenu();
      document
        .querySelectorAll(".task-actions.open, .schedule-row-actions.open")
        .forEach((item) => item.classList.remove("open"));
      resetTaskMenuTriggers();
      resetScheduleMenuTriggers();
      const taskMenu = document.getElementById("taskFloatingMenu");
      if (taskMenu) {
        taskMenu.classList.remove("open");
        taskMenu.setAttribute("aria-hidden", "true");
        taskMenu.innerHTML = "";
      }
      const scheduleMenu = document.getElementById("scheduleFloatingMenu");
      if (scheduleMenu) {
        scheduleMenu.classList.remove("open");
        scheduleMenu.setAttribute("aria-hidden", "true");
        scheduleMenu.innerHTML = "";
      }
    }

    function positionMenuByTrigger(trigger, menu) {
      if (!trigger || !menu) return;
      const triggerRect = trigger.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      const gap = 8;
      const viewportPadding = 12;
      const menuWidth = Math.max(menuRect.width || 176, 150);
      const menuHeight = Math.max(menuRect.height || 112, 86);

      let left = triggerRect.right - menuWidth;
      left = Math.max(viewportPadding, Math.min(left, window.innerWidth - menuWidth - viewportPadding));

      let top = triggerRect.bottom + gap;
      if (top + menuHeight > window.innerHeight - viewportPadding) {
        top = Math.max(viewportPadding, triggerRect.top - menuHeight - gap);
      }

      menu.style.setProperty("--floating-menu-left", `${left}px`);
      menu.style.setProperty("--floating-menu-top", `${top}px`);
    }

    function positionFloatingMenu(wrap, triggerSelector, menuSelector) {
      const trigger = wrap && wrap.querySelector(triggerSelector);
      const menu = wrap && wrap.querySelector(menuSelector);
      positionMenuByTrigger(trigger, menu);
    }

    function syncOpenFloatingMenus() {
      const openTaskTrigger = document.querySelector(".task-action-trigger[aria-expanded='true']");
      const taskMenu = document.getElementById("taskFloatingMenu");
      if (openTaskTrigger && taskMenu && taskMenu.classList.contains("open")) {
        positionMenuByTrigger(openTaskTrigger, taskMenu);
      }

      const openScheduleTrigger = document.querySelector(".schedule-dot-btn[aria-expanded='true']");
      const scheduleMenu = document.getElementById("scheduleFloatingMenu");
      if (openScheduleTrigger && scheduleMenu && scheduleMenu.classList.contains("open")) {
        positionMenuByTrigger(openScheduleTrigger, scheduleMenu);
      }
    }

    function openTaskFloatingMenu(trigger) {
      const group = trigger.dataset.group;
      const index = Number(trigger.dataset.index);
      const taskState = ensureTaskState(state.selectedDate);
      const item = taskState[group] && taskState[group][index];
      if (!item) return;

      const menu = ensureTaskFloatingMenu();
      const taskThemes = ["theme-aurora-ice", "theme-aurora-mint", "theme-aurora-violet"];
      const nextTheme = taskThemes[Math.floor(Math.random() * taskThemes.length)];
      const safeGroup = escapeHtml(group);
      const safeIndex = escapeHtml(index);
      menu.classList.remove("theme-aurora-ice", "theme-aurora-mint", "theme-aurora-violet");
      menu.classList.add(nextTheme);
      menu.innerHTML = `
        <button
          type="button"
          class="schedule-open-btn task-menu-btn"
          data-action="toggle"
          data-group="${safeGroup}"
          data-index="${safeIndex}"
        >${item.done ? "Đánh dấu đang làm" : "Đánh dấu xong"}</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn task-edit-btn"
          data-action="edit-task"
          data-group="${safeGroup}"
          data-index="${safeIndex}"
        >Sửa</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn task-delete-btn"
          data-action="delete-task"
          data-group="${safeGroup}"
          data-index="${safeIndex}"
        >Xóa</button>
      `;
      menu.classList.add("open");
      menu.setAttribute("aria-hidden", "false");
      trigger.setAttribute("aria-expanded", "true");
      positionMenuByTrigger(trigger, menu);
    }

    function openScheduleFloatingMenu(trigger) {
      const date = String(trigger.dataset.date || "").trim();
      if (!date) return;

      const menu = ensureScheduleFloatingMenu();
      const safeDate = escapeHtml(date);
      const scheduleThemes = ["theme-aurora-ice", "theme-aurora-mint", "theme-aurora-violet"];
      const nextTheme = scheduleThemes[Math.floor(Math.random() * scheduleThemes.length)];
      menu.classList.remove("theme-aurora-ice", "theme-aurora-mint", "theme-aurora-violet");
      menu.classList.add(nextTheme);
      menu.innerHTML = `
        <button
          type="button"
          class="schedule-open-btn task-menu-btn"
          data-action="select-date"
          data-date="${safeDate}"
        >Mở ngày</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn task-edit-btn"
          data-action="open-day-editor"
          data-date="${safeDate}"
        >Sửa nhanh</button>
        <button
          type="button"
          class="schedule-open-btn task-menu-btn"
          data-action="export-day-backup"
          data-date="${safeDate}"
        >Xuất backup</button>
      `;
      menu.classList.add("open");
      menu.setAttribute("aria-hidden", "false");
      trigger.setAttribute("aria-expanded", "true");
      positionMenuByTrigger(trigger, menu);
    }

    function handleAppClick(event) {
      const target = event.target.closest("[data-tab], [data-action]");
      if (!target) {
        closeFloatingMenus();
        return;
      }

      if (target.dataset.tab) {
        state.tab = target.dataset.tab;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle-subject-menu") {
        const wrap = target.closest("[data-subject-select]");
        if (!wrap) return;
        const isOpen = wrap.classList.contains("open");
        closeFloatingMenus();
        if (!isOpen) {
          wrap.classList.add("open");
          target.setAttribute("aria-expanded", "true");
        }
        return;
      }

      if (target.dataset.action === "select-subject-option") {
        const value = String(target.dataset.value || "physics");
        syncSubjectSelectUi(value);
        if (!editingTask) syncTaskOrderInput(value);
        closeSubjectMenu();
        if (editingTask) {
          const addBtn = document.querySelector('[data-action="add-task"]');
          if (addBtn) addBtn.textContent = "Cập nhật";
        }
        return;
      }

      if (target.dataset.action === "toggle-row-menu") {
        const wrap = target.closest(".schedule-row-actions");
        if (!wrap) return;
        const isOpen = wrap.classList.contains("open");
        closeFloatingMenus();
        if (!isOpen) {
          wrap.classList.add("open");
          openScheduleFloatingMenu(target);
        }
        return;
      }

      if (target.dataset.action === "open-day-editor") {
        closeFloatingMenus();
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        window.setTimeout(() => {
          const editor = document.querySelector(".mission-footer");
          if (editor) editor.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 80);
        return;
      }

      if (target.dataset.action === "export-day-backup") {
        closeFloatingMenus();
        exportDayBackup(target.dataset.date);
        return;
      }

      if (target.dataset.action === "select-date") {
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle") {
        closeFloatingMenus();
        toggleTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "delete-task") {
        closeFloatingMenus();
        deleteTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "toggle-task-menu") {
        const menu = document.getElementById("taskFloatingMenu");
        const sameTaskOpen = menu
          && menu.classList.contains("open")
          && menu.dataset.group === target.dataset.group
          && menu.dataset.index === target.dataset.index;
        closeFloatingMenus();
        if (!sameTaskOpen) {
          const floatingMenu = ensureTaskFloatingMenu();
          floatingMenu.dataset.group = target.dataset.group;
          floatingMenu.dataset.index = target.dataset.index;
          openTaskFloatingMenu(target);
        }
        return;
      }

      if (target.dataset.action === "edit-task") {
        closeFloatingMenus();
        editTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "add-task") {
        addTaskFromForm();
        return;
      }

      if (target.dataset.action === "clear-day") {
        clearSelectedDay();
        return;
      }

      if (target.dataset.action === "download-template") {
        downloadImportTemplate();
        return;
      }

      if (target.dataset.action === "set-pace") {
        const paceMenu = target.closest(".pace-menu");
        if (paceMenu) paceMenu.open = false;
        setPace(target.dataset.pace);
      }
    }

    function handleAppInput(event) {
      if (event.target.id === "searchInput") {
        state.query = event.target.value;
        saveState();
        if (searchInputTimer) clearTimeout(searchInputTimer);
        searchInputTimer = window.setTimeout(() => {
          searchInputTimer = 0;
          scheduleRender();
        }, 120);
        return;
      }

      if (event.target.id === "noteInput") {
        const day = getSelectedDay();
        day.note = event.target.value;
        saveState();
        return;
      }

      if (event.target.id === "addTime" || event.target.id === "addText" || event.target.id === "addTaskNote" || event.target.id === "addGroup" || event.target.id === "addOrder") {
        if (editingTask) {
          const addBtn = document.querySelector('[data-action="add-task"]');
          if (addBtn) addBtn.textContent = "Cập nhật";
        }
      }
    }

    function handleAppChange(event) {
      if (event.target.id === "importFile") {
        handleImportFile(event.target.files && event.target.files[0]);
        return;
      }

      if (event.target.id !== "phaseSelect") return;
      state.phaseFilter = event.target.value;
      saveState();
      scheduleRender();
    }

    function randomizeFlagBurstPose() {
      const flagBurst = document.querySelector(".flag-burst");
      if (!flagBurst) return;

      const top = 42 + Math.round(Math.random() * 68);
      const right = 20 + Math.round(Math.random() * 54);
      const shiftX = -8 - Math.round(Math.random() * 22);
      const shiftY = 8 + Math.round(Math.random() * 14);
      const tilt = -12 + Math.round(Math.random() * 16);

      flagBurst.style.setProperty("--flag-top", `${top}px`);
      flagBurst.style.setProperty("--flag-right", `${right}px`);
      flagBurst.style.setProperty("--flag-shift-x", `${shiftX}px`);
      flagBurst.style.setProperty("--flag-shift-y", `${shiftY}px`);
      flagBurst.style.setProperty("--flag-tilt", `${tilt}deg`);
    }

    function triggerFlagBurst() {
      randomizeFlagBurstPose();
      document.body.classList.remove("flag-burst-active");
      void document.body.offsetWidth;
      document.body.classList.add("flag-burst-active");

      if (flagBurstTimer) clearTimeout(flagBurstTimer);
      flagBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("flag-burst-active");
        flagBurstTimer = 0;
      }, 4200);
    }

    function startFlagBurstLoop() {
      if (flagBurstLoop) clearInterval(flagBurstLoop);
      flagBurstLoop = window.setInterval(() => {
        triggerFlagBurst();
      }, 10000);
    }

    app.addEventListener("click", handleAppClick);
    app.addEventListener("input", handleAppInput);
    app.addEventListener("change", handleAppChange);
    window.addEventListener("resize", () => {
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
        syncOpenFloatingMenus();
      });
    });
    window.addEventListener("scroll", syncOpenFloatingMenus, { passive: true });
    window.addEventListener("pagehide", () => {
      if (examCountdownTimer) {
        clearInterval(examCountdownTimer);
        examCountdownTimer = 0;
      }
      flushState();
    });
    render();
    window.setTimeout(triggerFlagBurst, 1800);
    startFlagBurstLoop();

  </script>
</body>
</html>
