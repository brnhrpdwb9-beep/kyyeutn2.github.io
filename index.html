<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050918" />
  <title>Lịch học 20/04 - 06/05</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #02040c;
      --bg-2: #061126;
      --bg-3: #0b1a39;
      --bg-4: #160f33;
      --panel: rgba(8, 13, 28, 0.7);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --border: rgba(161, 176, 255, 0.14);
      --text: #eef4ff;
      --muted: #9fb0d3;
      --blue: #4f8cff;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --rose: #fb7185;
      --green: #34d399;
      --amber: #fbbf24;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(91, 126, 255, 0.2), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(34, 211, 238, 0.14), transparent 16%),
        radial-gradient(circle at 50% 84%, rgba(168, 85, 247, 0.12), transparent 20%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 38%, var(--bg-3) 72%, var(--bg-4));
      overflow-x: hidden;
    }

    body { position: relative; }
    button, input, textarea, select { font: inherit; }

    .universe {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .nebula,
    .nebula::before,
    .nebula::after {
      content: "";
      position: absolute;
      inset: -16%;
      filter: blur(62px);
    }

    .nebula {
      background:
        radial-gradient(circle at 14% 28%, rgba(88, 113, 255, 0.22), transparent 14%),
        radial-gradient(circle at 78% 24%, rgba(58, 235, 255, 0.16), transparent 14%),
        radial-gradient(circle at 46% 74%, rgba(196, 103, 255, 0.14), transparent 16%);
      animation: driftNebula 24s ease-in-out infinite alternate;
    }

    .nebula::before {
      background:
        radial-gradient(circle at 30% 62%, rgba(122, 160, 255, 0.16), transparent 14%),
        radial-gradient(circle at 70% 58%, rgba(83, 244, 255, 0.1), transparent 14%);
      animation: driftNebula 32s ease-in-out infinite alternate-reverse;
    }

    .nebula::after {
      background:
        radial-gradient(circle at 52% 34%, rgba(255, 255, 255, 0.06), transparent 9%),
        radial-gradient(circle at 34% 82%, rgba(191, 121, 255, 0.1), transparent 14%);
      animation: driftNebula 36s ease-in-out infinite alternate;
    }

    .space-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(130, 170, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130, 170, 255, 0.045) 1px, transparent 1px);
      background-size: 100px 100px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 84%);
      opacity: 0.22;
      transform: perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }

    .stars,
    .stars2,
    .stars3 {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size: 800px 300px;
      opacity: .9;
      animation: driftStars 100s linear infinite;
    }

    .stars2 {
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size: 900px 380px;
      animation: driftStarsReverse 145s linear infinite;
      opacity: .55;
    }

    .stars3 {
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size: 1000px 420px;
      animation: twinkle 7s ease-in-out infinite alternate;
      opacity: .7;
      filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      filter: drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity: 0;
      pointer-events: none;
      transform: rotate(-25deg);
      animation: shooting 9s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .shooting-star.one { top: 12%; left: 72%; animation-delay: 0s; }
    .shooting-star.two { top: 26%; left: 18%; width: 140px; animation-delay: 3s; }
    .shooting-star.three { top: 8%; left: 45%; width: 210px; animation-delay: 6s; }

    .flag-burst {
      --flag-top: 88px;
      --flag-right: max(5%, 22px);
      --flag-shift-x: -18px;
      --flag-shift-y: 14px;
      --flag-tilt: -5deg;
      position: absolute;
      right: var(--flag-right);
      top: var(--flag-top);
      width: min(300px, 34vw);
      aspect-ratio: 5 / 3;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(var(--flag-shift-x), var(--flag-shift-y), 0) rotate(var(--flag-tilt)) scale(.96);
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
      filter: drop-shadow(0 0 16px rgba(255,214,136,.12));
    }

    .flag-burst::before {
      content: "";
      position: absolute;
      inset: -10% -8%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,205,112,.16), transparent 34%),
        radial-gradient(circle at 50% 52%, rgba(255,244,218,.08), transparent 58%);
      filter: blur(22px);
      opacity: 0;
      transform: scale(.88);
      transition: opacity .9s ease, transform 1s ease;
    }

    .flag-burst::after {
      content: "";
      position: absolute;
      inset: 8% 12%;
      background: radial-gradient(circle at 50% 50%, rgba(255,232,170,.16), transparent 62%);
      filter: blur(24px);
      opacity: 0;
    }

    body.flag-burst-active .flag-burst {
      opacity: 1;
      transform: translate3d(0, 0, 0) rotate(var(--flag-tilt)) scale(1);
      filter: drop-shadow(0 0 22px rgba(255,224,158,.22));
    }

    body.flag-burst-active .flag-burst::before {
      opacity: .72;
      transform: scale(1);
      animation: flagAuraPulse 2.8s ease-in-out infinite alternate;
    }

    body.flag-burst-active .flag-burst::after {
      opacity: .5;
      animation: flagAuraDrift 3.2s ease-in-out infinite alternate;
    }

    .flag-burst svg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flag-dot {
      fill: #ffe4a0;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      filter: drop-shadow(0 0 5px rgba(255,224,154,.28));
    }

    .flag-dot.major {
      fill: #fff5d6;
      filter: drop-shadow(0 0 10px rgba(255,238,196,.48));
    }

    .flag-dot.soft {
      fill: #ffd27f;
      filter: drop-shadow(0 0 4px rgba(255,202,108,.22));
    }

    body.flag-burst-active .flag-dot {
      animation:
        flagDotAppear .9s ease forwards,
        flagDotTwinkle 2.25s ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s), calc(var(--delay, 0s) + .92s);
    }

    body.flag-burst-active .flag-dot.soft {
      animation-duration: 1s, 1.9s;
    }

    body.flag-burst-active .flag-dot.major {
      animation-duration: .82s, 2.5s;
    }

    .floating-planet {
      position: absolute;
      border-radius: 50%;
      box-shadow:
        inset -20px -24px 36px rgba(0,0,0,0.38),
        inset 8px 8px 16px rgba(255,255,255,0.12),
        0 24px 40px rgba(0,0,0,0.28);
      opacity: 0.82;
      animation: planetFloat 9s ease-in-out infinite;
    }

    .floating-planet::before,
    .floating-planet::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .floating-planet::before {
      inset: -18%;
      background: radial-gradient(circle, rgba(94, 156, 255, 0.18), transparent 66%);
      filter: blur(12px);
    }

    .floating-planet::after {
      inset: 8%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.28), transparent 18%),
        radial-gradient(circle at 62% 54%, rgba(0,0,0,0.18), transparent 20%);
      opacity: 0.88;
    }

    .floating-planet.p1 {
      width: 78px;
      height: 78px;
      left: 6%;
      top: 22%;
      background: linear-gradient(155deg, #b7d2ff, #5279ff 46%, #15214c 100%);
    }

    .floating-planet.p3 .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150%;
      height: 34%;
      transform: translate(-50%, -50%) rotate(-12deg);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.45);
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .floating-planet.p3 {
      width: 56px;
      height: 56px;
      left: 18%;
      bottom: 14%;
      background: linear-gradient(155deg, #a7f3d0, #059669 46%, #062a28 100%);
      animation-duration: 8s;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 32px;
    }

    .hero-shell {
      position: relative;
      overflow: visible;
      padding: 32px;
      border-radius: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 420px);
      gap: 28px;
      align-items: stretch;
      position: relative;
      z-index: 2;
      overflow: visible;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: stretch;
      height: 100%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.22);
      color: #ddd6fe;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #d8b4fe);
      box-shadow: 0 0 12px rgba(103, 232, 255, 0.75);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy p {
      color: var(--muted);
      max-width: 720px;
      line-height: 1.8;
      font-size: 15px;
    }

    .hero-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-tag {
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e4ff;
      font-size: 13px;
    }

    .hero-day-card {
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: visible;
      display: grid;
      gap: 18px;
      height: 100%;
    }

    .hero-day-card::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .hero-day-card::before {
      content: "";
      position: absolute;
      right: 166px;
      top: 8px;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(116,160,255,.2), transparent 56%),
        radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
      filter: blur(18px);
      opacity: 0.92;
    }

    .hero-day-main,
    .hero-day-focus {
      position: relative;
      z-index: 1;
    }

    .hero-day-focus {
      z-index: 4;
    }

    .hero-day-main {
      display: grid;
      gap: 10px;
      padding-right: 216px;
    }

    .hero-progress-inline {
      width: min(220px, calc(100% - 40px));
      margin-top: 4px;
    }

    .hero-day-focus {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-focus-card {
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 120px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-focus-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .hero-focus-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1;
      color: #f8fbff;
    }

    .hero-focus-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero-planet {
      position: absolute;
      top: 16px;
      right: 92px;
      width: 118px;
      height: 118px;
      pointer-events: none;
      z-index: 1;
      transform-style: preserve-3d;
      animation: heroPlanetFloat 8s ease-in-out infinite;
    }

    .hero-planet-ball {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transform-style: preserve-3d;
      box-shadow:
        inset -30px -34px 46px rgba(0,0,0,.48),
        inset 12px 12px 24px rgba(255,255,255,.10),
        inset -6px -8px 14px rgba(0,0,0,.2),
        0 26px 46px rgba(0,0,0,.38);
      overflow: visible;
      isolation: isolate;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.18) 12%, transparent 18%),
        radial-gradient(circle at 52% 58%, rgba(225,230,238,.12), transparent 26%),
        linear-gradient(155deg,#f8fafc 0%, #c7cdd6 38%, #676f7d 68%, #171c25 100%);
    }

    .hero-planet-ball::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter: blur(7px);
      z-index: 6;
      pointer-events: none;
    }

    .hero-planet-ball::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 22px rgba(119,166,255,.10), inset 0 0 18px rgba(255,255,255,.04);
      pointer-events: none;
      z-index: 2;
    }

    .hero-planet-aura {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(126,174,255,.18), transparent 60%),
        radial-gradient(circle, rgba(196,122,255,.08), transparent 76%);
      filter: blur(16px);
      opacity: .9;
      z-index: -2;
      animation: auraPulse 4.5s ease-in-out infinite;
    }

    .hero-planet-atmosphere {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity: .88;
      z-index: 5;
      animation: atmosphereRotate 32s linear infinite;
      background:
        radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, rgba(229,234,240,.16) 124deg, rgba(255,255,255,0) 190deg, rgba(182,189,200,.12) 260deg, rgba(255,255,255,0) 360deg);
    }

    .hero-planet-surface {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
      mix-blend-mode: soft-light;
      opacity: .82;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.20), transparent 16%),
        radial-gradient(circle at 54% 56%, rgba(18,22,30,.22), transparent 22%),
        radial-gradient(circle at 68% 30%, rgba(232,236,243,.12), transparent 12%);
    }

    .hero-planet-surface::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter: blur(5px);
      animation: surfaceDrift 24s linear infinite;
    }

    .hero-planet-surface::after {
      content: "";
      position: absolute;
      inset: -14%;
      background: repeating-linear-gradient(155deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 24px);
      opacity: .34;
      filter: blur(3px);
      transform: rotate(-10deg);
    }

    .hero-planet-night {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 4;
      background: linear-gradient(120deg, transparent 35%, rgba(0,0,0,.68) 85%);
    }

    .hero-planet-band {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 42%;
      height: 16%;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .72;
      z-index: 6;
      transform: rotate(-15deg);
      background: linear-gradient(90deg, transparent, rgba(232,236,242,.28), transparent);
      animation: bandShift 9s ease-in-out infinite;
    }

    .hero-planet-crater {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.16), rgba(0,0,0,.14) 70%, transparent 72%);
      opacity: .42;
      mix-blend-mode: screen;
      z-index: 6;
    }

    .hero-planet-crater.c1 { width: 18%; height: 18%; left: 24%; top: 46%; }
    .hero-planet-crater.c2 { width: 12%; height: 12%; left: 58%; top: 28%; opacity: .28; }
    .hero-planet-crater.c3 { width: 10%; height: 10%; left: 48%; top: 62%; opacity: .22; }

    .hero-planet-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 1;
    }

    .hero-planet-orbit::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(220,226,236,.22);
      box-shadow: 0 0 10px rgba(220,226,236,.14);
    }

    .hero-planet-orbit::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      border: 1px dashed rgba(186,194,206,.22);
      filter: blur(.5px);
    }

    .hero-planet-orbit.po1 {
      width: 190%;
      height: 190%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg);
      animation: pOrbit1 12s linear infinite;
    }

    .hero-planet-orbit.po2 {
      width: 250%;
      height: 250%;
      transform: translate(-50%, -50%) rotateX(68deg) rotateY(5deg);
      animation: pOrbit2 24s linear infinite reverse;
    }

    .hero-planet-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 210%;
      height: 210%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateY(15deg);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.10);
      border-left-color: rgba(230,235,242,.34);
      z-index: 1;
    }

    .hero-planet-moon {
      position: absolute;
      border-radius: 50%;
      z-index: 7;
      pointer-events: none;
      background: radial-gradient(circle at 30% 28%, rgba(255,255,255,.95), transparent 22%), linear-gradient(145deg, #f6f8fb, #b8bfca 62%, #353c48);
      box-shadow: inset -4px -5px 8px rgba(0,0,0,.35), 0 0 16px rgba(224,229,238,.20);
    }

    .hero-planet-moon.one {
      width: 12px;

      border: 0;

      gap: 6px;

      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(199, 210, 254, 0.82);

    .orbit-progress-title {

      font-size: 22px;
      letter-spacing: -0.04em;
      color: #f8fbff;
    }

    .orbit-progress-columns {

      grid-template-columns: repeat(4, minmax(0, 1fr));

      align-items: stretch;
      min-height: 240px;
      height: 100%;

    .orbit-progress-item {
      display: grid;
      grid-template-rows: auto 1fr auto;
      justify-items: center;
      gap: 12px;
      height: 100%;
      align-self: stretch;

    .orbit-progress-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      color: #f8fbff;
      text-shadow: 0 4px 18px rgba(0,0,0,0.36);
    }

    .orbit-progress-track {
      position: relative;
      width: 38px;
      height: 100%;
      min-height: 220px;
      padding: 0;
      border-radius: 999px;
      background: rgba(8, 14, 28, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 10px 26px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .orbit-progress-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 42%, #f97316 100%);
      box-shadow: 0 0 24px rgba(245, 158, 11, 0.34);
    }

    .orbit-progress-fill.physics {
      background: linear-gradient(180deg, #a5f3fc 0%, #38bdf8 48%, #2563eb 100%);
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.3);
    }

    .orbit-progress-fill.english {
      background: linear-gradient(180deg, #f9a8d4 0%, #fb7185 48%, #f97316 100%);
    }

    .orbit-progress-fill.tasks {
      background: linear-gradient(180deg, #86efac 0%, #34d399 48%, #0ea5e9 100%);
    }

    .orbit-progress-name {
      font-size: 11px;
      line-height: 1.4;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      color: #d8e4ff;
      text-shadow: 0 4px 18px rgba(0,0,0,0.32);
    }

    .dashboard {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .glass {
      position: relative;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(8, 13, 28, 0.8), rgba(8, 13, 28, 0.54)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      padding: 18px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .section-desc {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .field,
    .select,
    .search {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(5,10,22,0.62);
      color: var(--text);
      padding: 13px 15px;
      outline: none;
    }

    .field:focus,
    .select:focus,
    .search:focus {
      border-color: rgba(96,165,250,0.42);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .field::placeholder,
    .search::placeholder {
      color: #64748b;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .segment-btn,
    .date-btn,
    .task-btn,
    .primary-btn {
      border: 0;
      cursor: pointer;
      transition: 0.24s ease;
    }

    .segment-btn {
      padding: 10px 12px;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      font-weight: 600;
    }

    .segment-btn.active {
      background: linear-gradient(135deg, rgba(139,92,246,0.26), rgba(59,130,246,0.22));
      color: white;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .radar {
      padding: 18px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(79,140,255,0.1), transparent 32%),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .radar-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pace-on { background: rgba(100,116,139,0.16); color: #e2e8f0; border-color: rgba(226,232,240,0.12); }
    .pace-fast { background: rgba(52,211,153,0.14); color: #a7f3d0; border-color: rgba(52,211,153,0.25); }
    .pace-slow { background: rgba(251,191,36,0.14); color: #fde68a; border-color: rgba(251,191,36,0.25); }
    .pace-stuck { background: rgba(251,113,133,0.14); color: #fecdd3; border-color: rgba(251,113,133,0.25); }

    .date-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 380px);
      overflow: auto;
      padding-right: 4px;
    }

    .date-list::-webkit-scrollbar { width: 8px; }
    .date-list::-webkit-scrollbar-thumb {
      background: rgba(148,163,184,0.22);
      border-radius: 999px;
    }

    .date-btn {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .date-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
    }

    .date-btn.active {
      background:
        linear-gradient(135deg, rgba(139,92,246,0.16), rgba(59,130,246,0.12)),
        rgba(255,255,255,0.04);
      border-color: rgba(139,92,246,0.45);
      box-shadow: 0 16px 40px rgba(32,17,72,0.3);
    }

    .date-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .date-date { font-size: 17px; font-weight: 700; }
    .date-phase { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .date-count { font-size: 12px; color: var(--muted); margin-top: 12px; }

    .progress {
      height: 10px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--violet), var(--blue) 58%, var(--cyan));
      transition: width .25s ease;
    }

    .main {
      display: grid;
      gap: 20px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 120px;
    }

    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c7d2fe;
    }

    .stat-card .value {
      margin-top: 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1;
    }

    .stat-card .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .mission-shell {
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .schedule-shell {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .schedule-divider {
      width: 100%;
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .schedule-divider::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 50%;
      width: min(180px, 30vw);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(79,140,255,0.75), transparent);
      box-shadow: 0 0 18px rgba(79,140,255,0.28);
    }

    .schedule-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .schedule-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .schedule-table-wrap {
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top right, rgba(79,140,255,0.12), transparent 28%),
        rgba(255,255,255,0.03);
      overflow: auto;
    }

    .schedule-table {
      width: 100%;
      min-width: 1080px;
      border-collapse: separate;
      border-spacing: 0;
    }

    .schedule-table th,
    .schedule-table td {
      padding: 14px 16px;
      vertical-align: top;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .schedule-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(8, 13, 28, 0.96);
      color: #c7d2fe;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .schedule-table tr:last-child td {
      border-bottom: 0;
    }

    .schedule-table tbody tr {
      transition: 0.22s ease;
    }

    .schedule-table tbody tr:hover td {
      background: rgba(255,255,255,0.035);
    }

    .schedule-table tr.active-row td {
      background: rgba(79,140,255,0.1);
    }

    .schedule-date-cell {
      position: sticky;
      left: 0;
      z-index: 1;
      min-width: 130px;
      background: rgba(8, 13, 28, 0.94);
    }

    .schedule-date-main {
      font-weight: 700;
      color: #eef4ff;
    }

    .schedule-phase {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .schedule-day-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .schedule-list {
      display: grid;
      gap: 6px;
      color: #dbe7ff;
      font-size: 13px;
      line-height: 1.55;
    }

    .schedule-list span {
      display: block;
    }

    .schedule-list.tight {
      gap: 5px;
      font-size: 12.5px;
    }

    .schedule-task-panel {
      min-width: 240px;
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .schedule-task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 220px;
      gap: 10px;
    }

    .schedule-task-title {
      color: #eef4ff;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .schedule-task-meta {
      color: #9fb0d3;
      font-size: 12px;
      white-space: nowrap;
    }

    .schedule-task-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .schedule-task-line {
      flex: 1 1 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06));
    }

    .schedule-task-items {
      display: grid;
      gap: 8px;
    }

    .schedule-task-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .schedule-task-item.done {
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.16);
    }

    .schedule-task-text {
      color: #edf3ff;
      font-size: 13px;
      line-height: 1.5;
    }

    .schedule-task-item.done .schedule-task-text {
      color: #9fb0d3;
      text-decoration: line-through;
    }

    .schedule-task-state {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #c7d2fe;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .schedule-task-item.done .schedule-task-state {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.2);
      color: #a7f3d0;
    }

    .schedule-progress-cell {
      min-width: 120px;
    }

    .schedule-progress-stack {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .schedule-progress-meta {
      display: grid;
      gap: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .schedule-progress-bar {
      position: relative;
      width: 18px;
      height: 132px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .schedule-progress-bar > span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      height: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, var(--violet), var(--blue) 58%, var(--cyan));
      transition: height .25s ease;

    .schedule-note-cell {
      min-width: 240px;
      color: #dbe7ff;
      font-size: 13px;
      line-height: 1.6;
    }

    .schedule-note-snippet {

      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .schedule-open-btn {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #eef4ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .schedule-open-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(96,165,250,0.32);
      background: rgba(79,140,255,0.14);
    }

    .mission-top {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) 280px;
      gap: 20px;
      align-items: stretch;
    }

    .mission-overview {
      padding: 24px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(79,140,255,0.14), rgba(139,92,246,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      align-content: stretch;
    }

    .mission-overview::after {
      content: "";
      position: absolute;
      right: -50px;
      bottom: -54px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,224,255,0.16), transparent 62%);
      filter: blur(8px);
    }

    .mission-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c7d2fe;
    }

    .mission-title {
      margin-top: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(30px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .mission-copy {
      margin-top: 10px;
      color: #d5e1fb;
      line-height: 1.8;
      max-width: 720px;
    }

    .overview-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      height: 100%;
    }

    .overview-card {
      display: grid;
      gap: 8px;
      align-content: start;
      padding: 18px;
      border-radius: 20px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 132px;
    }

    .overview-card-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .overview-card-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
      color: #f8fbff;
    }

    .overview-card-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .mission-focus {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .focus-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .focus-chip span:first-child {
      color: #e6efff;
      font-size: 14px;
      font-weight: 600;
    }

    .focus-chip span:last-child {
      color: var(--muted);
      font-size: 13px;
    }

      position: relative;
      align-items: center;
    }

      margin-left: auto;
      z-index: 8;

    .pace-menu summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: #eef4ff;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .pace-menu summary::-webkit-details-marker {
      display: none;
    }

    .pace-menu summary:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
    }

    .pace-menu summary::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0.8;

    .pace-menu[open] summary::after {
      transform: rotate(-135deg) translateY(-1px);

      white-space: nowrap;

    .pace-options {

      top: calc(100% + 8px);
      right: 0;
      min-width: 220px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8, 13, 28, 0.96);
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      z-index: 5;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d8e4ff;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .pace-option.active {
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .mission-side {
      padding: 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .mission-side .big {
      font-family: "Space Grotesk", sans-serif;
      font-size: 42px;
      line-height: 1;
    }

    .muted {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .sections {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .section {
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      padding: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 44px rgba(0,0,0,0.12);
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .section h3 {
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #dbe7ff;
    }

    .section-count {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c7d2fe;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-btn {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      padding: 14px;
      border-radius: 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.06);
      color: white;
    }

    .task-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.05);
      border-color: rgba(139,92,246,0.24);
    }

    .task-btn.done { color: #64748b; }
    .task-btn.done .task-text { text-decoration: line-through; }

    .check {
      margin-top: 1px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #a78bfa;
      flex: 0 0 auto;
      position: relative;
    }

    .task-btn.done .check::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
    }

    .task-text {
      line-height: 1.65;
      font-size: 14px;
    }

    .mission-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 18px 20px;
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mission-footer .hint {
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .action-links {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 14px 32px rgba(37,99,235,0.26);
    }

    .primary-btn:hover { filter: brightness(1.08); }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #e8f0ff;
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.68;
    }

      .hero,
      .dashboard,
      .mission-top,
      .sections,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .date-list {
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 820px) {

      .hero-shell,
      .schedule-shell,

      .floating-planet.p3 { width: 40px; height: 40px; left: 8%; bottom: 12%; }

      }
      .schedule-table {
        min-width: 920px;
      }
    }

    let flagBurstTimer = 0;

    function clone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function expandTaskEntry(text) {
      const normalized = String(text).trim();
      const colonMatch = normalized.match(/^([^:]+:\s*)(.+)$/);
      if (colonMatch) {
        const [, prefix, rest] = colonMatch;
        if (rest.includes(",")) {
          return rest.split(",").map((part) => `${prefix}${part.trim()}`).filter(Boolean);
        }
      }

      const seriesMatch = normalized.match(/^(Đề|Topic)\s+(.+)$/i);
      if (seriesMatch && seriesMatch[2].includes(",")) {
        const label = seriesMatch[1];
        return seriesMatch[2].split(",").map((part) => `${label} ${part.trim()}`).filter(Boolean);
      }

      return [normalized];
    }

    function createTaskItems(list) {
      return list.flatMap((text) => expandTaskEntry(text)).map((text) => ({ text, done: false }));
    }

    function mergeTaskItems(savedItems, freshItems) {
      if (!Array.isArray(savedItems)) return freshItems;

      const savedByText = new Map(savedItems.map((item) => [item.text, !!item.done]));
      const groupedDonePrefixes = savedItems
        .filter((item) => item && item.done && typeof item.text === "string")
        .map((item) => item.text);

      return freshItems.map((item) => {
        if (savedByText.has(item.text)) {
          return { ...item, done: savedByText.get(item.text) };
        }

        const inheritedDone = groupedDonePrefixes.some((text) => {
          if (text === item.text) return true;
          if (text.includes(":")) {
            const [prefix, rest] = text.split(":");
            return item.text.startsWith(`${prefix}:`) && rest.includes(item.text.split(":").pop().trim());
          }
          const labelMatch = text.match(/^(Đề|Topic)\s+(.+)$/i);
          if (labelMatch) {
            return item.text.startsWith(`${labelMatch[1]} `) && labelMatch[2].includes(item.text.replace(`${labelMatch[1]} `, "").trim());
          }
          return false;
        });

        return { ...item, done: inheritedDone };
      });
    }

    function createTaskMap() {
      const map = {};
      initialSchedule.forEach((day) => {
        map[day.date] = {
          physics: createTaskItems(day.physics),
          english: createTaskItems(day.english),
          review: createTaskItems(day.review),
          dailyNote: "",
          pace: "Đúng nhịp",
          customAdd: ""
        };
      });
      return map;
    }

    const defaultState = {
      schedule: clone(initialSchedule),
      selectedDate: initialSchedule[0].date,
      query: "",
      phaseFilter: "Tất cả",
      tab: "all",
      tasks: createTaskMap()
    };

    function mergeTasks(savedTasks, freshTasks) {
      const merged = {};
      Object.keys(freshTasks).forEach((date) => {
        const savedDay = savedTasks && savedTasks[date] ? savedTasks[date] : {};
        merged[date] = {
          physics: mergeTaskItems(savedDay.physics, freshTasks[date].physics),
          english: mergeTaskItems(savedDay.english, freshTasks[date].english),
          review: mergeTaskItems(savedDay.review, freshTasks[date].review),
          dailyNote: typeof savedDay.dailyNote === "string" ? savedDay.dailyNote : "",
          pace: typeof savedDay.pace === "string" ? savedDay.pace : "Đúng nhịp",
          customAdd: typeof savedDay.customAdd === "string" ? savedDay.customAdd : ""
        };
      });
      return merged;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        const saved = JSON.parse(raw);
        return {
          schedule: Array.isArray(saved.schedule) ? saved.schedule : clone(initialSchedule),
          selectedDate: typeof saved.selectedDate === "string" ? saved.selectedDate : initialSchedule[0].date,
          query: typeof saved.query === "string" ? saved.query : "",
          phaseFilter: typeof saved.phaseFilter === "string" ? saved.phaseFilter : "Tất cả",
          tab: typeof saved.tab === "string" ? saved.tab : "all",
          tasks: mergeTasks(saved.tasks, createTaskMap())
        };
      } catch (err) {
        console.error("Không đọc được dữ liệu localStorage, dùng trạng thái mặc định:", err);
        return clone(defaultState);
      }
    }

    const state = loadState();

    function persistState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.error("Không lưu được dữ liệu vào localStorage:", err);
      }
    }

    function saveState() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        persistState();
        saveTimer = 0;
      }, 120);
    }

    function flushState() {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = 0;
      }
      persistState();
    }

    function scheduleRender() {
      if (renderRaf) return;
      renderRaf = window.requestAnimationFrame(() => {
        renderRaf = 0;
        render();
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getSelectedDay() {
      return state.schedule.find((day) => day.date === state.selectedDate) || state.schedule[0];
    }

    function allTasks() {
      return Object.values(state.tasks).flatMap((day) => [...day.physics, ...day.english]);
    }

    function getProgress() {
      const total = allTasks().length;
      const done = allTasks().filter((item) => item.done).length;
      return total ? Math.round((done * 100) / total) : 0;
    }

    function groupProgress(key) {
      const items = Object.values(state.tasks).flatMap((day) => day[key]);
      const done = items.filter((item) => item.done).length;
      return items.length ? Math.round((done * 100) / items.length) : 0;
    }

    function filteredDays() {
      return state.schedule.filter((day) => {
        const taskGroup = state.tasks[day.date];
        const tasks = [...taskGroup.physics, ...taskGroup.english, ...taskGroup.review];
        const haystack = [day.date, day.phase, day.note, ...day.physics, ...day.english, ...day.review].join(" ").toLowerCase();
        const queryMatch = !state.query || haystack.includes(state.query.toLowerCase());
        const phaseMatch = state.phaseFilter === "Tất cả" || day.phase === state.phaseFilter;
        let tabMatch = true;
        if (state.tab === "active") tabMatch = tasks.some((task) => !task.done);
        if (state.tab === "done") tabMatch = tasks.every((task) => task.done);
        return queryMatch && phaseMatch && tabMatch;
      });
    }

    function phases() {
      return ["Tất cả", ...new Set(state.schedule.map((day) => day.phase))];
    }

    function toggleTask(group, index) {
      const item = state.tasks[state.selectedDate][group][index];
      item.done = !item.done;
      saveState();
      scheduleRender();
    }

    function setPace(value) {
      state.tasks[state.selectedDate].pace = value;
      saveState();
      scheduleRender();
    }

    function sectionHtml(title, groupKey, items) {
      const icons = { physics: "◎", english: "△", review: "✓" };
      const doneCount = items.filter((item) => item.done).length;
      return `
        <section class="section">
          <h3>${icons[groupKey]} ${escapeHtml(title)}<span class="section-count">${doneCount}/${items.length}</span></h3>
          <div class="task-list">
            ${items.map((item, idx) => `
              <button class="task-btn ${item.done ? "done" : ""}" data-action="toggle" data-group="${groupKey}" data-index="${idx}">
                <span class="check"></span>
                <span class="task-text">${escapeHtml(item.text)}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function render() {
      const selectedDay = getSelectedDay();
      const selectedTaskState = state.tasks[state.selectedDate];
      const visibleDays = filteredDays();
      const all = allTasks();
      const total = all.length;
      const done = all.filter((item) => item.done).length;
      const progress = total ? Math.round((done * 100) / total) : 0;
      const physicsProgress = groupProgress("physics");
      const englishProgress = groupProgress("english");
      const totalTaskLabel = `${done}/${total}`;
      const currentDayTasks = [...selectedTaskState.physics, ...selectedTaskState.english, ...selectedTaskState.review];
      const currentDone = currentDayTasks.filter((item) => item.done).length;
      const currentPercent = currentDayTasks.length ? Math.round((currentDone * 100) / currentDayTasks.length) : 0;

      app.innerHTML = `
        <section class="hero-shell">
          <div class="hero">
            <div class="hero-copy">
              <div class="hero-day-card">
                <div class="hero-planet" aria-hidden="true">
                  <div class="hero-planet-ball">
                    <div class="hero-planet-aura"></div>
                    <div class="hero-planet-atmosphere"></div>
                    <div class="hero-planet-surface"></div>
                    <div class="hero-planet-night"></div>
                    <div class="hero-planet-band"></div>
                    <div class="hero-planet-crater c1"></div>
                    <div class="hero-planet-crater c2"></div>
                    <div class="hero-planet-crater c3"></div>
                    <div class="hero-planet-orbit po1"></div>
                    <div class="hero-planet-orbit po2"></div>
                    <div class="hero-planet-ring"></div>
                    <div class="hero-planet-moon one"></div>
                    <div class="hero-planet-moon two"></div>
                  </div>
                  <div class="hero-planet-shadow"></div>
                </div>
                <div class="hero-day-main">
                  <div class="pill">VSAT Mission Control</div>
                  <div class="mission-kicker">Ngày đang học</div>
                  <div class="mission-title">${escapeHtml(selectedDay.date)} · ${escapeHtml(selectedDay.phase)}</div>
                  <div class="progress hero-progress-inline"><span style="width:${currentPercent}%"></span></div>
                  <div class="mission-copy">${escapeHtml(selectedDay.note)}</div>
                </div>
                <div class="hero-day-focus">
                  <div class="hero-focus-card">
                    <div class="hero-focus-label">Ngày đang hiện</div>
                    <div class="hero-focus-value">${visibleDays.length}</div>
                    <div class="hero-focus-note">Số ngày còn lại theo bộ lọc hiện tại.</div>
                  </div>
                  <div class="hero-focus-card">
                    <div class="hero-focus-label">Đầu việc đã xong</div>
                    <div class="hero-focus-value">${done}/${total}</div>
                    <div class="hero-focus-note">Tiến độ tổng hợp của toàn bộ kế hoạch.</div>
                  </div>
                  <div class="hero-focus-card">
                    <div class="hero-focus-label">Ngày ${escapeHtml(selectedDay.date)}</div>
                    <div class="hero-focus-value">${currentDone}/${currentDayTasks.length}</div>
                    <div class="hero-focus-note">Số đầu việc đã tick trong ngày đang chọn.</div>
                  </div>
                  <div class="hero-focus-card focus-chip pace-chip">
                    <div class="hero-focus-label">Nhịp hiện tại</div>
                    <div class="hero-focus-value">${escapeHtml(selectedTaskState.pace)}</div>
                    <details class="pace-menu">
                      <summary class="badge ${paceClassMap[selectedTaskState.pace]}">
                        <span class="pace-current">${escapeHtml(selectedTaskState.pace)}</span>
                      </summary>
                      <div class="pace-options">
                        ${Object.keys(paceClassMap).map((pace) => `
                          <button
                            class="pace-option badge ${paceClassMap[pace]} ${pace === selectedTaskState.pace ? "active" : ""}"
                            data-action="set-pace"
                            data-pace="${escapeHtml(pace)}"
                            type="button"
                          >${escapeHtml(pace)}</button>
                        `).join("")}
                      </div>
                    </details>
                  </div>
                </div>
              </div>
            </div>

            <div class="hero-orbit">
              <div class="orbit-progress-wrap">
                <div class="orbit-progress-columns">
                  <div class="orbit-progress-item">
                    <div class="orbit-progress-value">${progress}%</div>
                    <div class="orbit-progress-track">
                      <div class="orbit-progress-fill" style="height:${progress}%"></div>
                    </div>
                    <div class="orbit-progress-name">Tổng nhịp</div>
                  </div>
                  <div class="orbit-progress-item">
                    <div class="orbit-progress-value">${physicsProgress}%</div>
                    <div class="orbit-progress-track">
                      <div class="orbit-progress-fill physics" style="height:${physicsProgress}%"></div>
                    </div>
                    <div class="orbit-progress-name">Vật lí</div>
                  </div>
                  <div class="orbit-progress-item">
                    <div class="orbit-progress-value">${englishProgress}%</div>
                    <div class="orbit-progress-track">
                      <div class="orbit-progress-fill english" style="height:${englishProgress}%"></div>
                    </div>
                    <div class="orbit-progress-name">Tiếng Anh</div>
                  </div>
                  <div class="orbit-progress-item">
                    <div class="orbit-progress-value">${totalTaskLabel}</div>
                    <div class="orbit-progress-track">
                      <div class="orbit-progress-fill tasks" style="height:${progress}%"></div>
                    </div>
                    <div class="orbit-progress-name">Công việc</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="dashboard">
          <aside class="glass sidebar">
            <div>
              <div class="section-title">Radar điều hướng</div>
            </div>

            <div style="display:grid; gap:12px;">
              <input id="searchInput" class="search" placeholder="Tìm theo ngày, môn, đề, topic..." value="${escapeHtml(state.query)}" />
              <select id="phaseSelect" class="select">
                ${phases().map((phase) => `<option value="${escapeHtml(phase)}" ${phase === state.phaseFilter ? "selected" : ""}>${escapeHtml(phase)}</option>`).join("")}
              </select>
              <div class="segmented">
                <button class="segment-btn ${state.tab === "all" ? "active" : ""}" data-tab="all">Tất cả</button>
                <button class="segment-btn ${state.tab === "active" ? "active" : ""}" data-tab="active">Đang làm</button>
                <button class="segment-btn ${state.tab === "done" ? "active" : ""}" data-tab="done">Xong</button>
              </div>
            </div>

            <div class="radar">
              <div class="radar-top">
                <div>
                  <div class="section-title" style="font-size:18px;">Timeline</div>
                  <div class="section-desc" style="margin-top:4px;">Chọn nhanh ngày cần xử lý.</div>
                </div>
                <span class="badge ${paceClassMap[selectedTaskState.pace]}">${escapeHtml(selectedTaskState.pace)}</span>
              </div>

              <div class="date-list">
                ${visibleDays.map((day) => {
                  const taskState = state.tasks[day.date];
                  const dayTasks = [...taskState.physics, ...taskState.english, ...taskState.review];
                  const dayDone = dayTasks.filter((item) => item.done).length;
                  const dayPercent = dayTasks.length ? Math.round((dayDone * 100) / dayTasks.length) : 0;

                  return `
                    <button class="date-btn ${state.selectedDate === day.date ? "active" : ""}" data-action="select-date" data-date="${day.date}">
                      <div class="date-top">
                        <div>
                          <div class="date-date">${escapeHtml(day.date)}</div>
                          <div class="date-phase">${escapeHtml(day.phase)}</div>
                        </div>
                        <span class="badge ${paceClassMap[taskState.pace]}">${escapeHtml(taskState.pace)}</span>
                      </div>
                      <div class="date-count">${dayDone}/${dayTasks.length} đầu việc xong</div>
                      <div class="progress" style="margin-top:10px;"><span style="width:${dayPercent}%"></span></div>
                    </button>
                  `;
                }).join("")}
              </div>
            </div>
          </aside>

          <div class="main">
            <section class="glass mission-shell">
              <div class="sections">
                ${sectionHtml("Vật lí", "physics", selectedTaskState.physics)}
                ${sectionHtml("Tiếng Anh", "english", selectedTaskState.english)}
                ${sectionHtml("Ôn lỗi / Recall", "review", selectedTaskState.review)}
              </div>

              <div class="mission-footer">
                <div class="hint">Các phần ghi chú kế hoạch, note thực tế, thêm việc phát sinh và reset dữ liệu vẫn nằm ở trang phụ để mặt chính luôn sạch và tập trung vào thao tác học chính.</div>
                <div class="action-links">
                  <a class="ghost-btn" href="vsat-center.html">Mở VSAT Center</a>
                  <span class="badge ${paceClassMap[selectedTaskState.pace]}">${escapeHtml(selectedTaskState.pace)}</span>
                </div>
              </div>
            </section>

          </div>
        </section>

        <section class="schedule-divider">
            <section class="glass schedule-shell">
              <div class="schedule-head">
                <div>
                  <div class="section-title">Thời Khóa Biểu Tổng Thể</div>
                  <div class="section-desc">Tách riêng để quét toàn bộ công việc. Mỗi môn chỉ hiện một dòng ngang gọn, bấm vào để bung chi tiết.</div>
                </div>
                <div class="schedule-stats">
                  <span class="badge">${visibleDays.length} ngày</span>
                  <span class="badge">${done}/${total} việc chính</span>
                  <span class="badge ${paceClassMap[selectedTaskState.pace]}">${escapeHtml(selectedTaskState.pace)}</span>
                </div>
              </div>

              <div class="schedule-table-wrap">
                <table class="schedule-table">
                  <thead>
                    <tr>
                      <th>Ngày</th>
                      <th>Vật lí</th>
                      <th>Tiếng Anh</th>
                      <th>Tiến độ</th>
                      <th>Ghi chú</th>
                      <th>Chọn nhanh</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${visibleDays.map((day) => {
                      const taskState = state.tasks[day.date];
                      const mainTasks = [...taskState.physics, ...taskState.english];
                      const mainDone = mainTasks.filter((item) => item.done).length;
                      const mainPercent = mainTasks.length ? Math.round((mainDone * 100) / mainTasks.length) : 0;

                      const renderTaskPanel = (title, items) => `
                        <div class="schedule-task-panel">
                          <div class="schedule-task-head">
                            <span class="schedule-task-title">${title}</span>
                            <span class="schedule-task-meta">${items.filter((item) => item.done).length}/${items.length}</span>
                          </div>
                          <div class="schedule-task-divider">
                            <span class="schedule-task-line"></span>
                          </div>
                          <div class="schedule-task-items">
                            ${items.map((item) => `
                              <div class="schedule-task-item ${item.done ? "done" : ""}">
                                <span class="schedule-task-text">${escapeHtml(item.text)}</span>
                                <span class="schedule-task-state">${item.done ? "Xong" : "Chưa"}</span>
                              </div>
                            `).join("")}
                          </div>
                        </div>
                      `;

                      return `
                        <tr class="${state.selectedDate === day.date ? "active-row" : ""}">
                          <td class="schedule-date-cell">
                            <div class="schedule-date-main">${escapeHtml(day.date)}</div>
                            <div class="schedule-phase">${escapeHtml(day.phase)}</div>
                            <div class="schedule-day-badges">
                              <span class="badge ${paceClassMap[taskState.pace]}">${escapeHtml(taskState.pace)}</span>
                            </div>
                          </td>
                          <td>${renderTaskPanel("Vật lí", taskState.physics)}</td>
                          <td>${renderTaskPanel("Tiếng Anh", taskState.english)}</td>
                          <td class="schedule-progress-cell">
                            <div class="schedule-progress-stack">
                              <div class="schedule-progress-meta">
                                <span>${mainPercent}%</span>
                                <span>${mainDone}/${mainTasks.length}</span>
                              </div>
                              <div class="schedule-progress-bar"><span style="height:${mainPercent}%"></span></div>
                            </div>
                          </td>
                          <td class="schedule-note-cell">
                            <div class="schedule-note-snippet">${escapeHtml(day.note)}</div>
                          </td>
                          <td>
                            <button class="schedule-open-btn" data-action="select-date" data-date="${day.date}">Mở ngày</button>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            </section>
        </section>
      `;

      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
      });
    }

    function syncHeroOrbitHeight() {
      const leftCard = document.querySelector(".hero-day-card");
      const rightCard = document.querySelector(".hero-orbit");
      const columns = document.querySelector(".orbit-progress-columns");
      const tracks = document.querySelectorAll(".orbit-progress-track");

      if (!leftCard || !rightCard || !columns) return;

      if (window.innerWidth <= 1240) {
        rightCard.style.height = "";
        rightCard.style.minHeight = "";
        columns.style.height = "";
        tracks.forEach((track) => {
          track.style.height = "";
        });
        return;
      }

      const leftHeight = Math.ceil(leftCard.getBoundingClientRect().height);
      const orbitStyle = window.getComputedStyle(rightCard);
      const padTop = parseFloat(orbitStyle.paddingTop) || 0;
      const padBottom = parseFloat(orbitStyle.paddingBottom) || 0;
      const availableHeight = Math.max(240, leftHeight - padTop - padBottom);
      const trackHeight = Math.max(190, availableHeight - 54);

      rightCard.style.height = `${leftHeight}px`;
      rightCard.style.minHeight = `${leftHeight}px`;
      columns.style.height = `${availableHeight}px`;
      tracks.forEach((track) => {
        track.style.height = `${trackHeight}px`;
      });
    }

    function handleAppClick(event) {
      const target = event.target.closest("[data-tab], [data-action]");
      if (!target) return;

      if (target.dataset.tab) {
        state.tab = target.dataset.tab;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "select-date") {
        state.selectedDate = target.dataset.date;
        saveState();
        scheduleRender();
        return;
      }

      if (target.dataset.action === "toggle") {
        toggleTask(target.dataset.group, Number(target.dataset.index));
        return;
      }

      if (target.dataset.action === "set-pace") {
        const paceMenu = target.closest(".pace-menu");
        if (paceMenu) paceMenu.open = false;
        setPace(target.dataset.pace);
      }
    }

    function handleAppInput(event) {
      if (event.target.id !== "searchInput") return;
      state.query = event.target.value;
      saveState();
      if (searchInputTimer) clearTimeout(searchInputTimer);
      searchInputTimer = window.setTimeout(() => {
        searchInputTimer = 0;
        scheduleRender();
      }, 120);
    }

    function handleAppChange(event) {
      if (event.target.id !== "phaseSelect") return;
      state.phaseFilter = event.target.value;
      saveState();
      scheduleRender();
    }

    function randomizeFlagBurstPose() {
      const flagBurst = document.querySelector(".flag-burst");
      if (!flagBurst) return;

      const isMobile = window.innerWidth <= 820;
      const top = isMobile
        ? 22 + Math.round(Math.random() * 42)
        : 42 + Math.round(Math.random() * 68);
      const right = isMobile
        ? Math.round(Math.random() * 14)
        : 20 + Math.round(Math.random() * 54);
      const shiftX = -8 - Math.round(Math.random() * 22);
      const shiftY = 8 + Math.round(Math.random() * 14);
      const tilt = -12 + Math.round(Math.random() * 16);

      flagBurst.style.setProperty("--flag-top", `${top}px`);
      flagBurst.style.setProperty("--flag-right", `${right}px`);
      flagBurst.style.setProperty("--flag-shift-x", `${shiftX}px`);
      flagBurst.style.setProperty("--flag-shift-y", `${shiftY}px`);
      flagBurst.style.setProperty("--flag-tilt", `${tilt}deg`);
    }

    function triggerFlagBurst() {
      randomizeFlagBurstPose();
      document.body.classList.remove("flag-burst-active");
      void document.body.offsetWidth;
      document.body.classList.add("flag-burst-active");

      if (flagBurstTimer) clearTimeout(flagBurstTimer);
      flagBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("flag-burst-active");
        flagBurstTimer = 0;
      }, 4200);
    }

    function startFlagBurstLoop() {
      if (flagBurstLoop) clearInterval(flagBurstLoop);
      flagBurstLoop = window.setInterval(() => {
        triggerFlagBurst();
      }, 10000);
    }

    app.addEventListener("click", handleAppClick);
    app.addEventListener("input", handleAppInput);
    app.addEventListener("change", handleAppChange);
    window.addEventListener("resize", () => {
      if (syncHeightRaf) cancelAnimationFrame(syncHeightRaf);
      syncHeightRaf = requestAnimationFrame(() => {
        syncHeightRaf = 0;
        syncHeroOrbitHeight();
      });
    });
    window.addEventListener("pagehide", flushState);
    render();
    window.setTimeout(triggerFlagBurst, 1800);
    startFlagBurstLoop();
  </script>
</body>
</html>
